<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0e1117;
--surface:#161b25;
--surface2:#1e2535;
--border:#2a3347;
--text:#e8edf5;
--muted:#7a8499;
--accent:#3b82f6;
--green:#22c55e;
--red:#ef4444;
--radius:12px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

.sidebar{
width:390px;
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow-y:auto;
}

.brand{padding:18px;border-bottom:1px solid var(--border);}
.brand h2{font-size:20px;margin-bottom:5px;}
.brand p{font-size:12px;color:var(--muted);}

.pane{padding:18px;display:flex;flex-direction:column;gap:14px;}

.field-label{
font-size:12px;
margin-bottom:6px;
font-weight:600;
color:var(--muted);
}

.form-input{
width:100%;
padding:12px;
border-radius:var(--radius);
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
outline:none;
font-size:14px;
}

.form-input:focus{border-color:var(--accent);}

.vehicle-selector{display:flex;gap:10px;}

.vehicle-btn{
flex:1;
padding:12px;
border:none;
border-radius:var(--radius);
cursor:pointer;
background:var(--surface2);
color:var(--text);
font-weight:600;
}

.vehicle-btn.active{background:var(--accent);}

.pin-row{display:flex;gap:10px;}

.btn-pin{
flex:1;
padding:12px;
border:none;
border-radius:var(--radius);
cursor:pointer;
background:var(--surface2);
color:var(--text);
font-weight:600;
}

.btn-pin.active{background:var(--green);}

.btn-calc,.btn-submit{
padding:14px;
border:none;
border-radius:var(--radius);
cursor:pointer;
font-size:15px;
font-weight:700;
color:white;
}

.btn-calc{background:var(--green);}
.btn-submit{background:var(--accent);}

.result-card{
display:none;
flex-direction:column;
gap:10px;
padding:16px;
background:var(--bg);
border-radius:var(--radius);
border:1px solid var(--accent);
}

.result-card.show{display:flex;}

.result-row{font-size:14px;line-height:1.6;}
.result-row strong{color:white;}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--surface2);
padding:12px 20px;
border-radius:30px;
font-size:14px;
opacity:0;
transition:0.3s;
z-index:99999;
}

.toast.show{opacity:1;}

#map{flex:1;height:100vh;}

@media(max-width:768px){
body{flex-direction:column;}
.sidebar{width:100%;height:50vh;}
#map{height:50vh;}
}
</style>
</head>

<body>

<aside class="sidebar">

<div class="brand">
<h2>Employee Travel Tracker</h2>
<p>Distance · GPS Pin · Zoho Sync</p>
</div>

<div class="pane">

<div>
<div class="field-label">Employee Name</div>
<select id="person-name" class="form-input">
<option value="">Select Employee</option>
<option value="Madhumita">Madhumita</option>
<option value="Muni">Muni</option>
<option value="Sarath">Sarath</option>
<option value="Yamuna">Yamuna</option>
<option value="Antony">Antony</option>
</select>
</div>

<div>
<div class="field-label">Travel Date</div>
<input type="date" id="travel-date" class="form-input"/>
</div>

<div>
<div class="field-label">From Location</div>
<input type="text" id="from-loc" class="form-input" placeholder="Enter From Location"/>
</div>

<div>
<div class="field-label">To Location</div>
<input type="text" id="to-loc" class="form-input" placeholder="Enter Destination"/>
</div>

<div>
<div class="field-label">Pin GPS Location</div>
<div class="pin-row">
<button class="btn-pin" id="btn-pin-from" onclick="startPin('from')">📍 Pin From</button>
<button class="btn-pin" id="btn-pin-to" onclick="startPin('to')">📍 Pin To</button>
</div>
</div>

<div>
<div class="field-label">Vehicle Type</div>
<div class="vehicle-selector">
<button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">Bike ₹3.5/km</button>
<button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">Car ₹20/km</button>
</div>
</div>

<button class="btn-calc" onclick="calculateRoute()">Calculate Route</button>

<div class="result-card" id="result-card">
<div class="result-row" id="r-name"></div>
<div class="result-row" id="r-date"></div>
<div class="result-row" id="r-from"></div>
<div class="result-row" id="r-to"></div>
<div class="result-row" id="r-distance"></div>
<div class="result-row" id="r-duration"></div>
<div class="result-row" id="r-cost"></div>

<button class="btn-submit" onclick="submitToZoho()" id="btn-submit">
Save To Zoho
</button>
</div>

</div>
</aside>

<div id="map"></div>
<div class="toast" id="toast"></div>

<script>

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";

document.getElementById('travel-date').value =
new Date().toISOString().split('T')[0];

var map = L.map('map').setView([13.0827,80.2707],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var selectedVehicle='bike';
var pinMode=null;
var fromMarker=null;
var toMarker=null;
var routeLayer=null;
var fromCoords=null;
var toCoords=null;
var tripData=null;

function toast(msg){
var t=document.getElementById('toast');
t.innerText=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}

function selectVehicle(type){
selectedVehicle=type;
document.getElementById('btn-bike').classList.toggle('active',type==='bike');
document.getElementById('btn-car').classList.toggle('active',type==='car');
}

function startPin(type){
pinMode=type;
map.getContainer().style.cursor='crosshair';
toast('Click on map');
}

map.on('click',async function(e){
if(!pinMode) return;

var lat=e.latlng.lat;
var lng=e.latlng.lng;
var type=pinMode;
pinMode=null;

try{
var r=await fetch(
'https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng
);
var d=await r.json();
var addr=d.display_name||lat+","+lng;

document.getElementById(type==='from'?'from-loc':'to-loc').value=addr;

if(type==='from') fromCoords={lat,lng};
else toCoords={lat,lng};

toast('Pinned');
}catch(err){
toast('Error');
}
});

async function geocode(addr){
var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr)+'&limit=1');
var d=await r.json();
if(!d.length) throw new Error('Not found');
return {lat:+d[0].lat,lng:+d[0].lon};
}

async function calculateRoute(){

var name=document.getElementById('person-name').value;
var date=document.getElementById('travel-date').value;
var from=document.getElementById('from-loc').value;
var to=document.getElementById('to-loc').value;

if(!name||!date||!from||!to){
alert('Fill all fields');
return;
}

var a=fromCoords||await geocode(from);
var b=toCoords||await geocode(to);

var url='https://router.project-osrm.org/route/v1/driving/'
+a.lng+','+a.lat+';'+b.lng+','+b.lat+'?overview=full&geometries=geojson';

var r=await fetch(url);
var d=await r.json();
var route=d.routes[0];

var dist=(route.distance/1000).toFixed(2);
var dur=Math.round(route.duration/60);
var coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);

if(routeLayer) map.removeLayer(routeLayer);
routeLayer=L.polyline(coords,{color:'#3b82f6',weight:6}).addTo(map);
map.fitBounds(routeLayer.getBounds());

var rate=selectedVehicle==='car'?20:3.5;
var cost=(dist*rate).toFixed(2);

tripData={name,date,from,to,distance:dist,duration:dur,vehicle:selectedVehicle,cost};

document.getElementById('result-card').classList.add('show');
document.getElementById('r-name').innerHTML="Employee: <strong>"+name+"</strong>";
document.getElementById('r-date').innerHTML="Date: <strong>"+date+"</strong>";
document.getElementById('r-from').innerHTML="From: <strong>"+from+"</strong>";
document.getElementById('r-to').innerHTML="To: <strong>"+to+"</strong>";
document.getElementById('r-distance').innerHTML="Distance: <strong>"+dist+" km</strong>";
document.getElementById('r-duration').innerHTML="Duration: <strong>"+dur+" min</strong>";
document.getElementById('r-cost').innerHTML="Cost: ₹<strong>"+cost+"</strong>";

toast('Route calculated');
}

function submitToZoho(){

if(!tripData){
toast('Calculate first');
return;
}

var params=new URLSearchParams();
Object.keys(tripData).forEach(k=>params.append(k,tripData[k]));

fetch(ZOHO_WEBHOOK_URL+'&'+params.toString(),{method:'GET',mode:'no-cors'});

toast('Sent to Zoho');
}

</script>

</body>
</html>
