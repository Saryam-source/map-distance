<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1117;--surface:#161b25;--surface2:#1e2535;--border:#2a3347;
  --text:#e8edf5;--muted:#7a8499;--accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--red:#ef4444;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}
.sidebar{width:390px;min-width:390px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;}
.brand{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:17px;height:17px;fill:#fff;}
.brand-title{font-size:15px;font-weight:600;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.pane{padding:14px 16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.pane::-webkit-scrollbar{width:4px;}
.pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.field-label{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.form-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s;}
.form-input::placeholder{color:var(--muted);}
.form-input:focus{border-color:var(--accent);background:var(--surface2);}
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:9999;max-height:220px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.ac-list.show{display:block;}
.ac-item{padding:9px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.ac-item:hover{background:var(--surface2);}
.ac-main{font-weight:600;color:var(--text);}
.ac-sub{color:var(--muted);font-size:11px;margin-top:2px;}
.pin-row{display:flex;gap:6px;}
.btn-pin{flex:1;padding:10px 8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-pin:hover{color:var(--text);border-color:var(--accent);}
.btn-pin.active-from{border-color:var(--green);background:var(--green);color:#fff;}
.btn-pin.active-to{border-color:var(--red);background:var(--red);color:#fff;}
.vehicle-selector{display:flex;gap:8px;}
.vehicle-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;}
.vehicle-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.btn-calc,.btn-submit{width:100%;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:.2s;color:#fff;}
.btn-calc{background:var(--green);}
.btn-calc:hover{background:#16a34a;}
.btn-submit{background:var(--accent);}
.btn-submit:hover{background:#2563eb;}
.btn-submit:disabled{background:#24354f;cursor:not-allowed;}
.status-msg{border-radius:8px;padding:10px 12px;font-size:12px;display:none;gap:8px;line-height:1.5;}
.status-msg.show{display:flex;}
.status-msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);}
.status-msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red);}
.status-msg.loading{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent2);}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--accent2);border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg);}}
.result-card{background:var(--bg);border:1.5px solid var(--accent);border-radius:12px;padding:14px;display:none;flex-direction:column;gap:10px;}
.result-card.show{display:flex;}
.section-hdr{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);}
.rc-top{display:flex;gap:8px;}
.rc-metric{flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center;}
.rc-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;}
.rc-value{font-size:22px;font-weight:700;color:var(--accent2);font-family:'DM Mono',monospace;}
.rc-unit{font-size:9px;color:var(--muted);}
.rc-row{font-size:12px;color:var(--muted);line-height:1.5;}
.rc-row strong{color:var(--text);}
.rc-cost{font-size:16px;font-weight:700;color:var(--green);padding:8px 12px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;text-align:center;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;z-index:99999;opacity:0;transition:.3s;pointer-events:none;}
.toast.show{opacity:1;}
#map{flex:1;height:100vh;}
@media(max-width:768px){body{flex-direction:column;height:auto;}.sidebar{width:100%;min-width:100%;}#map{height:55vh;}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>
    <div>
      <div class="brand-title">Employee Travel Tracker</div>
      <div class="brand-sub">Distance · Route · Zoho Sync</div>
    </div>
  </div>

  <div class="pane">

    <div>
      <div class="field-label">Employee Name</div>
      <select id="person-name" class="form-input">
        <option value="">-- Select Employee --</option>
        <option value="Madhumita">Madhumita</option>
        <option value="Muni">Muni</option>
        <option value="Sarath">Sarath</option>
        <option value="Yamuna">Yamuna</option>
        <option value="Antony">Antony</option>
      </select>
    </div>

    <div>
      <div class="field-label">Travel Date</div>
      <input type="date" id="travel-date" class="form-input"/>
    </div>

    <div>
      <div class="field-label">From Location</div>
      <div class="ac-wrap">
        <input type="text" id="from-loc" class="form-input" placeholder="🟢 Enter starting location..." autocomplete="off" oninput="acSearch(this,'from-list','from')" onblur="acHide('from-list')"/>
        <div class="ac-list" id="from-list"></div>
      </div>
    </div>

    <div>
      <div class="field-label">To Location</div>
      <div class="ac-wrap">
        <input type="text" id="to-loc" class="form-input" placeholder="🔴 Enter destination..." autocomplete="off" oninput="acSearch(this,'to-list','to')" onblur="acHide('to-list')"/>
        <div class="ac-list" id="to-list"></div>
      </div>
    </div>

    <div>
      <div class="field-label">Pin Location on Map</div>
      <div class="pin-row">
        <button type="button" class="btn-pin" id="btn-pin-from" onclick="startPin('from')">📍 Pin From</button>
        <button type="button" class="btn-pin" id="btn-pin-to" onclick="startPin('to')">📍 Pin To</button>
      </div>
    </div>

    <div>
      <div class="field-label">Vehicle Type</div>
      <div class="vehicle-selector">
        <button type="button" class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">🏍️ Bike ₹3.5/km</button>
        <button type="button" class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">🚗 Car ₹20/km</button>
      </div>
    </div>

    <button class="btn-calc" id="btn-calc" onclick="calculateRoute()">Calculate Route</button>

    <div class="status-msg loading" id="msg-loading">
      <span class="spin"></span>
      <span id="msg-loading-text">Calculating...</span>
    </div>
    <div class="status-msg err" id="msg-err">
      <span id="msg-err-text">Something went wrong.</span>
    </div>

    <div class="result-card" id="result-card">
      <div class="section-hdr">Route Summary</div>
      <div class="rc-top">
        <div class="rc-metric">
          <div class="rc-label">Distance</div>
          <div class="rc-value" id="r-dist">-</div>
          <div class="rc-unit">km</div>
        </div>
        <div class="rc-metric">
          <div class="rc-label">Duration</div>
          <div class="rc-value" id="r-dur">-</div>
          <div class="rc-unit">min</div>
        </div>
      </div>
      <div class="rc-row" id="r-name"></div>
      <div class="rc-row" id="r-date"></div>
      <div class="rc-row" id="r-from"></div>
      <div class="rc-row" id="r-to"></div>
      <div class="rc-cost" id="r-cost"></div>
      <button class="btn-submit" id="btn-submit" onclick="submitToZoho()">Save to Zoho Report</button>
      <div class="status-msg ok" id="msg-ok">
        <span id="msg-ok-text">Saved Successfully</span>
      </div>
    </div>

  </div>
</aside>

<div id="map"></div>
<div class="toast" id="toast"></div>

</script>

</body>
</html>
