<script>

//═══════════════════════════════════════════════
// ZOHO WEBHOOK
//═══════════════════════════════════════════════

const ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=YOUR_ZOHO_KEY";

//═══════════════════════════════════════════════
// OPENROUTESERVICE API
//═══════════════════════════════════════════════

const API_KEY = "PASTE_YOUR_OPENROUTESERVICE_API_KEY";

//═══════════════════════════════════════════════
// MAP
//═══════════════════════════════════════════════

var map = L.map('map').setView([13.0827,80.2707],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

//═══════════════════════════════════════════════
// VARIABLES
//═══════════════════════════════════════════════

var selectedVehicle = "driving-car";

var routeLayer = null;
var startMarker = null;
var endMarker = null;
var gpsMarker = null;

//═══════════════════════════════════════════════
// VEHICLE SELECT
//═══════════════════════════════════════════════

function selectVehicle(type){

selectedVehicle = type;

document.getElementById('btn-bike')
.classList.remove('active');

document.getElementById('btn-car')
.classList.remove('active');

if(type === 'cycling-regular'){

document.getElementById('btn-bike')
.classList.add('active');

}

if(type === 'driving-car'){

document.getElementById('btn-car')
.classList.add('active');

}

}

//═══════════════════════════════════════════════
// GEOCODE LOCATION
//═══════════════════════════════════════════════

async function geocode(place){

const response = await fetch(
`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(place)}`
);

const data = await response.json();

if(data.features.length === 0){

throw new Error("Location not found");

}

const coords = data.features[0].geometry.coordinates;

return {
lng: coords[0],
lat: coords[1]
};

}

//═══════════════════════════════════════════════
// MAIN FUNCTION
//═══════════════════════════════════════════════

async function calculateAndSaveTrip(){

const employeeName =
document.getElementById('person-name').value;

const from =
document.getElementById('from-location').value;

const to =
document.getElementById('to-location').value;

if(!employeeName || !from || !to){

alert("Please fill all fields");

return;

}

try{

//══════════════════════════════
// GET LIVE GPS
//══════════════════════════════

navigator.geolocation.getCurrentPosition(
async function(pos){

const gpsLat = pos.coords.latitude;
const gpsLng = pos.coords.longitude;

//══════════════════════════════
// SHOW GPS LOCATION
//══════════════════════════════

if(gpsMarker){

map.removeLayer(gpsMarker);

}

gpsMarker = L.marker([gpsLat,gpsLng])
.addTo(map)
.bindPopup("Your GPS Location");

//══════════════════════════════
// CONVERT FROM / TO
//══════════════════════════════

const start = await geocode(from);

const end = await geocode(to);

//══════════════════════════════
// REMOVE OLD ROUTE
//══════════════════════════════

if(routeLayer){

map.removeLayer(routeLayer);

}

if(startMarker){

map.removeLayer(startMarker);

}

if(endMarker){

map.removeLayer(endMarker);

}

//══════════════════════════════
// START + END MARKERS
//══════════════════════════════

startMarker = L.marker([start.lat,start.lng])
.addTo(map)
.bindPopup("Start");

endMarker = L.marker([end.lat,end.lng])
.addTo(map)
.bindPopup("Destination");

//══════════════════════════════
// ROUTE API
//══════════════════════════════

const body = {

coordinates:[
[start.lng,start.lat],
[end.lng,end.lat]
]

};

const routeResponse = await fetch(

`https://api.openrouteservice.org/v2/directions/${selectedVehicle}/geojson`,

{
method:'POST',

headers:{
'Authorization':API_KEY,
'Content-Type':'application/json'
},

body:JSON.stringify(body)

}

);

const routeData = await routeResponse.json();

//══════════════════════════════
// DRAW ROUTE
//══════════════════════════════

routeLayer = L.geoJSON(routeData,{

style:{
color:'#2563eb',
weight:6
}

}).addTo(map);

map.fitBounds(routeLayer.getBounds());

//══════════════════════════════
// SUMMARY
//══════════════════════════════

const summary =
routeData.features[0].properties.summary;

const distanceKm =
(summary.distance / 1000).toFixed(2);

const durationMin =
Math.round(summary.duration / 60);

//══════════════════════════════
// COST
//══════════════════════════════

let rate = 20;

if(selectedVehicle === 'cycling-regular'){

rate = 3.5;

}

const totalCost =
(distanceKm * rate).toFixed(2);

//══════════════════════════════
// SHOW RESULTS
//══════════════════════════════

document.getElementById('f-dist')
.innerText = distanceKm + " km";

document.getElementById('f-dur')
.innerText = durationMin + " min";

document.getElementById('f-name')
.innerHTML =
"👤 <strong>" + employeeName + "</strong>";

document.getElementById('f-start')
.innerHTML =
"🟢 <strong>From:</strong> " + from;

document.getElementById('f-end')
.innerHTML =
"🔴 <strong>To:</strong> " + to;

document.getElementById('f-cost')
.innerHTML =
"💰 Estimated Cost: ₹" + totalCost;

document.getElementById('result-card')
.classList.add('show');

//══════════════════════════════
// AUTO SAVE TO ZOHO
//══════════════════════════════

const payload = {

name: employeeName,
from: from,
to: to,

distance: distanceKm,
duration: durationMin,

vehicle: selectedVehicle,

cost: totalCost,

gps_lat: gpsLat,
gps_lng: gpsLng,

timestamp: new Date().toISOString()

};

const params = new URLSearchParams(payload);

fetch(

ZOHO_WEBHOOK_URL + "&" + params.toString(),

{
method:'GET',
mode:'no-cors'
}

);

//══════════════════════════════
// SUCCESS
//══════════════════════════════

alert("Trip Calculated & Saved to Zoho");

},

function(error){

alert("GPS permission denied");

}

);

}
catch(err){

console.error(err);

alert("Error calculating route");

}

}

</script>
