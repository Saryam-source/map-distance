<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Distance Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1117;--surface:#161b25;--surface2:#1e2535;--border:#2a3347;
  --text:#e8edf5;--muted:#7a8499;--accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--red:#ef4444;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 16px;}
.card{width:100%;max-width:480px;background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.brand{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:18px;height:18px;fill:#fff}
.brand-title{font-size:15px;font-weight:600;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.form-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.field-label{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s;-webkit-appearance:none;}
.form-input::placeholder{color:var(--muted)}
.form-input:focus{border-color:var(--accent);background:var(--surface2)}
.vehicle-selector{display:flex;gap:8px}
.vehicle-btn{flex:1;padding:12px 8px;font-size:12px;font-weight:600;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.vehicle-btn:hover{border-color:var(--accent);color:var(--text)}
.vehicle-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.cost-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:13px;color:var(--muted);}
.cost-preview strong{color:var(--green);font-size:15px;}
.btn-submit{width:100%;padding:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;background:var(--accent);color:#fff;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-submit:hover:not(:disabled){background:#2563eb}
.btn-submit:disabled{background:#1a2d4a;color:#3a5a8a;cursor:not-allowed}
.status-msg{border-radius:8px;padding:10px 12px;font-size:12px;display:none;align-items:flex-start;gap:8px;line-height:1.6}
.status-msg.show{display:flex}
.status-msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.status-msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.status-msg.loading{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent2)}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--accent2);border-radius:50%;animation:rot .7s linear infinite;display:inline-block;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div>
      <div class="brand-title">Distance Calculator</div>
      <div class="brand-sub">Manual entry · Zoho sync</div>
    </div>
  </div>
  <div class="form-body">
    <div>
      <div class="field-label">Your Name</div>
      <select id="person-name" class="form-input">
        <option value="">-- Select your name --</option>
        <option value="Madhumita">Madhumita</option>
        <option value="Muni">Muni</option>
        <option value="Sarath">Sarath</option>
        <option value="Yamuna">Yamuna</option>
        <option value="Antony">Antony</option>
      </select>
    </div>
    <div>
      <div class="field-label">From</div>
      <input type="text" id="from-location" class="form-input" placeholder="Enter starting location..."/>
    </div>
    <div>
      <div class="field-label">To</div>
      <input type="text" id="to-location" class="form-input" placeholder="Enter destination..."/>
    </div>
    <div>
      <div class="field-label">Distance (km)</div>
      <input type="number" id="manual-distance" class="form-input" placeholder="e.g. 12.5" step="0.01" min="0" oninput="updateCost()"/>
    </div>
    <div>
      <div class="field-label">Vehicle Type</div>
      <div class="vehicle-selector">
        <button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">
          Bike - Rs.3.5/km
        </button>
        <button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">
          Car - Rs.20/km
        </button>
      </div>
    </div>
    <div>
      <div class="field-label">Estimated Cost</div>
      <div class="cost-preview" id="cost-preview">Enter distance to see cost...</div>
    </div>
    <button class="btn-submit" id="btn-submit" onclick="submitToZoho()">
      Submit to Zoho Report
    </button>
    <div class="status-msg loading" id="msg-loading">
      <span class="spin"></span>
      <span>Saving to Zoho...</span>
    </div>
    <div class="status-msg ok" id="msg-ok">
      <span id="msg-ok-text">Saved to Zoho Report!</span>
    </div>
    <div class="status-msg err" id="msg-err">
      <span id="msg-err-text">Error saving. Please try again.</span>
    </div>
  </div>
</div>
<script>
var ZOHO_WEBHOOK_URL = "https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";

function showMsg(type){
  ['loading','ok','err'].forEach(function(t){
    document.getElementById('msg-'+t).classList.remove('show');
  });
  if(type) document.getElementById('msg-'+type).classList.add('show');
}

function selectVehicle(type){
  document.getElementById('btn-bike').classList.toggle('active', type==='bike');
  document.getElementById('btn-car').classList.toggle('active', type==='car');
  updateCost();
}

function getVehicle(){
  return document.getElementById('btn-bike').classList.contains('active') ? 'bike' : 'car';
}

function updateCost(){
  var dist = parseFloat(document.getElementById('manual-distance').value);
  var mode = getVehicle();
  var rate = mode === 'car' ? 20 : 3.5;
  var el = document.getElementById('cost-preview');
  if(!dist || isNaN(dist)){
    el.innerHTML = 'Enter distance to see cost...';
    return;
  }
  var cost = (dist * rate).toFixed(2);
  el.innerHTML = 'Estimated Cost: <strong>Rs.' + cost + '</strong> (' + mode + ' @ Rs.' + rate + '/km)';
}

function submitToZoho(){
  var name     = document.getElementById('person-name').value.trim();
  var from     = document.getElementById('from-location').value.trim();
  var to       = document.getElementById('to-location').value.trim();
  var distance = document.getElementById('manual-distance').value.trim();
  var mode     = getVehicle();

  if(!name)     { alert('Please select your name');       return; }
  if(!from)     { alert('Please enter From location');    return; }
  if(!to)       { alert('Please enter To location');      return; }
  if(!distance) { alert('Please enter distance in km');   return; }

  var rate = mode === 'car' ? 20 : 3.5;
  var cost = (parseFloat(distance) * rate).toFixed(2);

  document.getElementById('btn-submit').disabled = true;
  showMsg('loading');

  var payload = {
    name:      name,
    start:     from,
    end:       to,
    distance:  distance,
    duration:  '0',
    mode:      mode,
    cost:      cost,
    timestamp: new Date().toISOString()
  };

  var params = new URLSearchParams();
  Object.keys(payload).forEach(function(k){ params.append(k, String(payload[k])); });
  var urlWithParams = ZOHO_WEBHOOK_URL + '&' + params.toString();

  fetch(urlWithParams, { method: 'GET', mode: 'no-cors' })
  .then(function(){
    showMsg('ok');
    document.getElementById('msg-ok-text').textContent =
      'Saved! ' + name + ' | ' + from + ' to ' + to + ' | ' + distance + ' km | Rs.' + cost;
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('person-name').value = '';
    document.getElementById('from-location').value = '';
    document.getElementById('to-location').value = '';
    document.getElementById('manual-distance').value = '';
    document.getElementById('cost-preview').innerHTML = 'Enter distance to see cost...';
  })
  .catch(function(){
    showMsg('ok');
    document.getElementById('msg-ok-text').textContent = 'Submitted to Zoho!';
    document.getElementById('btn-submit').disabled = false;
  });
}
</script>
</body>
</html>
