<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1117;--surface:#161b25;--surface2:#1e2535;--border:#2a3347;
  --text:#e8edf5;--muted:#7a8499;--accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--red:#ef4444;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

.sidebar{width:380px;min-width:380px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden}
.brand{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:17px;height:17px;fill:#fff}
.brand-title{font-size:15px;font-weight:600}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}

.pane{padding:14px 16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.pane::-webkit-scrollbar{width:4px}
.pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.field-label{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}

.form-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s;-webkit-appearance:none;}
.form-input::placeholder{color:var(--muted)}
.form-input:focus{border-color:var(--accent);background:var(--surface2)}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:9999;max-height:240px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ac-list.show{display:block}
.ac-item{padding:9px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);line-height:1.4}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:focus{background:var(--surface2)}
.ac-main{font-weight:600;color:var(--text);font-size:12px}
.ac-sub{color:var(--muted);font-size:11px;margin-top:2px}

/* Vehicle */
.vehicle-selector{display:flex;gap:8px}
.vehicle-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:600;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.vehicle-btn:hover{border-color:var(--accent);color:var(--text)}
.vehicle-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.vehicle-btn svg{width:16px;height:16px;fill:currentColor}

/* Calculate button */
.btn-calc{width:100%;padding:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;background:var(--green);color:#fff;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-calc:hover:not(:disabled){background:#16a34a;box-shadow:0 0 20px rgba(34,197,94,.3)}
.btn-calc:disabled{background:#1a3a22;color:#3a6a42;cursor:not-allowed}
.btn-calc svg{width:18px;height:18px;fill:currentColor}

/* Result */
.result-card{background:var(--bg);border:1.5px solid var(--accent);border-radius:12px;padding:14px;display:none;flex-direction:column;gap:10px}
.result-card.show{display:flex}
.section-hdr{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.rc-top{display:flex;gap:8px}
.rc-metric{flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center}
.rc-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;font-weight:600}
.rc-value{font-size:22px;font-weight:700;color:var(--accent2);font-family:'DM Mono',monospace;line-height:1}
.rc-unit{font-size:9px;color:var(--muted);margin-top:2px}
.rc-details{display:flex;flex-direction:column;gap:6px}
.rc-row{font-size:12px;color:var(--muted);line-height:1.5}
.rc-row strong{color:var(--text)}
.rc-cost{font-size:16px;font-weight:700;color:var(--green);padding:8px 12px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;text-align:center}

/* Submit */
.btn-submit{width:100%;padding:12px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;background:var(--accent);color:#fff;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-submit:hover:not(:disabled){background:#2563eb}
.btn-submit:disabled{background:#1a2d4a;color:#3a5a8a;cursor:not-allowed}

/* Status */
.status-msg{border-radius:8px;padding:10px 12px;font-size:12px;display:none;align-items:flex-start;gap:8px;line-height:1.5}
.status-msg.show{display:flex}
.status-msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.status-msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.status-msg.loading{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent2)}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--accent2);border-radius:50%;animation:rot .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

#map{flex:1;height:100vh;z-index:1}

@media(max-width:768px){
  body{flex-direction:column;overflow:auto;height:auto}
  .sidebar{width:100%;min-width:unset;height:auto}
  #map{height:55vh;min-height:300px}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div>
      <div class="brand-title">Employee Travel Tracker</div>
      <div class="brand-sub">Route · Distance · Zoho sync</div>
    </div>
  </div>

  <div class="pane">

    <!-- EMPLOYEE NAME -->
    <div>
      <div class="field-label">Employee Name</div>
      <select id="person-name" class="form-input">
        <option value="">-- Select Employee --</option>
        <option value="Madhumita">Madhumita</option>
        <option value="Muni">Muni</option>
        <option value="Sarath">Sarath</option>
        <option value="Yamuna">Yamuna</option>
        <option value="Antony">Antony</option>
      </select>
    </div>

    <!-- FROM -->
    <div>
      <div class="field-label">From</div>
      <div class="ac-wrap">
        <input type="text" id="from-loc" class="form-input" placeholder="🟢 Enter starting location..." autocomplete="off"
          oninput="acSearch(this,'from-list')" onblur="acHide('from-list')"/>
        <div class="ac-list" id="from-list"></div>
      </div>
    </div>

    <!-- TO -->
    <div>
      <div class="field-label">To</div>
      <div class="ac-wrap">
        <input type="text" id="to-loc" class="form-input" placeholder="🔴 Enter destination..." autocomplete="off"
          oninput="acSearch(this,'to-list')" onblur="acHide('to-list')"/>
        <div class="ac-list" id="to-list"></div>
      </div>
    </div>

    <!-- VEHICLE -->
    <div>
      <div class="field-label">Vehicle Type</div>
      <div class="vehicle-selector">
        <button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">
          <svg viewBox="0 0 24 24"><path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5S3.1 13.5 5 13.5s3.5 1.6 3.5 3.5S6.9 20.5 5 20.5zm5.8-10l2.4-2.4.8.8c1.3 1.3 3 2.1 5.1 2.1V11c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.6-1.6-.6s-1.1.2-1.4.6L7.8 10.4c-.4.4-.6.9-.6 1.4 0 .6.2 1.1.6 1.4L11 16v5h2v-6.2l-2.2-2.8zM19 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/></svg>
          Bike ₹3.5/km
        </button>
        <button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">
          <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
          Car ₹20/km
        </button>
      </div>
    </div>

    <!-- CALCULATE BUTTON -->
    <button class="btn-calc" id="btn-calc" onclick="calculateRoute()">
      <svg viewBox="0 0 24 24"><path d="M21.71 11.29l-9-9a1 1 0 0 0-1.42 0l-9 9a1 1 0 0 0 0 1.42l9 9a1 1 0 0 0 1.42 0l9-9a1 1 0 0 0 0-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
      Calculate Route
    </button>

    <!-- STATUS -->
    <div class="status-msg loading" id="msg-loading">
      <span class="spin"></span>
      <span id="msg-loading-text">Calculating route...</span>
    </div>
    <div class="status-msg err" id="msg-err">
      <span id="msg-err-text">Could not calculate route.</span>
    </div>

    <!-- RESULT CARD -->
    <div class="result-card" id="result-card">
      <div class="section-hdr">Route Summary</div>

      <div class="rc-top">
        <div class="rc-metric">
          <div class="rc-label">Distance</div>
          <div class="rc-value" id="r-dist">—</div>
          <div class="rc-unit">km</div>
        </div>
        <div class="rc-metric">
          <div class="rc-label">Duration</div>
          <div class="rc-value" id="r-dur">—</div>
          <div class="rc-unit">min</div>
        </div>
      </div>

      <div class="rc-details">
        <div class="rc-row" id="r-name"></div>
        <div class="rc-row" id="r-from"></div>
        <div class="rc-row" id="r-to"></div>
      </div>

      <div class="rc-cost" id="r-cost">💰 —</div>

      <button class="btn-submit" id="btn-submit" onclick="submitToZoho()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Save to Zoho Report
      </button>

      <div class="status-msg ok" id="msg-ok">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="flex-shrink:0;margin-top:1px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <span id="msg-ok-text">Saved to Zoho Report!</span>
      </div>
    </div>

  </div>
</aside>

<div id="map"></div>
<div class="toast" id="toast"></div>

<script>
var ZOHO_WEBHOOK_URL = "https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";

// ── MAP INIT ──
var map = L.map('map', {zoomControl:false}).setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// ── STATE ──
var selectedVehicle = 'bike';
var routeLayer = null, fromMarker = null, toMarker = null;
var acTimers = {};
var tripData = null;

// ── UTILS ──
function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, dur||2500);
}
function showMsg(type) {
  ['loading','ok','err'].forEach(function(t){
    document.getElementById('msg-'+t).classList.remove('show');
  });
  if(type) document.getElementById('msg-'+type).classList.add('show');
}
function selectVehicle(type) {
  selectedVehicle = type;
  document.getElementById('btn-bike').classList.toggle('active', type==='bike');
  document.getElementById('btn-car').classList.toggle('active', type==='car');
}

// ── AUTOCOMPLETE ──
function acSearch(input, listId) {
  var query = input.value.trim();
  var list = document.getElementById(listId);
  clearTimeout(acTimers[listId]);
  if(query.length < 3) { list.classList.remove('show'); list.innerHTML=''; return; }

  acTimers[listId] = setTimeout(async function() {
    try {
      var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
                encodeURIComponent(query) + '&countrycodes=in&limit=20&addressdetails=1';
      var r = await fetch(url, {headers:{'Accept-Language':'en'}});
      var d = await r.json();
      if(!d || !d.length) { list.classList.remove('show'); return; }

      list.innerHTML = d.map(function(item) {
        var full = item.display_name || '';
        var parts = full.split(',');
        var main = parts[0].trim();
        var sub  = parts.slice(1,4).join(',').trim();
        return '<div class="ac-item" onmousedown="acSelect(\'' + listId + '\',\'' +
               full.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">' +
               '<div class="ac-main">' + main + '</div>' +
               '<div class="ac-sub">' + sub + '</div></div>';
      }).join('');
      list.classList.add('show');
    } catch(e) { list.classList.remove('show'); }
  }, 400);
}
function acSelect(listId, value) {
  var inputId = listId === 'from-list' ? 'from-loc' : 'to-loc';
  document.getElementById(inputId).value = value;
  document.getElementById(listId).classList.remove('show');
  document.getElementById(listId).innerHTML = '';
}
function acHide(listId) {
  setTimeout(function(){ document.getElementById(listId).classList.remove('show'); }, 200);
}

// ── GEOCODE (address → lat/lng) ──
async function geocode(address) {
  var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
            encodeURIComponent(address) + '&countrycodes=in&limit=1';
  var r = await fetch(url, {headers:{'Accept-Language':'en'}});
  var d = await r.json();
  if(!d || !d.length) throw new Error('Location not found: ' + address);
  return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), name: d[0].display_name };
}

// ── GET ROUTE via OSRM (free, no API key) ──
async function getRoute(from, to) {
  var url = 'https://router.project-osrm.org/route/v1/driving/' +
            from.lon + ',' + from.lat + ';' + to.lon + ',' + to.lat +
            '?overview=full&geometries=geojson&steps=false';
  var r = await fetch(url);
  var d = await r.json();
  if(!d.routes || !d.routes.length) throw new Error('Route not found');
  var route = d.routes[0];
  var distKm = (route.distance / 1000).toFixed(2);
  var durMin = Math.round(route.duration / 60);
  var coords = route.geometry.coordinates.map(function(c){ return [c[1], c[0]]; });
  return { distKm: distKm, durMin: durMin, coords: coords };
}

// ── CALCULATE ROUTE ──
async function calculateRoute() {
  var name = document.getElementById('person-name').value.trim();
  var from = document.getElementById('from-loc').value.trim();
  var to   = document.getElementById('to-loc').value.trim();

  if(!name) { alert('Please select employee name'); return; }
  if(!from) { alert('Please enter From location');  return; }
  if(!to)   { alert('Please enter To location');    return; }

  document.getElementById('btn-calc').disabled = true;
  document.getElementById('result-card').classList.remove('show');
  showMsg('loading');
  document.getElementById('msg-loading-text').textContent = 'Finding locations...';

  try {
    // Geocode both addresses
    var fromLL = await geocode(from);
    var toLL   = await geocode(to);

    document.getElementById('msg-loading-text').textContent = 'Calculating route...';

    // Get route
    var route = await getRoute(fromLL, toLL);

    // Draw on map
    if(routeLayer)  { map.removeLayer(routeLayer);  routeLayer  = null; }
    if(fromMarker)  { map.removeLayer(fromMarker);  fromMarker  = null; }
    if(toMarker)    { map.removeLayer(toMarker);    toMarker    = null; }

    routeLayer = L.polyline(route.coords, {
      color:'#3b82f6', weight:6, opacity:.85, lineCap:'round', lineJoin:'round'
    }).addTo(map);

    fromMarker = L.marker([fromLL.lat, fromLL.lon], {
      icon: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#22c55e;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>', iconSize:[16,16], iconAnchor:[8,8]})
    }).addTo(map).bindPopup('<b>From:</b> ' + from);

    toMarker = L.marker([toLL.lat, toLL.lon], {
      icon: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#ef4444;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>', iconSize:[16,16], iconAnchor:[8,8]})
    }).addTo(map).bindPopup('<b>To:</b> ' + to);

    map.fitBounds(routeLayer.getBounds(), {padding:[40,40]});

    // Calculate cost
    var rate = selectedVehicle === 'car' ? 20 : 3.5;
    var cost = (parseFloat(route.distKm) * rate).toFixed(2);

    // Store trip data
   tripData = {
  name:      name,
  date:      new Date().toLocaleDateString('en-GB'),
  start:     from,
  end:       to,
  distance:  route.distKm,
  duration:  String(route.durMin),
  mode:      selectedVehicle,
  cost:      cost,
  timestamp: new Date().toISOString()
};

    // Show result
    document.getElementById('r-dist').textContent = route.distKm;
    document.getElementById('r-dur').textContent  = route.durMin;
    document.getElementById('r-name').innerHTML   = '👤 <strong>' + name + '</strong>';
    document.getElementById('r-from').innerHTML   = '🟢 <strong>From:</strong> ' + from;
    document.getElementById('r-to').innerHTML     = '🔴 <strong>To:</strong> ' + to;
    document.getElementById('r-cost').innerHTML   = '💰 Estimated Cost: ₹' + cost +
                                                    ' (' + selectedVehicle + ' @ ₹' + rate + '/km)';
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('btn-submit').innerHTML =
      '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Save to Zoho Report';

    document.getElementById('result-card').classList.add('show');
    showMsg(null);
    toast('Route calculated! ' + route.distKm + ' km', 3000);

  } catch(e) {
    showMsg('err');
    document.getElementById('msg-err-text').textContent = '❌ ' + (e.message || 'Could not calculate route. Try more specific locations.');
    console.error(e);
  }

  document.getElementById('btn-calc').disabled = false;
}

// ── SUBMIT TO ZOHO ──
function submitToZoho() {
  if(!tripData) { toast('Calculate route first'); return; }
  document.getElementById('btn-submit').disabled = true;
  showMsg('loading');
  document.getElementById('msg-loading-text').textContent = 'Saving to Zoho...';

  var params = new URLSearchParams();
  Object.keys(tripData).forEach(function(k){ params.append(k, String(tripData[k])); });

  fetch(ZOHO_WEBHOOK_URL + '&' + params.toString(), {method:'GET', mode:'no-cors'})
  .then(function(){
    showMsg('ok');
    document.getElementById('msg-ok-text').textContent =
      '✅ Saved! ' + tripData.name + ' | ' + tripData.distance + ' km | ₹' + tripData.cost;
    document.getElementById('btn-submit').innerHTML =
      '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Saved ✓';
