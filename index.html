<!DOCTYPE html>
<html>
<head>
<title>Map Selector</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
    height: 400px;
}
</style>

</head>

<body>

<h3>Select Start and End Location</h3>

<div id="map"></div>

<br>

Start: <input type="text" id="start" readonly><br><br>
End: <input type="text" id="end" readonly><br><br>

<button onclick="sendData()">Submit</button>

<script>

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

var start = null;
var end = null;

map.on('click', function(e) {

    if (!start) {
        start = e.latlng;
        document.getElementById("start").value = start.lat + "," + start.lng;
        alert("Start selected");
    } 
    else if (!end) {
        end = e.latlng;
        document.getElementById("end").value = end.lat + "," + end.lng;
        alert("End selected");
    } 
});

function sendData() {

    var startVal = document.getElementById("start").value;
    var endVal = document.getElementById("end").value;

    if(startVal === "" || endVal === "") {
        alert("Please select both locations");
        return;
    }

    var url = "https://creatorapp.zoho.com/sarathynds_saryam/distance-calculator-app/#Form:Distance_Calculation_Request"
        + "?Start_Location=" + encodeURIComponent(startVal)
        + "&End_Location=" + encodeURIComponent(endVal);

    window.location.href = url;
}

</script>

</body>
</html>
