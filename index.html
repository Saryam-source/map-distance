<!DOCTYPE html>
<html>
<head>
    <title>House-to-House Distance Calculator</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- Leaflet -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f5f5f5;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
            background:white;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            padding:12px 20px;
            background:#4285f4;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-right:10px;
        }

        #distance{
            background:#eee;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>
    <input id="start" placeholder="Enter house address">

    <h3>End Location</h3>
    <input id="end" placeholder="Enter house address">

    <h3>Distance</h3>
    <input id="distance" readonly>

    <button onclick="calculateDistance()">
        Calculate Distance
    </button>

    <button onclick="resetMap()">
        Reset
    </button>

</div>

<script>

const API_KEY = "YOUR_GOOGLE_API_KEY";

var map = L.map('map').setView([13.0827,80.2707],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var startMarker=null;
var endMarker=null;
var routeLine=null;

async function geocode(address){

    let url =
    "https://maps.googleapis.com/maps/api/geocode/json?address="
    + encodeURIComponent(address)
    + "&key="
    + API_KEY;

    let response = await fetch(url);
    let data = await response.json();

    if(data.status==="OK"){
        return data.results[0];
    }

    return null;
}

async function calculateDistance(){

    let start =
    document.getElementById("start").value;

    let end =
    document.getElementById("end").value;

    if(!start || !end){
        alert("Enter both addresses");
        return;
    }

    let startResult = await geocode(start);
    let endResult = await geocode(end);

    if(!startResult){
        alert("Start address not found");
        return;
    }

    if(!endResult){
        alert("End address not found");
        return;
    }

    let s =
    startResult.geometry.location;

    let e =
    endResult.geometry.location;

    let startLatLng =
    L.latLng(s.lat,s.lng);

    let endLatLng =
    L.latLng(e.lat,e.lng);

    if(startMarker) map.removeLayer(startMarker);
    if(endMarker) map.removeLayer(endMarker);
    if(routeLine) map.removeLayer(routeLine);

    startMarker =
    L.marker(startLatLng)
    .addTo(map);

    endMarker =
    L.marker(endLatLng)
    .addTo(map);

    routeLine =
    L.polyline(
        [startLatLng,endLatLng],
        {color:'blue'}
    ).addTo(map);

    map.fitBounds(routeLine.getBounds());

    let distance =
    startLatLng.distanceTo(endLatLng)/1000;

    document.getElementById("distance").value =
    distance.toFixed(2) + " KM";

    window.parent.postMessage({

        start:startResult.formatted_address,
        end:endResult.formatted_address,
        distance:distance.toFixed(2)

    },"*");
}

function resetMap(){

    if(startMarker) map.removeLayer(startMarker);
    if(endMarker) map.removeLayer(endMarker);
    if(routeLine) map.removeLayer(routeLine);

    document.getElementById("start").value="";
    document.getElementById("end").value="";
    document.getElementById("distance").value="";

    map.setView([13.0827,80.2707],11);
}

</script>

</body>
</html>
