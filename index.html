<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0e1117;
--surface:#161b25;
--surface2:#1e2535;
--border:#2a3347;
--text:#e8edf5;
--muted:#7a8499;
--accent:#3b82f6;
--accent2:#60a5fa;
--green:#22c55e;
--red:#ef4444;
--radius:10px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
display:flex;
}

.sidebar{
width:390px;
min-width:390px;
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow:hidden;
z-index:100;
}

.brand{
padding:16px 20px 12px;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
gap:10px;
}

.brand-title{
font-size:15px;
font-weight:600;
}

.brand-sub{
font-size:11px;
color:var(--muted);
margin-top:1px;
}

.pane{
padding:14px 16px;
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.field-label{
font-size:10px;
font-weight:700;
letter-spacing:.6px;
color:var(--muted);
text-transform:uppercase;
margin-bottom:5px;
}

.form-input{
width:100%;
padding:11px 14px;
font-size:13px;
font-family:inherit;
background:var(--bg);
border:1.5px solid var(--border);
border-radius:var(--radius);
color:var(--text);
outline:none;
transition:.2s;
}

.form-input:focus{
border-color:var(--accent);
background:var(--surface2);
}

.ac-wrap{
position:relative;
}

.ac-list{
position:absolute;
top:100%;
left:0;
right:0;
background:var(--surface);
border:1.5px solid var(--accent);
border-top:none;
border-radius:0 0 var(--radius) var(--radius);
z-index:9999;
max-height:240px;
overflow-y:auto;
display:none;
}

.ac-list.show{
display:block;
}

.ac-item{
padding:9px 14px;
font-size:12px;
cursor:pointer;
border-bottom:1px solid var(--border);
}

.ac-item:hover{
background:var(--surface2);
}

.ac-main{
font-weight:600;
color:var(--text);
}

.ac-sub{
color:var(--muted);
font-size:11px;
margin-top:2px;
}

.pin-row{
display:flex;
gap:6px;
margin-top:4px;
}

.btn-pin{
flex:1;
padding:8px;
font-size:11px;
font-weight:600;
border:1.5px solid var(--border);
border-radius:var(--radius);
background:var(--surface2);
color:var(--muted);
cursor:pointer;
transition:.2s;
}

.btn-pin.active{
border-color:var(--green);
background:var(--green);
color:#fff;
}

.vehicle-selector{
display:flex;
gap:8px;
}

.vehicle-btn{
flex:1;
padding:11px 8px;
font-size:12px;
font-weight:600;
border:1.5px solid var(--border);
border-radius:var(--radius);
background:var(--surface2);
color:var(--muted);
cursor:pointer;
transition:.2s;
}

.vehicle-btn.active{
border-color:var(--accent);
background:var(--accent);
color:#fff;
}

.btn-calc,.btn-submit{
width:100%;
padding:13px;
font-size:14px;
font-weight:700;
border:none;
border-radius:var(--radius);
cursor:pointer;
transition:.2s;
color:#fff;
}

.btn-calc{
background:var(--green);
}

.btn-submit{
background:var(--accent);
}

.status-msg{
border-radius:8px;
padding:10px 12px;
font-size:12px;
display:none;
gap:8px;
line-height:1.5;
}

.status-msg.show{
display:flex;
}

.status-msg.ok{
background:rgba(34,197,94,.1);
border:1px solid rgba(34,197,94,.25);
color:var(--green);
}

.status-msg.err{
background:rgba(239,68,68,.1);
border:1px solid rgba(239,68,68,.25);
color:var(--red);
}

.status-msg.loading{
background:rgba(59,130,246,.1);
border:1px solid rgba(59,130,246,.25);
color:var(--accent2);
}

.result-card{
background:var(--bg);
border:1.5px solid var(--accent);
border-radius:12px;
padding:14px;
display:none;
flex-direction:column;
gap:10px;
}

.result-card.show{
display:flex;
}

.rc-top{
display:flex;
gap:8px;
}

.rc-metric{
flex:1;
background:var(--surface2);
border-radius:8px;
padding:10px;
text-align:center;
}

.rc-label{
font-size:9px;
text-transform:uppercase;
letter-spacing:.5px;
color:var(--muted);
margin-bottom:3px;
}

.rc-value{
font-size:22px;
font-weight:700;
color:var(--accent2);
font-family:'DM Mono',monospace;
}

.rc-unit{
font-size:9px;
color:var(--muted);
}

.rc-row{
font-size:12px;
color:var(--muted);
line-height:1.5;
}

.rc-row strong{
color:var(--text);
}

.rc-cost{
font-size:16px;
font-weight:700;
color:var(--green);
padding:8px 12px;
background:rgba(34,197,94,.08);
border:1px solid rgba(34,197,94,.2);
border-radius:8px;
text-align:center;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--surface2);
color:var(--text);
border:1px solid var(--border);
padding:10px 20px;
border-radius:20px;
font-size:13px;
z-index:99999;
opacity:0;
transition:.3s;
}

.toast.show{
opacity:1;
}

#map{
flex:1;
height:100vh;
}

@media(max-width:768px){

body{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
min-width:100%;
}

#map{
height:55vh;
}

}

</style>
</head>

<body>

<aside class="sidebar">

<div class="brand">
<div>
<div class="brand-title">Employee Travel Tracker</div>
<div class="brand-sub">Distance · Route · Zoho Sync</div>
</div>
</div>

<div class="pane">

<div>
<div class="field-label">Employee Name</div>

<!-- EASY TO ADD EMPLOYEES -->
<select id="person-name" class="form-input">

<option value="">-- Select Employee --</option>

<option value="Madhumita">Madhumita</option>
<option value="Muni">Muni</option>
<option value="Sarath">Sarath</option>
<option value="Yamuna">Yamuna</option>
<option value="Antony">Antony</option>

</select>
</div>

<div>
<div class="field-label">Travel Date</div>
<input type="date" id="travel-date" class="form-input"/>
</div>

<div>
<div class="field-label">From Location</div>

<div class="ac-wrap">
<input
type="text"
id="from-loc"
class="form-input"
placeholder="Enter starting location..."
autocomplete="off"
oninput="acSearch(this,'from-list')"
/>

<div class="ac-list" id="from-list"></div>
</div>
</div>

<div>
<div class="field-label">To Location</div>

<div class="ac-wrap">
<input
type="text"
id="to-loc"
class="form-input"
placeholder="Enter destination..."
autocomplete="off"
oninput="acSearch(this,'to-list')"
/>

<div class="ac-list" id="to-list"></div>
</div>
</div>

<div>
<div class="field-label">Pin Exact GPS Location</div>

<div class="pin-row">

<button class="btn-pin" id="btn-pin-from" onclick="startPin('from')">
📍 Pin From
</button>

<button class="btn-pin" id="btn-pin-to" onclick="startPin('to')">
📍 Pin To
</button>

</div>
</div>

<div>
<div class="field-label">Vehicle Type</div>

<div class="vehicle-selector">

<button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">
Bike Rs.3.5/km
</button>

<button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">
Car Rs.20/km
</button>

</div>
</div>

<button class="btn-calc" onclick="calculateRoute()">
Calculate Route
</button>

<div class="status-msg loading" id="msg-loading">
<span id="msg-loading-text">Calculating...</span>
</div>

<div class="status-msg err" id="msg-err">
<span id="msg-err-text"></span>
</div>

<div class="result-card" id="result-card">

<div class="rc-top">

<div class="rc-metric">
<div class="rc-label">Distance</div>
<div class="rc-value" id="r-dist">-</div>
<div class="rc-unit">km</div>
</div>

<div class="rc-metric">
<div class="rc-label">Duration</div>
<div class="rc-value" id="r-dur">-</div>
<div class="rc-unit">min</div>
</div>

</div>

<div class="rc-row" id="r-name"></div>
<div class="rc-row" id="r-date"></div>
<div class="rc-row" id="r-from"></div>
<div class="rc-row" id="r-to"></div>

<div class="rc-cost" id="r-cost"></div>

<button class="btn-submit" id="btn-submit" onclick="submitToZoho()">
Save to Zoho Report
</button>

<div class="status-msg ok" id="msg-ok">
<span>Saved Successfully</span>
</div>

</div>

</div>
</aside>

<div id="map"></div>

<div class="toast" id="toast"></div>

<script>

var ZOHO_WEBHOOK_URL = "YOUR_ZOHO_WEBHOOK_URL_HERE";

document.getElementById("travel-date").value =
new Date().toISOString().split("T")[0];

var map = L.map("map").setView([13.0827,80.2707],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:22,
attribution:"© OpenStreetMap"
}
).addTo(map);

var selectedVehicle = "bike";
var routeLayer = null;
var fromMarker = null;
var toMarker = null;
var tripData = null;
var pinMode = null;

function toast(msg){

var t = document.getElementById("toast");

t.innerHTML = msg;

t.classList.add("show");

setTimeout(function(){
t.classList.remove("show");
},2500);

}

function selectVehicle(type){

selectedVehicle = type;

document.getElementById("btn-bike").classList.remove("active");
document.getElementById("btn-car").classList.remove("active");

document.getElementById(
type === "bike" ? "btn-bike" : "btn-car"
).classList.add("active");

}

function startPin(type){

pinMode = type;

toast("Click anywhere on the map");

}

map.on("click", async function(e){

if(!pinMode) return;

var lat = e.latlng.lat;
var lon = e.latlng.lng;

try{

var response = await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
);

var data = await response.json();

var address = data.display_name ||
(lat.toFixed(6)+","+lon.toFixed(6));

if(pinMode === "from"){

document.getElementById("from-loc").value = address;

if(fromMarker) map.removeLayer(fromMarker);

fromMarker = L.marker([lat,lon]).addTo(map);

}else{

document.getElementById("to-loc").value = address;

if(toMarker) map.removeLayer(toMarker);

toMarker = L.marker([lat,lon]).addTo(map);

}

toast("Exact GPS location pinned");

pinMode = null;

}catch(err){

toast("Unable to pin location");

}

});

async function acSearch(input,listId){

var query = input.value.trim();

var list = document.getElementById(listId);

if(query.length < 3){

list.style.display = "none";
return;

}

try{

var url =
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(query)
+ "&limit=10";

var response = await fetch(url);

var data = await response.json();

list.innerHTML = "";

data.forEach(function(item){

var div = document.createElement("div");

div.className = "ac-item";

div.innerHTML =
'<div class="ac-main">'+item.display_name.split(",")[0]+'</div>' +
'<div class="ac-sub">'+item.display_name+'</div>';

div.onclick = function(){

if(listId === "from-list"){

document.getElementById("from-loc").value =
item.display_name;

}else{

document.getElementById("to-loc").value =
item.display_name;

}

list.style.display = "none";

};

list.appendChild(div);

});

list.style.display = "block";

}catch(err){

console.log(err);

}

}

async function geocode(address){

var response = await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(address)
+ "&limit=1"
);

var data = await response.json();

if(!data.length){

throw new Error("Location not found");

}

return {
lat:parseFloat(data[0].lat),
lon:parseFloat(data[0].lon)
};

}

async function getRoute(from,to){

var response = await fetch(
"https://router.project-osrm.org/route/v1/driving/"
+ from.lon + "," + from.lat + ";"
+ to.lon + "," + to.lat
+ "?overview=full&geometries=geojson"
);

var data = await response.json();

var route = data.routes[0];

return {

distance:(route.distance/1000).toFixed(2),

duration:Math.round(route.duration/60),

coords:route.geometry.coordinates.map(function(c){
return [c[1],c[0]];
})

};

}

async function calculateRoute(){

try{

var name =
document.getElementById("person-name").value;

var date =
document.getElementById("travel-date").value;

var from =
document.getElementById("from-loc").value;

var to =
document.getElementById("to-loc").value;

if(!name || !date || !from || !to){

alert("Please fill all fields");
return;

}

document.getElementById("msg-loading").classList.add("show");

var fromLL = await geocode(from);
var toLL = await geocode(to);

var route = await getRoute(fromLL,toLL);

if(routeLayer){

map.removeLayer(routeLayer);

}

routeLayer = L.polyline(route.coords,{
color:"#3b82f6",
weight:6
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

var rate = selectedVehicle === "car" ? 20 : 3.5;

var cost =
(parseFloat(route.distance) * rate).toFixed(2);

tripData = {

employee_name:name,
travel_date:date,
from_location:from,
to_location:to,
distance:route.distance,
duration:route.duration,
vehicle:selectedVehicle,
cost:cost

};

document.getElementById("r-dist").innerHTML =
route.distance;

document.getElementById("r-dur").innerHTML =
route.duration;

document.getElementById("r-name").innerHTML =
"Employee : <strong>"+name+"</strong>";

document.getElementById("r-date").innerHTML =
"Date : <strong>"+date+"</strong>";

document.getElementById("r-from").innerHTML =
"From : <strong>"+from+"</strong>";

document.getElementById("r-to").innerHTML =
"To : <strong>"+to+"</strong>";

document.getElementById("r-cost").innerHTML =
"Estimated Cost : Rs."+cost;

document.getElementById("result-card")
.classList.add("show");

document.getElementById("msg-loading")
.classList.remove("show");

toast("Route calculated");

}catch(err){

document.getElementById("msg-loading")
.classList.remove("show");

document.getElementById("msg-err")
.classList.add("show");

document.getElementById("msg-err-text")
.innerHTML = err.message;

}

}

async function submitToZoho(){

if(!tripData){

toast("Calculate route first");
return;

}

try{

var params = new URLSearchParams(tripData);

await fetch(
ZOHO_WEBHOOK_URL + "&" + params.toString(),
{
method:"GET",
mode:"no-cors"
}
);

document.getElementById("msg-ok")
.classList.add("show");

toast("Saved to Zoho");

}catch(err){

toast("Failed to save");

}

}

</script>

</body>
</html>
