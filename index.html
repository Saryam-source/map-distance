<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<style>

:root{

--bg:#fffdf4;

--surface:#fff9e8ee;

--surface2:#fffdf6;

--border:#f3e7b7;

--text:#433728;

--muted:#8a7b5d;

--accent:#f4dc88;

--accent-dark:#e8ca63;

--green:#22c55e;

--red:#ef4444;

--radius:20px;

--shadow:
0 10px 35px rgba(212,190,120,.10);

}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

/* BODY */

body{

font-family:'DM Sans',sans-serif;

background:
linear-gradient(
135deg,
#fffef9 0%,
#fff8dc 45%,
#fff4c9 100%
);

color:var(--text);

display:flex;

height:100vh;

overflow:hidden;

animation:fadePage .7s ease;
}

/* SIDEBAR */

.sidebar{

width:390px;

background:var(--surface);

backdrop-filter:blur(18px);

border-right:1px solid var(--border);

display:flex;

flex-direction:column;

overflow-y:auto;

box-shadow:var(--shadow);

z-index:999;

animation:slideLeft .7s ease;
}

/* SCROLLBAR */

.sidebar::-webkit-scrollbar{
width:6px;
}

.sidebar::-webkit-scrollbar-thumb{
background:#eadb9c;
border-radius:20px;
}

/* BRAND */

.brand{

padding:26px;

border-bottom:1px solid var(--border);

background:
linear-gradient(
180deg,
#fff6cf,
#fff9e6
);

}

.brand-title{

font-size:25px;

font-weight:700;

letter-spacing:.4px;

color:#4a3d2d;
}

.brand-sub{

font-size:13px;

margin-top:6px;

color:var(--muted);
}

/* FORM AREA */

.pane{

padding:22px;

display:flex;

flex-direction:column;

gap:18px;
}

/* LABEL */

.field-label{

font-size:11px;

font-weight:700;

letter-spacing:1px;

margin-bottom:8px;

color:var(--muted);

text-transform:uppercase;
}

/* INPUT */

.form-input{

width:100%;

padding:14px 16px;

border-radius:16px;

border:1px solid var(--border);

background:#fffdf7;

font-size:14px;

outline:none;

transition:all .28s ease;

color:var(--text);

box-shadow:
0 2px 8px rgba(15,23,42,.03);
}

.form-input:focus{

border-color:var(--accent-dark);

transform:translateY(-2px);

background:#ffffff;

box-shadow:
0 0 0 4px rgba(244,220,136,.25),
0 12px 28px rgba(244,220,136,.12);
}

/* AUTOCOMPLETE */

.ac-wrap{
position:relative;
}

.ac-list{

position:absolute;

top:100%;
left:0;
right:0;

background:#fffdf8;

border:1px solid var(--border);

border-radius:18px;

overflow:hidden;

max-height:250px;

overflow-y:auto;

display:none;

z-index:99999;

box-shadow:var(--shadow);

margin-top:8px;

animation:fadeUp .25s ease;
}

.ac-list.show{
display:block;
}

.ac-item{

padding:14px;

cursor:pointer;

transition:.25s ease;

border-bottom:1px solid #f8efc8;
}

.ac-item:hover{

background:#fff5c7;

padding-left:18px;
}

.ac-main{

font-size:13px;

font-weight:600;
}

.ac-sub{

font-size:11px;

margin-top:4px;

color:var(--muted);
}

/* BUTTON GROUP */

.pin-row,
.vehicle-selector{

display:flex;

gap:12px;
}

/* BUTTONS */

.btn-pin,
.vehicle-btn,
.btn-calc,
.btn-submit{

padding:14px;

border:none;

border-radius:16px;

font-weight:700;

cursor:pointer;

transition:all .28s ease;

position:relative;

overflow:hidden;

font-size:14px;
}

/* FLOATING SHINE */

.btn-pin::before,
.vehicle-btn::before,
.btn-calc::before,
.btn-submit::before{

content:'';

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.65),
transparent
);

transition:.7s;
}

.btn-pin:hover::before,
.vehicle-btn:hover::before,
.btn-calc:hover::before,
.btn-submit:hover::before{

left:120%;
}

/* SECONDARY BUTTONS */

.btn-pin,
.vehicle-btn{

background:#fff9e8;

border:1px solid var(--border);

color:#4a3d2d;
}

/* ACTIVE VEHICLE */

.vehicle-btn.active{

background:
linear-gradient(
135deg,
#f8e08e,
#f4d96b
);

color:#5a4713;

box-shadow:
0 10px 24px rgba(244,217,107,.24);
}

/* ACTIVE PIN */

.btn-pin.active{

background:
linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:#fff;

box-shadow:
0 10px 24px rgba(22,163,74,.24);
}

/* CALCULATE BUTTON */

.btn-calc{

background:
linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:#fff;

box-shadow:
0 10px 24px rgba(22,163,74,.22);
}

/* SUBMIT BUTTON */

.btn-submit{

background:
linear-gradient(
135deg,
#f8e08e,
#f4d96b
);

color:#5a4713;

box-shadow:
0 10px 24px rgba(244,217,107,.24);
}

/* HOVER EFFECT */

.btn-pin:hover,
.vehicle-btn:hover,
.btn-calc:hover,
.btn-submit:hover{

transform:
translateY(-4px)
scale(1.01);

box-shadow:
0 16px 35px rgba(0,0,0,.08);
}

/* DISABLED */

.btn-submit:disabled{

opacity:.7;

cursor:not-allowed;
}

/* RESULT CARD */

.result-card{

display:none;

flex-direction:column;

gap:16px;

padding:22px;

border-radius:22px;

background:#fffdf8;

border:1px solid var(--border);

box-shadow:var(--shadow);

animation:fadeUp .45s ease;
}

.result-card.show{
display:flex;
}

/* METRICS */

.metric{

font-size:32px;

font-weight:700;

letter-spacing:.5px;

color:#4b3f2f;
}

#r-cost{

font-size:15px;

font-weight:600;

color:#c89d1d;
}

/* MAP */

#map{

flex:1;

height:100vh;

background:#f7efc6;
}

/* TOAST */

.toast{

position:fixed;

bottom:24px;
left:50%;

transform:translateX(-50%);

background:#4b3f2f;

color:#fff;

padding:14px 22px;

border-radius:30px;

font-size:13px;

opacity:0;

transition:.3s;

z-index:999999;

box-shadow:
0 10px 30px rgba(0,0,0,.18);
}

.toast.show{

opacity:1;

bottom:34px;
}

/* LEAFLET */

.leaflet-popup-content-wrapper{

border-radius:14px;

background:#fffdf7;
}

.leaflet-popup-tip{

background:#fffdf7;
}

.leaflet-control-zoom a{

border:none!important;

background:#fffdf8!important;

color:#4b3f2f!important;
}

/* GLASS EFFECT */

.sidebar,
.result-card,
.ac-list{

backdrop-filter:blur(18px);
}

/* ANIMATIONS */

@keyframes fadePage{

from{
opacity:0;
transform:scale(1.01);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes slideLeft{

from{
opacity:0;
transform:translateX(-40px);
}

to{
opacity:1;
transform:translateX(0);
}

}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
}

#map{
height:55vh;
}

}

</style>
</head>

<body>

<aside class="sidebar">

<div class="brand">
<div class="brand-title">
Employee Travel Tracker
</div>

<div class="brand-sub">
Distance · Route · Zoho Sync
</div>
</div>

<div class="pane">

<div>
<div class="field-label">Employee Name</div>

<input
type="text"
id="person-name"
class="form-input"
placeholder="Select or type employee name"
list="employee-list"
/>

<datalist id="employee-list">
<option value="Madhumita">
<option value="Muni">
<option value="Sarath">
<option value="Yamuna">
<option value="Antony">
</datalist>
</div>

<div>
<div class="field-label">Travel Date</div>

<input
type="date"
id="travel-date"
class="form-input"/>
</div>

<div>
<div class="field-label">From</div>

<div class="ac-wrap">

<input
type="text"
id="from-loc"
class="form-input"
placeholder="Enter starting location..."
autocomplete="off"
oninput="acSearch(this,'from-list')"/>

<div class="ac-list" id="from-list"></div>

</div>
</div>

<div>
<div class="field-label">To</div>

<div class="ac-wrap">

<input
type="text"
id="to-loc"
class="form-input"
placeholder="Enter destination..."
autocomplete="off"
oninput="acSearch(this,'to-list')"/>

<div class="ac-list" id="to-list"></div>

</div>
</div>

<div>
<div class="field-label">Manual Pin Location</div>

<div class="pin-row">

<button
class="btn-pin"
id="btn-pin-from"
onclick="startPin('from')">

📍 Pin From

</button>

<button
class="btn-pin"
id="btn-pin-to"
onclick="startPin('to')">

📍 Pin To

</button>

</div>
</div>

<div>
<div class="field-label">Vehicle Type</div>

<div class="vehicle-selector">

<button
class="vehicle-btn active"
id="btn-bike"
onclick="selectVehicle('bike')">

Bike Rs.3.5/km

</button>

<button
class="vehicle-btn"
id="btn-car"
onclick="selectVehicle('car')">

Car Rs.20/km

</button>

</div>
</div>

<button
type="button"
class="btn-calc"
onclick="calculateRoute()">
Calculate Route

</button>

<button
class="btn-submit"
onclick="startLiveTracking()">

Start Live Tracking

</button>

<div class="result-card" id="result-card">

<div>
Distance
<div class="metric" id="r-dist">0 KM</div>
</div>

<div>
Duration
<div class="metric" id="r-dur">0 MIN</div>
</div>

<div id="r-cost"></div>

<button
class="btn-submit"
id="save-btn"
onclick="submitToZoho()">

Save to Zoho

</button>

</div>

</div>

</aside>

<div id="map"></div>

<div class="toast" id="toast"></div>

<script>

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";
document.getElementById('travel-date').value =
new Date().toISOString().split('T')[0];

var map = L.map('map')
.setView([13.0827,80.2707],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var selectedVehicle = 'bike';

var routeLayer = null;

var fromMarker = null;
var toMarker = null;

var fromCoords = null;
var toCoords = null;

var tripData = null;

var pinMode = null;

var liveTracking = false;

var watchId = null;

var currentMarker = null;

var destinationReached = false;

var trackingStartTime = null;

var trackingEndTime = null;

function toast(msg){

var t = document.getElementById('toast');

t.textContent = msg;

t.classList.add('show');

clearTimeout(t._t);

t._t = setTimeout(function(){

t.classList.remove('show');

},2500);

}

function selectVehicle(type){

selectedVehicle = type;

document.getElementById('btn-bike')
.classList.toggle('active',type==='bike');

document.getElementById('btn-car')
.classList.toggle('active',type==='car');

}

function startPin(type){

pinMode = type;

document.getElementById('btn-pin-from')
.classList.toggle('active',type==='from');

document.getElementById('btn-pin-to')
.classList.toggle('active',type==='to');

map.getContainer().style.cursor = 'crosshair';

toast('Click on map to pin ' + type);

}

async function acSearch(input,listId){

var query = input.value.trim();

var list = document.getElementById(listId);

if(query.length < 3){

list.classList.remove('show');

list.innerHTML = '';

return;

}

try{

var url =
'https://nominatim.openstreetmap.org/search?format=json&q=' +
encodeURIComponent(query) +
'&countrycodes=in&limit=5&addressdetails=1';

var r = await fetch(url,{
headers:{
'Accept-Language':'en',
'User-Agent':'EmployeeTravelTracker'
}
});

var d = await r.json();

if(!d.length){

list.classList.remove('show');
return;

}

list.innerHTML = d.map(function(item){

var full = item.display_name;

var safe = full
.replace(/\\/g,'\\\\')
.replace(/'/g,"\\'");

return `
<div class="ac-item"

onmousedown="acSelect(
'${listId}',
'${safe}',
'${item.lat}',
'${item.lon}'
)">

<div class="ac-main">
${full.split(',')[0]}
</div>

<div class="ac-sub">
${full}
</div>

</div>
`;

}).join('');

list.classList.add('show');

}catch(e){

console.error(e);

}

}

function acSelect(listId,value,lat,lon){

var isFrom = listId === 'from-list';

var inputId =
isFrom ? 'from-loc' : 'to-loc';

document.getElementById(inputId)
.value = value;

document.getElementById(listId)
.classList.remove('show');

lat = parseFloat(lat);
lon = parseFloat(lon);

var latlng = [lat,lon];

if(isFrom){

fromCoords = {
lat:lat,
lon:lon
};

if(fromMarker){
map.removeLayer(fromMarker);
}

var greenIcon = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',

shadowUrl:
'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

iconSize:[25,41],
iconAnchor:[12,41]

});

fromMarker = L.marker(latlng,{
icon:greenIcon
})

.addTo(map)

.bindPopup(
'<b>FROM</b><br>' + value
)

.openPopup();

}else{

toCoords = {
lat:lat,
lon:lon
};

if(toMarker){
map.removeLayer(toMarker);
}

var redIcon = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

shadowUrl:
'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

iconSize:[25,41],
iconAnchor:[12,41]

});

toMarker = L.marker(latlng,{
icon:redIcon
})

.addTo(map)

.bindPopup(
'<b>TO</b><br>' + value
)

.openPopup();

}

if(fromCoords && toCoords){

var bounds = L.latLngBounds([
[fromCoords.lat,fromCoords.lon],
[toCoords.lat,toCoords.lon]
]);

map.fitBounds(bounds,{
padding:[50,50]
});

}else{

map.flyTo(latlng,15);

}

toast(
(isFrom ? 'FROM' : 'TO') +
' pinned successfully'
);

}
map.on('click',async function(e){

if(!pinMode) return;

var lat = e.latlng.lat;
var lon = e.latlng.lng;

try{

var r = await fetch(

'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
lat +
'&lon=' +
lon,

{
headers:{
'Accept-Language':'en',
'User-Agent':'EmployeeTravelTracker'
}
}

);

var d = await r.json();

var addr =
d.display_name ||
(lat.toFixed(5)+','+lon.toFixed(5));

if(pinMode === 'from'){

acSelect(
'from-list',
addr,
lat,
lon
);

}else{

acSelect(
'to-list',
addr,
lat,
lon
);

}

pinMode = null;

document.getElementById('btn-pin-from')
.classList.remove('active');

document.getElementById('btn-pin-to')
.classList.remove('active');

map.getContainer().style.cursor='';

}catch(ex){

console.error(ex);

toast('Pin failed');

}

});

async function getRoute(from,to){

var url =
'https://router.project-osrm.org/route/v1/driving/' +
from.lon + ',' + from.lat +
';' +
to.lon + ',' + to.lat +
'?overview=full&geometries=geojson';

var r = await fetch(url);

var d = await r.json();

if(!d.routes || !d.routes.length){

throw new Error('Route not found');

}

var route = d.routes[0];

return {

distKm:
(route.distance/1000).toFixed(2),

durMin:
Math.round(route.duration/60),

coords:
route.geometry.coordinates.map(function(c){

return [c[1],c[0]];

})

};

}

async function calculateRoute(){

try{

var name =
document.getElementById('person-name').value;

/* UPDATED DATE FORMAT FIX */

var rawDate =
document.getElementById('travel-date').value;

if(!rawDate){
   toast('Please select date');
   return;
}

var parts = rawDate.split('-');

var months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

var date =
parts[2] + '-' +
months[parseInt(parts[1]) - 1] + '-' +
parts[0];

/* END DATE FIX */

var from =
document.getElementById('from-loc').value;

var to =
document.getElementById('to-loc').value;
if(!name || !from || !to){

alert('Please fill all fields');
return;

}

if(!fromCoords || !toCoords){

toast('Please select valid locations');
return;

}

var route =
await getRoute(fromCoords,toCoords);

if(routeLayer){

map.removeLayer(routeLayer);

}

routeLayer = L.polyline(route.coords,{
color:'#3b82f6',
weight:6
}).addTo(map);

map.fitBounds(routeLayer.getBounds(),{
padding:[40,40]
});

var rate =
selectedVehicle === 'car'
? 20
: 3.5;

var cost =
(parseFloat(route.distKm) * rate)
.toFixed(2);

  tripData = {

Name: name,

Travel_Date: date,

start: from,

end: to,

distance: parseFloat(route.distKm),

duration: String(route.durMin),

mode: selectedVehicle,

cost: parseFloat(cost),

travel_time:
tripData && tripData.travel_time
? tripData.travel_time
: '',

timestamp: new Date().toISOString()

};
document.getElementById('r-dist')
.textContent =
route.distKm + ' KM';

document.getElementById('r-dur')
.textContent =
route.durMin + ' MIN';

document.getElementById('r-cost')
.innerHTML =
'Estimated Cost: Rs.' + cost;

document.getElementById('result-card')
.classList.add('show');

document.getElementById('save-btn')
.disabled = false;

document.getElementById('save-btn')
.innerHTML = 'Save to Zoho';

document.getElementById('save-btn')
.style.background = '';

toast('Route calculated');

}catch(e){

console.error(e);

toast('Failed to calculate route');

}

}

function submitToZoho() {

if(!tripData){
toast('Calculate route first');
return;
}

var btn = document.getElementById('save-btn');

btn.disabled = true;

btn.innerHTML = 'Saving...';

var params = new URLSearchParams();

Object.keys(tripData).forEach(function(k){
params.append(k, String(tripData[k]));
});

console.log(tripData);


fetch(
ZOHO_WEBHOOK_URL + '&' + params.toString(),
{
method:'GET',
mode:'no-cors'
}
)

.then(function(){

btn.innerHTML = 'Saved ✓';

btn.style.background = '#22c55e';

toast('Saved to Zoho');

})

.catch(function(error){

console.error(error);

btn.disabled = false;

btn.innerHTML = 'Save to Zoho';

toast('Failed to save');

});

}
function startLiveTracking(){

if(!navigator.geolocation){

toast('Geolocation not supported');
return;

}

if(!toCoords){

toast('Please select destination');
return;

}

liveTracking = true;

destinationReached = false;

trackingStartTime = new Date();

toast('Live tracking started');

watchId = navigator.geolocation.watchPosition(

function(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

var currentLatLng = [lat, lon];

if(currentMarker){

currentMarker.setLatLng(currentLatLng);

}else{

currentMarker = L.circleMarker(currentLatLng,{
radius:10,
fillColor:"#2563eb",
color:"#ffffff",
weight:3,
opacity:1,
fillOpacity:0.9
})
.addTo(map)
.bindPopup('Live Location');

}
map.setView(currentLatLng, 15);

var remaining =
map.distance(
currentLatLng,
[toCoords.lat, toCoords.lon]
);

if(remaining < 500 && !destinationReached){

destinationReached = true;

trackingEndTime = new Date();

toast('Destination reached');

navigator.geolocation.clearWatch(watchId);

liveTracking = false;

/* CREATE TRAVEL TIME */

var start =
trackingStartTime.toLocaleTimeString();

var end =
trackingEndTime.toLocaleTimeString();

var totalMinutes =
Math.round(
(trackingEndTime - trackingStartTime) / 60000
);

var finalTravelTime =
start + ' - ' + end +
' (' + totalMinutes + ' mins)';

/* UPDATE tripData */

if(tripData){

tripData.travel_time =
finalTravelTime;

}

/* NOW SAVE */

calculateRoute().then(function(){

tripData.travel_time =
finalTravelTime;

submitToZoho();

});

}

},

function(error){

console.error(error);

toast('Location access denied');

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);


}

</script>

</body>
</html>
