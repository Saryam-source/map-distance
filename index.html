<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:300px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            margin-left:10px;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>

    <input type="text"
           id="start"
           placeholder="Enter Start Location">

    <button onclick="searchStart()">
        Search
    </button>

    <br><br>

    <h3>End Location</h3>

    <input type="text"
           id="end"
           placeholder="Enter End Location">

    <button onclick="searchEnd()">
        Search
    </button>

    <br><br>

    <h3>Distance (KM)</h3>

    <input type="text"
           id="distance"
           readonly>

</div>

<script>

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom: 19
    }
).addTo(map);

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ----------------------
// SEARCH START LOCATION
// ----------------------

async function searchStart(){

    var location =
        document.getElementById("start").value;

    if(location == ""){
        alert("Enter Start Location");
        return;
    }

    var url =
        "https://nominatim.openstreetmap.org/search?format=json&q="
        + encodeURIComponent(location);

    var response = await fetch(url);

    var data = await response.json();

    if(data.length == 0){
        alert("Location not found");
        return;
    }

    var lat = parseFloat(data[0].lat);
    var lon = parseFloat(data[0].lon);

    startLatLng = L.latLng(lat, lon);

    if(startMarker){
        map.removeLayer(startMarker);
    }

    startMarker = L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

    map.setView(startLatLng, 13);

    calculateDistance();
}

// ----------------------
// SEARCH END LOCATION
// ----------------------

async function searchEnd(){

    var location =
        document.getElementById("end").value;

    if(location == ""){
        alert("Enter End Location");
        return;
    }

    var url =
        "https://nominatim.openstreetmap.org/search?format=json&q="
        + encodeURIComponent(location);

    var response = await fetch(url);

    var data = await response.json();

    if(data.length == 0){
        alert("Location not found");
        return;
    }

    var lat = parseFloat(data[0].lat);
    var lon = parseFloat(data[0].lon);

    endLatLng = L.latLng(lat, lon);

    if(endMarker){
        map.removeLayer(endMarker);
    }

    endMarker = L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location")
        .openPopup();

    map.setView(endLatLng, 13);

    calculateDistance();
}

// ----------------------
// CLICK ON MAP
// ----------------------

map.on('click', async function(e){

    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker = L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

        document.getElementById("start").value =
            startLatLng.lat.toFixed(5)
            + ", "
            + startLatLng.lng.toFixed(5);

    }
    else if(!endLatLng){

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker = L.marker(endLatLng)
            .addTo(map)
            .bindPopup("End Location")
            .openPopup();

        document.getElementById("end").value =
            endLatLng.lat.toFixed(5)
            + ", "
            + endLatLng.lng.toFixed(5);

        calculateDistance();
    }

});

// ----------------------
// CALCULATE DISTANCE
// ----------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
            startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
            distance.toFixed(2);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine = L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue'
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO

        window.parent.postMessage({

            start:
                document.getElementById("start").value,

            end:
                document.getElementById("end").value,

            distance:
                distance.toFixed(2)

        }, "*");
    }
}

</script>

</body>
</html>
