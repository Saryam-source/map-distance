<script>

var map = L.map('map').setView([13.0827, 80.2707], 11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom: 19
}).addTo(map);

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ------------------------------------
// COMMON LOCATION SEARCH FUNCTION
// ------------------------------------

async function searchLocation(location){

    try{

        var url =
        "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
        + encodeURIComponent(location + ", Chennai, Tamil Nadu, India");

        var response = await fetch(url, {
            headers: {
                "Accept": "application/json"
            }
        });

        var data = await response.json();

        if(data.length === 0){

            // FALLBACK WITHOUT CHENNAI
            url =
            "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
            + encodeURIComponent(location);

            response = await fetch(url);

            data = await response.json();
        }

        if(data.length === 0){
            alert("Location not found");
            return null;
        }

        return data[0];

    }catch(error){

        console.log(error);
        alert("Error finding location");

        return null;
    }
}

// ------------------------------------
// START LOCATION
// ------------------------------------

async function setStartLocation(){

    var location =
    document.getElementById("start").value.trim();

    if(location === ""){
        alert("Enter Start Location");
        return;
    }

    var result = await searchLocation(location);

    if(!result) return;

    var lat = parseFloat(result.lat);
    var lon = parseFloat(result.lon);

    startLatLng = L.latLng(lat, lon);

    if(startMarker){
        map.removeLayer(startMarker);
    }

    startMarker =
    L.marker(startLatLng)
    .addTo(map)
    .bindPopup("Start Location")
    .openPopup();

    document.getElementById("start").value =
    result.display_name;

    map.setView(startLatLng, 15);

    calculateDistance();
}

// ------------------------------------
// END LOCATION
// ------------------------------------

async function setEndLocation(){

    var location =
    document.getElementById("end").value.trim();

    if(location === ""){
        alert("Enter End Location");
        return;
    }

    var result = await searchLocation(location);

    if(!result) return;

    var lat = parseFloat(result.lat);
    var lon = parseFloat(result.lon);

    endLatLng = L.latLng(lat, lon);

    if(endMarker){
        map.removeLayer(endMarker);
    }

    endMarker =
    L.marker(endLatLng)
    .addTo(map)
    .bindPopup("End Location")
    .openPopup();

    document.getElementById("end").value =
    result.display_name;

    map.setView(endLatLng, 15);

    calculateDistance();
}

// ------------------------------------
// MAP CLICK
// ------------------------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    try{

        var url =
        "https://nominatim.openstreetmap.org/reverse?format=json&lat="
        + lat +
        "&lon=" +
        lon;

        var response = await fetch(url);

        var data = await response.json();

        var address =
        data.display_name || lat + "," + lon;

        // START POINT

        if(!startLatLng){

            startLatLng = e.latlng;

            if(startMarker){
                map.removeLayer(startMarker);
            }

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;
        }

        // END POINT

        else if(!endLatLng){

            endLatLng = e.latlng;

            if(endMarker){
                map.removeLayer(endMarker);
            }

            endMarker =
            L.marker(endLatLng)
            .addTo(map)
            .bindPopup("End Location")
            .openPopup();

            document.getElementById("end").value =
            address;

            calculateDistance();
        }

        // RESET

        else{

            if(startMarker){
                map.removeLayer(startMarker);
            }

            if(endMarker){
                map.removeLayer(endMarker);
            }

            if(routeLine){
                map.removeLayer(routeLine);
            }

            startLatLng = e.latlng;
            endLatLng = null;

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;

            document.getElementById("end").value = "";

            document.getElementById("distance").value = "";
        }

    }catch(error){

        console.log(error);
    }

});

// ------------------------------------
// DISTANCE CALCULATION
// ------------------------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2) + " KM";

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color: 'blue',
                weight: 4
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO CREATOR

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

</script>
