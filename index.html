<!DOCTYPE html>
<html>
<head>
    <title>Map Distance Calculator</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; position: relative; }

        /* Floating Search Card - Google Maps Style */
        .search-card {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        
        .search-box {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Dropdown styling */
        .dropdown {
            position: absolute;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .dropdown div {
            padding: 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .dropdown div:hover { background: #f8f9fa; }

        .btn-calculate {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .distance-display {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

<div id="map">
    <div class="search-card">
        <div class="input-group">
            <label>START LOCATION</label>
            <input type="text" id="start" class="search-box" placeholder="Search Start..." onkeyup="searchSuggestions('start')">
            <div id="startSuggestions" class="dropdown"></div>
        </div>

        <div class="input-group">
            <label>END LOCATION</label>
            <input type="text" id="end" class="search-box" placeholder="Search End..." onkeyup="searchSuggestions('end')">
            <div id="endSuggestions" class="dropdown"></div>
        </div>

        <button class="btn-calculate" onclick="calculateDistance()">Search & Calculate</button>
        
        <div class="distance-display">
            Distance: <b id="distance-text">0.00</b> KM
        </div>
    </div>
</div>

<script>
var map = L.map('map', { zoomControl: false }).setView([13.0827, 80.2707], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var startLatLng = null, endLatLng = null;
var startMarker = null, endMarker = null, routeLine = null;

async function searchSuggestions(type) {
    var input = document.getElementById(type).value;
    var suggestionBox = document.getElementById(type + "Suggestions");

    if (input.length < 3) {
        suggestionBox.innerHTML = "";
        return;
    }

    // Search specifically in Chennai for better results
    var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input)}+Chennai&limit=5`;
    
    try {
        var response = await fetch(url);
        var data = await response.json();
        suggestionBox.innerHTML = "";

        data.forEach(function(place) {
            var div = document.createElement("div");
            div.innerHTML = place.display_name;
            div.onclick = function() {
                document.getElementById(type).value = place.display_name;
                suggestionBox.innerHTML = "";
                var latlng = L.latLng(place.lat, place.lon);
                updateMarker(type, latlng);
            };
            suggestionBox.appendChild(div);
        });
    } catch (e) { console.log("Search error", e); }
}

function updateMarker(type, latlng) {
    if (type == "start") {
        startLatLng = latlng;
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng).addTo(map).bindPopup("Start").openPopup();
    } else {
        endLatLng = latlng;
        if (endMarker) map.removeLayer(endMarker);
        endMarker = L.marker(latlng).addTo(map).bindPopup("End").openPopup();
    }
    map.flyTo(latlng, 15);
}

function calculateDistance() {
    if (!startLatLng || !endLatLng) {
        alert("Please select both locations from the dropdown");
        return;
    }

    var distance = startLatLng.distanceTo(endLatLng) / 1000;
    document.getElementById("distance-text").innerText = distance.toFixed(2);

    if (routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline([startLatLng, endLatLng], { color: '#1a73e8', weight: 5 }).addTo(map);
    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

    // Send to Zoho Parent
    window.parent.postMessage({
        start: document.getElementById("start").value,
        end: document.getElementById("end").value,
        distance: distance.toFixed(2)
    }, "*");
}

// Map Click functionality
map.on('click', async function(e) {
    var url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`;
    var response = await fetch(url);
    var data = await response.json();

    if (!startLatLng) {
        updateMarker("start", e.latlng);
        document.getElementById("start").value = data.display_name;
    } else if (!endLatLng) {
        updateMarker("end", e.latlng);
        document.getElementById("end").value = data.display_name;
        calculateDistance();
    }
});
</script>

</body>
</html>
