<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<style>

:root{
--bg:#0e1117;
--surface:#161b25;
--surface2:#1e2535;
--border:#2a3347;
--text:#e8edf5;
--muted:#7a8499;
--accent:#3b82f6;
--green:#22c55e;
--red:#ef4444;
--radius:12px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:390px;
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow-y:auto;
}

.brand{
padding:18px;
border-bottom:1px solid var(--border);
}

.brand-title{
font-size:18px;
font-weight:700;
}

.brand-sub{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

.pane{
padding:18px;
display:flex;
flex-direction:column;
gap:15px;
}

.field-label{
font-size:11px;
font-weight:700;
color:var(--muted);
margin-bottom:6px;
text-transform:uppercase;
}

.form-input{
width:100%;
padding:12px;
border-radius:var(--radius);
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
outline:none;
font-size:14px;
}

.form-input:focus{
border-color:var(--accent);
}

.ac-wrap{
position:relative;
}

.ac-list{
position:absolute;
top:100%;
left:0;
right:0;
background:var(--surface);
border:1px solid var(--border);
border-top:none;
max-height:240px;
overflow-y:auto;
display:none;
z-index:99999;
border-radius:0 0 12px 12px;
}

.ac-list.show{
display:block;
}

.ac-item{
padding:10px 14px;
cursor:pointer;
border-bottom:1px solid var(--border);
}

.ac-item:hover{
background:var(--surface2);
}

.ac-main{
font-size:13px;
font-weight:600;
}

.ac-sub{
font-size:11px;
color:var(--muted);
margin-top:3px;
}

.pin-row,
.vehicle-selector{
display:flex;
gap:10px;
}

.btn-pin,
.vehicle-btn{
flex:1;
padding:12px;
border:none;
border-radius:var(--radius);
cursor:pointer;
font-weight:700;
background:var(--surface2);
color:var(--text);
transition:.2s;
}

.btn-pin.active{
background:var(--green);
}

.vehicle-btn.active{
background:var(--accent);
}

.btn-calc,
.btn-submit{
padding:14px;
border:none;
border-radius:var(--radius);
font-size:15px;
font-weight:700;
cursor:pointer;
color:#fff;
transition:.2s;
}

.btn-calc{
background:var(--green);
}

.btn-submit{
background:var(--accent);
}

.btn-submit:disabled{
opacity:.8;
cursor:not-allowed;
}

.result-card{
display:none;
flex-direction:column;
gap:14px;
padding:16px;
border:1px solid var(--accent);
border-radius:14px;
background:var(--bg);
}

.result-card.show{
display:flex;
}

.metric{
font-size:24px;
font-weight:700;
}

#map{
flex:1;
height:100vh;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--surface2);
padding:12px 18px;
border-radius:20px;
font-size:13px;
opacity:0;
transition:.3s;
z-index:999999;
}

.toast.show{
opacity:1;
}

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
}

#map{
height:55vh;
}

}

</style>
</head>

<body>

<aside class="sidebar">

<div class="brand">
<div class="brand-title">
Employee Travel Tracker
</div>

<div class="brand-sub">
Distance · Route · Zoho Sync
</div>
</div>

<div class="pane">

<div>
<div class="field-label">Employee Name</div>

<select id="person-name" class="form-input">
<option value="">Select Employee</option>
<option>Madhumita</option>
<option>Muni</option>
<option>Sarath</option>
<option>Yamuna</option>
<option>Antony</option>
</select>
</div>

<div>
<div class="field-label">Travel Date</div>

<input
type="date"
id="travel-date"
class="form-input"/>
</div>

<div>
<div class="field-label">From</div>

<div class="ac-wrap">

<input
type="text"
id="from-loc"
class="form-input"
placeholder="Enter starting location..."
autocomplete="off"
oninput="acSearch(this,'from-list')"/>

<div class="ac-list" id="from-list"></div>

</div>
</div>

<div>
<div class="field-label">To</div>

<div class="ac-wrap">

<input
type="text"
id="to-loc"
class="form-input"
placeholder="Enter destination..."
autocomplete="off"
oninput="acSearch(this,'to-list')"/>

<div class="ac-list" id="to-list"></div>

</div>
</div>

<div>
<div class="field-label">Manual Pin Location</div>

<div class="pin-row">

<button
class="btn-pin"
id="btn-pin-from"
onclick="startPin('from')">

📍 Pin From

</button>

<button
class="btn-pin"
id="btn-pin-to"
onclick="startPin('to')">

📍 Pin To

</button>

</div>
</div>

<div>
<div class="field-label">Vehicle Type</div>

<div class="vehicle-selector">

<button
class="vehicle-btn active"
id="btn-bike"
onclick="selectVehicle('bike')">

Bike Rs.3.5/km

</button>

<button
class="vehicle-btn"
id="btn-car"
onclick="selectVehicle('car')">

Car Rs.20/km

</button>

</div>
</div>

<button
class="btn-calc"
onclick="calculateRoute()">

Calculate Route

</button>

<div class="result-card" id="result-card">

<div>
Distance
<div class="metric" id="r-dist">0 KM</div>
</div>

<div>
Duration
<div class="metric" id="r-dur">0 MIN</div>
</div>

<div id="r-cost"></div>

<button
class="btn-submit"
id="save-btn"
onclick="submitToZoho()">

Save to Zoho

</button>

</div>

</div>

</aside>

<div id="map"></div>

<div class="toast" id="toast"></div>

<script>

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";
document.getElementById('travel-date').value =
new Date().toISOString().split('T')[0];

var map = L.map('map')
.setView([13.0827,80.2707],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var selectedVehicle = 'bike';

var routeLayer = null;

var fromMarker = null;
var toMarker = null;

var fromCoords = null;
var toCoords = null;

var tripData = null;

var pinMode = null;

function toast(msg){

var t = document.getElementById('toast');

t.textContent = msg;

t.classList.add('show');

clearTimeout(t._t);

t._t = setTimeout(function(){

t.classList.remove('show');

},2500);

}

function selectVehicle(type){

selectedVehicle = type;

document.getElementById('btn-bike')
.classList.toggle('active',type==='bike');

document.getElementById('btn-car')
.classList.toggle('active',type==='car');

}

function startPin(type){

pinMode = type;

document.getElementById('btn-pin-from')
.classList.toggle('active',type==='from');

document.getElementById('btn-pin-to')
.classList.toggle('active',type==='to');

map.getContainer().style.cursor = 'crosshair';

toast('Click on map to pin ' + type);

}

async function acSearch(input,listId){

var query = input.value.trim();

var list = document.getElementById(listId);

if(query.length < 3){

list.classList.remove('show');

list.innerHTML = '';

return;

}

try{

var url =
'https://nominatim.openstreetmap.org/search?format=json&q=' +
encodeURIComponent(query) +
'&countrycodes=in&limit=5&addressdetails=1';

var r = await fetch(url,{
headers:{
'Accept-Language':'en',
'User-Agent':'EmployeeTravelTracker'
}
});

var d = await r.json();

if(!d.length){

list.classList.remove('show');
return;

}

list.innerHTML = d.map(function(item){

var full = item.display_name;

var safe = full
.replace(/\\/g,'\\\\')
.replace(/'/g,"\\'");

return `
<div class="ac-item"

onmousedown="acSelect(
'${listId}',
'${safe}',
'${item.lat}',
'${item.lon}'
)">

<div class="ac-main">
${full.split(',')[0]}
</div>

<div class="ac-sub">
${full}
</div>

</div>
`;

}).join('');

list.classList.add('show');

}catch(e){

console.error(e);

}

}

function acSelect(listId,value,lat,lon){

var isFrom = listId === 'from-list';

var inputId =
isFrom ? 'from-loc' : 'to-loc';

document.getElementById(inputId)
.value = value;

document.getElementById(listId)
.classList.remove('show');

lat = parseFloat(lat);
lon = parseFloat(lon);

var latlng = [lat,lon];

if(isFrom){

fromCoords = {
lat:lat,
lon:lon
};

if(fromMarker){
map.removeLayer(fromMarker);
}

var greenIcon = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',

shadowUrl:
'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

iconSize:[25,41],
iconAnchor:[12,41]

});

fromMarker = L.marker(latlng,{
icon:greenIcon
})

.addTo(map)

.bindPopup(
'<b>FROM</b><br>' + value
)

.openPopup();

}else{

toCoords = {
lat:lat,
lon:lon
};

if(toMarker){
map.removeLayer(toMarker);
}

var redIcon = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

shadowUrl:
'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

iconSize:[25,41],
iconAnchor:[12,41]

});

toMarker = L.marker(latlng,{
icon:redIcon
})

.addTo(map)

.bindPopup(
'<b>TO</b><br>' + value
)

.openPopup();

}

if(fromCoords && toCoords){

var bounds = L.latLngBounds([
[fromCoords.lat,fromCoords.lon],
[toCoords.lat,toCoords.lon]
]);

map.fitBounds(bounds,{
padding:[50,50]
});

}else{

map.flyTo(latlng,15);

}

toast(
(isFrom ? 'FROM' : 'TO') +
' pinned successfully'
);

}

map.on('click',async function(e){

if(!pinMode) return;

var lat = e.latlng.lat;
var lon = e.latlng.lng;

try{

var r = await fetch(

'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
lat +
'&lon=' +
lon,

{
headers:{
'Accept-Language':'en',
'User-Agent':'EmployeeTravelTracker'
}
}

);

var d = await r.json();

var addr =
d.display_name ||
(lat.toFixed(5)+','+lon.toFixed(5));

if(pinMode === 'from'){

acSelect(
'from-list',
addr,
lat,
lon
);

}else{

acSelect(
'to-list',
addr,
lat,
lon
);

}

pinMode = null;

document.getElementById('btn-pin-from')
.classList.remove('active');

document.getElementById('btn-pin-to')
.classList.remove('active');

map.getContainer().style.cursor='';

}catch(ex){

console.error(ex);

toast('Pin failed');

}

});

async function getRoute(from,to){

var url =
'https://router.project-osrm.org/route/v1/driving/' +
from.lon + ',' + from.lat +
';' +
to.lon + ',' + to.lat +
'?overview=full&geometries=geojson';

var r = await fetch(url);

var d = await r.json();

if(!d.routes || !d.routes.length){

throw new Error('Route not found');

}

var route = d.routes[0];

return {

distKm:
(route.distance/1000).toFixed(2),

durMin:
Math.round(route.duration/60),

coords:
route.geometry.coordinates.map(function(c){

return [c[1],c[0]];

})

};

}

async function calculateRoute(){

try{

var name =
document.getElementById('person-name').value;

/* UPDATED DATE FORMAT FIX */

var rawDate =
document.getElementById('travel-date').value;

if(!rawDate){
   toast('Please select date');
   return;
}

var parts = rawDate.split('-');

var months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

var date =
parts[2] + '-' +
months[parseInt(parts[1]) - 1] + '-' +
parts[0];

/* END DATE FIX */

var from =
document.getElementById('from-loc').value;

var to =
document.getElementById('to-loc').value;
if(!name || !from || !to){

alert('Please fill all fields');
return;

}

if(!fromCoords || !toCoords){

toast('Please select valid locations');
return;

}

var route =
await getRoute(fromCoords,toCoords);

if(routeLayer){

map.removeLayer(routeLayer);

}

routeLayer = L.polyline(route.coords,{
color:'#3b82f6',
weight:6
}).addTo(map);

map.fitBounds(routeLayer.getBounds(),{
padding:[40,40]
});

var rate =
selectedVehicle === 'car'
? 20
: 3.5;

var cost =
(parseFloat(route.distKm) * rate)
.toFixed(2);

  tripData = {

    name: name,

    Travel_Date: date,

    start: from,

    end: to,

    distance: route.distKm,

    duration: String(route.durMin),

    mode: selectedVehicle,

    cost: cost,

    timestamp: new Date().toISOString()

};

document.getElementById('r-dist')
.textContent =
route.distKm + ' KM';

document.getElementById('r-dur')
.textContent =
route.durMin + ' MIN';

document.getElementById('r-cost')
.innerHTML =
'Estimated Cost: Rs.' + cost;

document.getElementById('result-card')
.classList.add('show');

document.getElementById('save-btn')
.disabled = false;

document.getElementById('save-btn')
.innerHTML = 'Save to Zoho';

document.getElementById('save-btn')
.style.background = '';

toast('Route calculated');

}catch(e){

console.error(e);

toast('Failed to calculate route');

}

}

function submitToZoho() {

if(!tripData){
toast('Calculate route first');
return;
}

var btn = document.getElementById('save-btn');

btn.disabled = true;

btn.innerHTML = 'Saving...';

var params = new URLSearchParams();

Object.keys(tripData).forEach(function(k){
params.append(k, String(tripData[k]));
});

fetch(
ZOHO_WEBHOOK_URL + '&' + params.toString(),
{
method:'GET',
mode:'no-cors'
}
)

.then(function(){

btn.innerHTML = 'Saved ✓';

btn.style.background = '#22c55e';

toast('Saved to Zoho');

})

.catch(function(error){

console.error(error);

btn.disabled = false;

btn.innerHTML = 'Save to Zoho';

toast('Failed to save');

});

}
</script>

</body>
</html>
