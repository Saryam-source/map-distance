<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
            background:white;
        }

        h2{
            margin-top:0;
            color:#333;
        }

        h3{
            margin-bottom:8px;
            color:#444;
        }

        .input-group{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        input{
            flex:1;
            padding:12px;
            font-size:15px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#4285f4;
        }

        button{
            padding:12px 20px;
            font-size:15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#4285f4;
            color:white;
        }

        button:hover{
            background:#2f6fe4;
        }

        #distance{
            background:#f0f0f0;
            font-weight:bold;
        }

        .btn-group{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        @media(max-width:768px){

            .input-group{
                flex-direction:column;
            }

            .btn-group{
                flex-direction:column;
            }

            button{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h2>Map Distance Calculator</h2>

    <!-- START -->

    <h3>Start Location</h3>

    <div class="input-group">

        <input
            type="text"
            id="start"
            placeholder="Enter Start Location">

    </div>

    <!-- END -->

    <h3>End Location</h3>

    <div class="input-group">

        <input
            type="text"
            id="end"
            placeholder="Enter End Location">

    </div>

    <!-- DISTANCE -->

    <h3>Distance</h3>

    <input
        type="text"
        id="distance"
        readonly
        placeholder="Distance will appear here">

    <!-- BUTTONS -->

    <div class="btn-group">

        <button onclick="calculateFromInput()">
            Calculate Distance
        </button>

        <button onclick="resetMap()">
            Reset Map
        </button>

    </div>

</div>

<script>

// -----------------------------
// MAP INITIALIZATION
// -----------------------------

var map = L.map('map').setView([13.0827, 80.2707], 11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}).addTo(map);

// -----------------------------
// VARIABLES
// -----------------------------

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// -----------------------------
// SEARCH LOCATION
// -----------------------------

async function searchLocation(location){

    try{

        // MORE POWERFUL SEARCH

        var url =
        "https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=10&q="
        + encodeURIComponent(location);

        var response = await fetch(url, {
            headers:{
                "Accept":"application/json"
            }
        });

        var data = await response.json();

        // IF NOT FOUND TRY WITH CHENNAI

        if(data.length === 0){

            url =
            "https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=10&q="
            + encodeURIComponent(location + ", Chennai");

            response = await fetch(url);

            data = await response.json();
        }

        if(data.length === 0){
            return null;
        }

        return data[0];

    }catch(error){

        console.log(error);
        return null;
    }
}

// -----------------------------
// CALCULATE FROM INPUT
// -----------------------------

async function calculateFromInput(){

    var startLocation =
    document.getElementById("start").value.trim();

    var endLocation =
    document.getElementById("end").value.trim();

    if(startLocation === "" || endLocation === ""){

        alert("Enter both Start and End Locations");
        return;
    }

    // SEARCH START

    var startResult =
    await searchLocation(startLocation);

    if(!startResult){

        alert("Start Location not found");
        return;
    }

    // SEARCH END

    var endResult =
    await searchLocation(endLocation);

    if(!endResult){

        alert("End Location not found");
        return;
    }

    // LAT LNG

    startLatLng = L.latLng(
        parseFloat(startResult.lat),
        parseFloat(startResult.lon)
    );

    endLatLng = L.latLng(
        parseFloat(endResult.lat),
        parseFloat(endResult.lon)
    );

    // REMOVE OLD MARKERS

    if(startMarker){
        map.removeLayer(startMarker);
    }

    if(endMarker){
        map.removeLayer(endMarker);
    }

    if(routeLine){
        map.removeLayer(routeLine);
    }

    // ADD START MARKER

    startMarker =
    L.marker(startLatLng)
    .addTo(map)
    .bindPopup("Start Location")
    .openPopup();

    // ADD END MARKER

    endMarker =
    L.marker(endLatLng)
    .addTo(map)
    .bindPopup("End Location");

    // UPDATE INPUTS

    document.getElementById("start").value =
    startResult.display_name;

    document.getElementById("end").value =
    endResult.display_name;

    // CALCULATE DISTANCE

    calculateDistance();
}

// -----------------------------
// MAP CLICK
// -----------------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    try{

        var url =
        "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="
        + lat +
        "&lon=" +
        lon;

        var response = await fetch(url);

        var data = await response.json();

        var address =
        data.display_name || lat + "," + lon;

        // START LOCATION

        if(!startLatLng){

            startLatLng = e.latlng;

            if(startMarker){
                map.removeLayer(startMarker);
            }

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;
        }

        // END LOCATION

        else if(!endLatLng){

            endLatLng = e.latlng;

            if(endMarker){
                map.removeLayer(endMarker);
            }

            endMarker =
            L.marker(endLatLng)
            .addTo(map)
            .bindPopup("End Location")
            .openPopup();

            document.getElementById("end").value =
            address;

            calculateDistance();
        }

        // RESET AUTOMATICALLY

        else{

            resetMap();

            startLatLng = e.latlng;

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;
        }

    }catch(error){

        console.log(error);
    }

});

// -----------------------------
// DISTANCE CALCULATION
// -----------------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2) + " KM";

        // DRAW LINE

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:5
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

// -----------------------------
// RESET MAP
// -----------------------------

function resetMap(){

    if(startMarker){
        map.removeLayer(startMarker);
    }

    if(endMarker){
        map.removeLayer(endMarker);
    }

    if(routeLine){
        map.removeLayer(routeLine);
    }

    startMarker = null;
    endMarker = null;
    routeLine = null;

    startLatLng = null;
    endLatLng = null;

    document.getElementById("start").value = "";
    document.getElementById("end").value = "";
    document.getElementById("distance").value = "";

    map.setView([13.0827, 80.2707], 11);
}

// -----------------------------
// ENTER KEY SUPPORT
// -----------------------------

document.getElementById("start")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        calculateFromInput();
    }
});

document.getElementById("end")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        calculateFromInput();
    }
});

</script>

</body>
</html>
