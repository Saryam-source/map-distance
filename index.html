<!DOCTYPE html>
<html>

<head>

<title>Google Maps Distance Calculator</title>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

#map{
height:500px;
width:100%;
}

.container{
padding:20px;
background:white;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4285F4;
color:white;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#3367D6;
}

#distance{
background:#eee;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="container">

<h2>Google Maps Distance Calculator</h2>

<input
type="text"
id="start"
placeholder="Enter Start Location">

<input
type="text"
id="end"
placeholder="Enter End Location">

<input
type="text"
id="distance"
readonly
placeholder="Distance appears here">

<br><br>

<button onclick="calculateRoute()">
Calculate Distance
</button>

<button onclick="resetMap()">
Reset
</button>

</div>

<script>

let map;
let directionsService;
let directionsRenderer;
let geocoder;

let startMarker = null;
let endMarker = null;

let clickCount = 0;

function initMap(){

map = new google.maps.Map(
document.getElementById("map"),
{
center:{lat:13.0827,lng:80.2707},
zoom:11
});

directionsService =
new google.maps.DirectionsService();

directionsRenderer =
new google.maps.DirectionsRenderer({
suppressMarkers:true
});

directionsRenderer.setMap(map);

geocoder =
new google.maps.Geocoder();


// AUTOCOMPLETE

const startAutocomplete =
new google.maps.places.Autocomplete(
document.getElementById("start"),
{
types:["geocode"]
}
);

const endAutocomplete =
new google.maps.places.Autocomplete(
document.getElementById("end"),
{
types:["geocode"]
}
);


// ENTER KEY SUPPORT

document.getElementById("start")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){
calculateRoute();
}

});

document.getElementById("end")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){
calculateRoute();
}

});


// MAP CLICK SUPPORT

map.addListener("click",function(event){

geocoder.geocode({

location:event.latLng

},function(results,status){

if(status==="OK" && results[0]){

let address =
results[0].formatted_address;

if(clickCount===0){

document.getElementById("start").value =
address;

if(startMarker){
startMarker.setMap(null);
}

startMarker =
new google.maps.Marker({

position:event.latLng,
map:map,
label:"S"

});

clickCount = 1;

}
else{

document.getElementById("end").value =
address;

if(endMarker){
endMarker.setMap(null);
}

endMarker =
new google.maps.Marker({

position:event.latLng,
map:map,
label:"E"

});

clickCount = 0;

calculateRoute();

}

}

});

});

}


// CALCULATE ROUTE

function calculateRoute(){

let start =
document.getElementById("start").value.trim();

let end =
document.getElementById("end").value.trim();

if(start==="" || end===""){

alert("Enter Start and End Locations");
return;

}

directionsService.route({

origin:start,
destination:end,
travelMode:google.maps.TravelMode.DRIVING

},
function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result);

let leg =
result.routes[0].legs[0];

document.getElementById("distance").value =
leg.distance.text +
" (" +
leg.duration.text +
")";


// START MARKER

if(startMarker){
startMarker.setMap(null);
}

startMarker =
new google.maps.Marker({

position:leg.start_location,
map:map,
label:"S"

});


// END MARKER

if(endMarker){
endMarker.setMap(null);
}

endMarker =
new google.maps.Marker({

position:leg.end_location,
map:map,
label:"E"

});


// SEND TO ZOHO

window.parent.postMessage({

start:start,
end:end,
distance:leg.distance.text,
duration:leg.duration.text

},"*");

}
else{

alert(
"Google Maps could not find this location.\n\nPlease select from autocomplete suggestions."
);

}

});

}


// RESET

function resetMap(){

document.getElementById("start").value="";
document.getElementById("end").value="";
document.getElementById("distance").value="";

if(startMarker){
startMarker.setMap(null);
}

if(endMarker){
endMarker.setMap(null);
}

directionsRenderer.setDirections({
routes:[]
});

map.setCenter({
lat:13.0827,
lng:80.2707
});

map.setZoom(11);

clickCount = 0;

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBv3g7NZzSJ1-iZ_emEuHSHqvuSezwma_8 &libraries=places&callback=initMap">
</script>

</body>
</html>
