<!DOCTYPE html>
<html>

<head>

    <title>Distance Map</title>

    <meta charset="utf-8"/>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:320px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
            margin-left:10px;
        }

        .label{
            font-size:18px;
            margin-bottom:5px;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <div class="label">Start Location</div>

    <input type="text"
           id="start"
           placeholder="Enter Start Location">

    <button onclick="searchStart()">
        Search
    </button>

    <br>

    <div class="label">End Location</div>

    <input type="text"
           id="end"
           placeholder="Enter End Location">

    <button onclick="searchEnd()">
        Search
    </button>

    <br><br>

    <div class="label">Distance (KM)</div>

    <input type="text"
           id="distance"
           readonly>

</div>

<script>

    // -------------------------
    // MAP
    // -------------------------

    var map = L.map('map').setView([13.0827, 80.2707], 10);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19
        }
    ).addTo(map);

    // -------------------------
    // VARIABLES
    // -------------------------

    var startMarker = null;
    var endMarker = null;
    var line = null;

    var startLatLng = null;
    var endLatLng = null;

    // -------------------------
    // SEARCH START LOCATION
    // -------------------------

    async function searchStart(){

        var location =
            document.getElementById("start").value;

        if(location == ""){
            alert("Enter Start Location");
            return;
        }

        var url =
            "https://nominatim.openstreetmap.org/search?format=json&q="
            + encodeURIComponent(location);

        var response = await fetch(url);

        var data = await response.json();

        if(data.length == 0){
            alert("Location not found");
            return;
        }

        var lat = parseFloat(data[0].lat);
        var lon = parseFloat(data[0].lon);

        startLatLng = [lat, lon];

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker = L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

        map.setView(startLatLng, 13);

        calculateDistance();
    }

    // -------------------------
    // SEARCH END LOCATION
    // -------------------------

    async function searchEnd(){

        var location =
            document.getElementById("end").value;

        if(location == ""){
            alert("Enter End Location");
            return;
        }

        var url =
            "https://nominatim.openstreetmap.org/search?format=json&q="
            + encodeURIComponent(location);

        var response = await fetch(url);

        var data = await response.json();

        if(data.length == 0){
            alert("Location not found");
            return;
        }

        var lat = parseFloat(data[0].lat);
        var lon = parseFloat(data[0].lon);

        endLatLng = [lat, lon];

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker = L.marker(endLatLng)
            .addTo(map)
            .bindPopup("End Location")
            .openPopup();

        map.setView(endLatLng, 13);

        calculateDistance();
    }

    // -------------------------
    // CALCULATE DISTANCE
    // -------------------------

    function calculateDistance(){

        if(startLatLng && endLatLng){

            var point1 = L.latLng(
                startLatLng[0],
                startLatLng[1]
            );

            var point2 = L.latLng(
                endLatLng[0],
                endLatLng[1]
            );

            var distance =
                point1.distanceTo(point2) / 1000;

            document.getElementById("distance").value =
                distance.toFixed(2);

            // DRAW LINE

            if(line){
                map.removeLayer(line);
            }

            line = L.polyline(
                [startLatLng, endLatLng],
                {
                    color: 'blue'
                }
            ).addTo(map);

            map.fitBounds(line.getBounds());

            // SEND TO ZOHO

            window.parent.postMessage({

                start:
                    document.getElementById("start").value,

                end:
                    document.getElementById("end").value,

                distance:
                    distance.toFixed(2)

            }, "*");
        }

    }

</script>

</body>
</html>
