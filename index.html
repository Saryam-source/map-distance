<!DOCTYPE html>
<html>

<head>

<title>Google Maps Distance Calculator</title>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

#map{
height:500px;
width:100%;
}

.container{
padding:20px;
background:white;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4285F4;
color:white;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#3367D6;
}

#distance{
background:#eee;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="container">

<h2>Google Maps Distance Calculator</h2>

<input
type="text"
id="start"
placeholder="Enter Start Location">

<input
type="text"
id="end"
placeholder="Enter End Location">

<input
type="text"
id="distance"
readonly
placeholder="Distance appears here">

<br><br>

<button onclick="calculateRoute()">
Calculate Distance
</button>

<button onclick="resetMap()">
Reset
</button>

</div>

<script>

let map;
let directionsService;
let directionsRenderer;

let startAutocomplete;
let endAutocomplete;

function initMap(){

map = new google.maps.Map(
document.getElementById("map"),
{
center:{lat:13.0827,lng:80.2707},
zoom:11
});

directionsService =
new google.maps.DirectionsService();

directionsRenderer =
new google.maps.DirectionsRenderer({
draggable:false
});

directionsRenderer.setMap(map);


// AUTOCOMPLETE

startAutocomplete =
new google.maps.places.Autocomplete(
document.getElementById("start")
);

endAutocomplete =
new google.maps.places.Autocomplete(
document.getElementById("end")
);


// CLICK MAP TO AUTO FILL

map.addListener("click",function(event){

let geocoder =
new google.maps.Geocoder();

geocoder.geocode({

location:event.latLng

},function(results,status){

if(status==="OK"){

if(results[0]){

if(document.getElementById("start").value===""){

document.getElementById("start").value =
results[0].formatted_address;

}
else{

document.getElementById("end").value =
results[0].formatted_address;

calculateRoute();

}

}

}

});

});

}


// CALCULATE ROUTE

function calculateRoute(){

let start =
document.getElementById("start").value;

let end =
document.getElementById("end").value;

if(start==="" || end===""){

alert("Enter Start and End Locations");
return;

}

directionsService.route({

origin:start,
destination:end,
travelMode:"DRIVING"

},
function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result);

let route =
result.routes[0];

let distance =
route.legs[0].distance.text;

let duration =
route.legs[0].duration.text;

document.getElementById("distance").value =
distance + " (" + duration + ")";


// SEND TO ZOHO

window.parent.postMessage({

start:start,
end:end,
distance:distance,
duration:duration

},"*");

}
else{

alert("Location not found");

}

});

}


// RESET

function resetMap(){

document.getElementById("start").value="";
document.getElementById("end").value="";
document.getElementById("distance").value="";

directionsRenderer.setDirections({
routes:[]
});

map.setCenter({
lat:13.0827,
lng:80.2707
});

map.setZoom(11);

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBv3g7NZzSJ1-iZ_emEuHSHqvuSezwma_8&libraries=places&callback=initMap">
</script>

</body>
</html>
