<!DOCTYPE html>
<html>

<head>

    <title>Advanced Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
            background:white;
        }

        h2{
            margin-top:0;
            color:#333;
        }

        h3{
            margin-bottom:8px;
            color:#444;
        }

        .input-group{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:20px;
        }

        input{
            flex:1;
            min-width:250px;
            padding:12px;
            font-size:15px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#4285f4;
        }

        button{
            padding:12px 18px;
            font-size:15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#4285f4;
            color:white;
        }

        button:hover{
            background:#2f6fe4;
        }

        #distance{
            background:#f0f0f0;
            font-weight:bold;
        }

        .info-box{
            background:#eef4ff;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            color:#333;
        }

        @media(max-width:768px){

            .input-group{
                flex-direction:column;
            }

            button{
                width:100%;
            }

            input{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h2>Map Distance Calculator</h2>

    <div class="info-box">
        • Click directly on the map OR type locations manually.<br>
        • Supports area names, street names, landmarks, house addresses and pin codes.<br>
        • Third click resets the map automatically.
    </div>

    <!-- START -->

    <h3>Start Location</h3>

    <div class="input-group">

        <input
            type="text"
            id="start"
            placeholder="Enter Start Location">

        <button onclick="setStartLocation()">
            Set Start
        </button>

    </div>

    <!-- END -->

    <h3>End Location</h3>

    <div class="input-group">

        <input
            type="text"
            id="end"
            placeholder="Enter End Location">

        <button onclick="setEndLocation()">
            Set End
        </button>

    </div>

    <!-- DISTANCE -->

    <h3>Distance</h3>

    <input
        type="text"
        id="distance"
        readonly
        placeholder="Distance will appear here">

    <br><br>

    <button onclick="resetMap()">
        Reset Map
    </button>

</div>

<script>

// ------------------------------
// INITIALIZE MAP
// ------------------------------

var map = L.map('map').setView([13.0827, 80.2707], 11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}).addTo(map);

// ------------------------------
// VARIABLES
// ------------------------------

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ------------------------------
// SEARCH FUNCTION
// ------------------------------

async function searchLocation(location){

    try{

        // PRIORITY SEARCH WITH CHENNAI

        var url =
        "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
        + encodeURIComponent(location + ", Chennai, Tamil Nadu, India");

        var response = await fetch(url, {
            headers:{
                "Accept":"application/json"
            }
        });

        var data = await response.json();

        // FALLBACK SEARCH

        if(data.length === 0){

            url =
            "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
            + encodeURIComponent(location);

            response = await fetch(url);

            data = await response.json();
        }

        if(data.length === 0){

            alert("Location not found");
            return null;
        }

        return data[0];

    }catch(error){

        console.log(error);

        alert("Error finding location");

        return null;
    }
}

// ------------------------------
// SET START LOCATION
// ------------------------------

async function setStartLocation(){

    var location =
    document.getElementById("start").value.trim();

    if(location === ""){
        alert("Enter Start Location");
        return;
    }

    var result =
    await searchLocation(location);

    if(!result) return;

    var lat = parseFloat(result.lat);
    var lon = parseFloat(result.lon);

    startLatLng = L.latLng(lat, lon);

    if(startMarker){
        map.removeLayer(startMarker);
    }

    startMarker =
    L.marker(startLatLng)
    .addTo(map)
    .bindPopup("Start Location")
    .openPopup();

    document.getElementById("start").value =
    result.display_name;

    map.setView(startLatLng, 15);

    calculateDistance();
}

// ------------------------------
// SET END LOCATION
// ------------------------------

async function setEndLocation(){

    var location =
    document.getElementById("end").value.trim();

    if(location === ""){
        alert("Enter End Location");
        return;
    }

    var result =
    await searchLocation(location);

    if(!result) return;

    var lat = parseFloat(result.lat);
    var lon = parseFloat(result.lon);

    endLatLng = L.latLng(lat, lon);

    if(endMarker){
        map.removeLayer(endMarker);
    }

    endMarker =
    L.marker(endLatLng)
    .addTo(map)
    .bindPopup("End Location")
    .openPopup();

    document.getElementById("end").value =
    result.display_name;

    map.setView(endLatLng, 15);

    calculateDistance();
}

// ------------------------------
// MAP CLICK
// ------------------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    try{

        var url =
        "https://nominatim.openstreetmap.org/reverse?format=json&lat="
        + lat +
        "&lon=" +
        lon;

        var response = await fetch(url);

        var data = await response.json();

        var address =
        data.display_name || lat + "," + lon;

        // START

        if(!startLatLng){

            startLatLng = e.latlng;

            if(startMarker){
                map.removeLayer(startMarker);
            }

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;
        }

        // END

        else if(!endLatLng){

            endLatLng = e.latlng;

            if(endMarker){
                map.removeLayer(endMarker);
            }

            endMarker =
            L.marker(endLatLng)
            .addTo(map)
            .bindPopup("End Location")
            .openPopup();

            document.getElementById("end").value =
            address;

            calculateDistance();
        }

        // RESET + NEW START

        else{

            resetMap();

            startLatLng = e.latlng;

            startMarker =
            L.marker(startLatLng)
            .addTo(map)
            .bindPopup("Start Location")
            .openPopup();

            document.getElementById("start").value =
            address;
        }

    }catch(error){

        console.log(error);
    }

});

// ------------------------------
// DISTANCE CALCULATION
// ------------------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2) + " KM";

        // REMOVE OLD LINE

        if(routeLine){
            map.removeLayer(routeLine);
        }

        // DRAW LINE

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:5
            }
        ).addTo(map);

        // FIT MAP

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO CREATOR

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

// ------------------------------
// RESET FUNCTION
// ------------------------------

function resetMap(){

    if(startMarker){
        map.removeLayer(startMarker);
    }

    if(endMarker){
        map.removeLayer(endMarker);
    }

    if(routeLine){
        map.removeLayer(routeLine);
    }

    startMarker = null;
    endMarker = null;
    routeLine = null;

    startLatLng = null;
    endLatLng = null;

    document.getElementById("start").value = "";
    document.getElementById("end").value = "";
    document.getElementById("distance").value = "";

    map.setView([13.0827, 80.2707], 11);
}

// ------------------------------
// ENTER KEY SUPPORT
// ------------------------------

document.getElementById("start")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        setStartLocation();
    }
});

document.getElementById("end")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        setEndLocation();
    }
});

</script>

</body>
</html>
