<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Advanced Live Route Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e1117;
  --surface:#161b25;
  --surface2:#1e2535;
  --border:#2a3347;
  --text:#e8edf5;
  --muted:#7a8499;
  --accent:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --radius:12px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  display:flex;
}

.sidebar{
  width:400px;
  min-width:400px;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;
}

.brand{
  padding:18px;
  border-bottom:1px solid var(--border);
}

.brand h2{
  font-size:18px;
}

.brand p{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.content{
  padding:16px;
}

.label{
  font-size:11px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:700;
}

input{
  width:100%;
  padding:12px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg);
  color:white;
  outline:none;
  margin-bottom:14px;
}

.mode-buttons{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.mode-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  font-weight:700;
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
}

.mode-btn.active{
  background:var(--accent);
}

.panel{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
}

.status{
  padding:10px;
  border-radius:10px;
  background:var(--surface2);
  margin-bottom:12px;
}

.status-title{
  font-weight:700;
  font-size:14px;
}

.status-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}

.metrics{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.metric{
  flex:1;
  background:var(--surface2);
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.metric .v{
  font-size:22px;
  font-weight:700;
  font-family:'DM Mono',monospace;
}

.metric .l{
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
}

.buttons{
  display:flex;
  gap:8px;
}

button{
  cursor:pointer;
}

.start{
  flex:1;
  padding:14px;
  background:var(--green);
  color:white;
  border:none;
  border-radius:var(--radius);
  font-weight:700;
}

.stop{
  flex:1;
  padding:14px;
  background:var(--red);
  color:white;
  border:none;
  border-radius:var(--radius);
  font-weight:700;
}

.reset{
  padding:14px;
  width:56px;
  border:none;
  border-radius:var(--radius);
  background:var(--surface2);
  color:white;
}

#map{
  flex:1;
}

.summary{
  margin-top:16px;
  display:none;
  background:var(--bg);
  border:1px solid var(--accent);
  border-radius:12px;
  padding:14px;
}

.summary.show{
  display:block;
}

.summary h3{
  margin-bottom:10px;
}

.row{
  margin-bottom:8px;
  font-size:13px;
}

.submit{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-weight:700;
}

@media(max-width:768px){
  body{
    flex-direction:column;
    height:auto;
  }

  .sidebar{
    width:100%;
    min-width:100%;
  }

  #map{
    height:55vh;
  }
}
</style>
</head>

<body>

<div class="sidebar">

  <div class="brand">
    <h2>Advanced GPS Tracker</h2>
    <p>High accuracy live route tracking</p>
  </div>

  <div class="content">

    <div class="label">Name</div>
    <input type="text" id="person-name" placeholder="Enter your name"/>

    <div class="label">Travel Mode</div>

    <div class="mode-buttons">
      <button class="mode-btn active" id="car-btn" onclick="setMode('car')">
        🚗 Car
      </button>

      <button class="mode-btn" id="bike-btn" onclick="setMode('bike')">
        🏍 Bike
      </button>
    </div>

    <div class="panel">

      <div class="status">
        <div class="status-title" id="status-title">
          Ready
        </div>

        <div class="status-sub" id="status-sub">
          Waiting to start...
        </div>
      </div>

      <div class="metrics">

        <div class="metric">
          <div class="v" id="dist">0.00</div>
          <div class="l">KM</div>
        </div>

        <div class="metric">
          <div class="v" id="dur">0:00</div>
          <div class="l">TIME</div>
        </div>

        <div class="metric">
          <div class="v" id="gps">0</div>
          <div class="l">GPS</div>
        </div>

      </div>

      <div class="buttons">
        <button class="start" onclick="startTracking()" id="start-btn">
          START
        </button>

        <button class="stop" onclick="stopTracking()" id="stop-btn" disabled>
          STOP
        </button>

        <button class="reset" onclick="resetAll()">
          ↺
        </button>
      </div>

    </div>

    <div class="summary" id="summary">

      <h3>Trip Summary</h3>

      <div class="row" id="sum-name"></div>
      <div class="row" id="sum-mode"></div>
      <div class="row" id="sum-distance"></div>
      <div class="row" id="sum-duration"></div>
      <div class="row" id="sum-points"></div>

      <button class="submit" onclick="submitToZoho()">
        Submit To Zoho
      </button>

    </div>

  </div>
</div>

<div id="map"></div>

<script>

// ZOHO WEBHOOK
var ZOHO_WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";

// MAP
var map = L.map('map').setView([13.0827,80.2707],15);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom:19
  }
).addTo(map);

// STATE
var mode = "car";
var watchId = null;
var isTracking = false;
var totalDistance = 0;
var path = [];
var polyline = null;
var liveMarker = null;
var startTime = null;
var timer = null;

// MODE
function setMode(m){

  mode = m;

  document.getElementById('car-btn').classList.remove('active');
  document.getElementById('bike-btn').classList.remove('active');

  document.getElementById(m + '-btn').classList.add('active');
}

// FORMAT TIME
function formatTime(sec){

  var m = Math.floor(sec/60);
  var s = sec%60;

  return m + ":" + String(s).padStart(2,'0');
}

// STATUS
function setStatus(t,s){

  document.getElementById('status-title').textContent = t;
  document.getElementById('status-sub').textContent = s;
}

// START
function startTracking(){

  var name = document.getElementById('person-name').value.trim();

  if(!name){
    alert("Enter name");
    return;
  }

  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  isTracking = true;
  totalDistance = 0;
  path = [];
  startTime = Date.now();

  document.getElementById('summary').classList.remove('show');

  document.getElementById('start-btn').disabled = true;
  document.getElementById('stop-btn').disabled = false;

  setStatus(
    "Getting GPS",
    "Move to open sky for better signal"
  );

  timer = setInterval(function(){

    var sec = Math.floor(
      (Date.now()-startTime)/1000
    );

    document.getElementById('dur').textContent =
      formatTime(sec);

  },1000);

  watchId = navigator.geolocation.watchPosition(

    onPosition,

    onError,

    {
      enableHighAccuracy:true,
      maximumAge:0,
      timeout:15000
    }

  );
}

// POSITION
function onPosition(pos){

  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;
  var acc = pos.coords.accuracy;

  // STRICT ACCURACY FILTER
  if(acc > 20){

    setStatus(
      "Waiting Better GPS",
      "Current accuracy ±" + Math.round(acc) + "m"
    );

    return;
  }

  var point = L.latLng(lat,lng);

  // FIRST POINT
  if(path.length === 0){

    map.setView(point,18);

    liveMarker = L.marker(point).addTo(map);
  }

  // DISTANCE FILTER
  if(path.length > 0){

    var last = path[path.length-1];

    var segment = last.distanceTo(point);

    // IGNORE GPS JUMPS
    if(segment > 200){
      return;
    }

    // IGNORE VERY SMALL NOISE
    if(segment < 3){
      return;
    }

    totalDistance += segment;
  }

  path.push(point);

  // POLYLINE
  if(polyline){
    map.removeLayer(polyline);
  }

  polyline = L.polyline(
    path,
    {
      color:'#22c55e',
      weight:6
    }
  ).addTo(map);

  // MARKER
  if(liveMarker){
    liveMarker.setLatLng(point);
  }

  map.panTo(point);

  // UI
  document.getElementById('dist').textContent =
    (totalDistance/1000).toFixed(2);

  document.getElementById('gps').textContent =
    path.length;

  setStatus(
    "Tracking Live",
    "Accuracy ±" + Math.round(acc) + "m"
  );
}

// ERROR
function onError(err){

  setStatus(
    "GPS Error",
    err.message
  );
}

// STOP
function stopTracking(){

  if(!isTracking) return;

  isTracking = false;

  navigator.geolocation.clearWatch(watchId);

  clearInterval(timer);

  document.getElementById('start-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;

  var sec = Math.floor(
    (Date.now()-startTime)/1000
  );

  var km = (totalDistance/1000).toFixed(2);

  document.getElementById('summary').classList.add('show');

  document.getElementById('sum-name').innerHTML =
    "👤 <b>Name:</b> " +
    document.getElementById('person-name').value;

  document.getElementById('sum-mode').innerHTML =
    "🚘 <b>Mode:</b> " + mode;

  document.getElementById('sum-distance').innerHTML =
    "📏 <b>Distance:</b> " + km + " km";

  document.getElementById('sum-duration').innerHTML =
    "⏱ <b>Duration:</b> " + formatTime(sec);

  document.getElementById('sum-points').innerHTML =
    "📍 <b>GPS Points:</b> " + path.length;

  setStatus(
    "Trip Completed",
    km + " km tracked"
  );
}

// RESET
function resetAll(){

  if(watchId){
    navigator.geolocation.clearWatch(watchId);
  }

  clearInterval(timer);

  isTracking = false;
  totalDistance = 0;
  path = [];

  if(polyline){
    map.removeLayer(polyline);
  }

  if(liveMarker){
    map.removeLayer(liveMarker);
  }

  polyline = null;
  liveMarker = null;

  document.getElementById('dist').textContent = "0.00";
  document.getElementById('dur').textContent = "0:00";
  document.getElementById('gps').textContent = "0";

  document.getElementById('summary').classList.remove('show');

  document.getElementById('start-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;

  setStatus(
    "Ready",
    "Waiting to start..."
  );

  map.setView([13.0827,80.2707],15);
}

// SUBMIT
function submitToZoho(){

  var sec = Math.floor(
    (Date.now()-startTime)/1000
  );

  var payload = {

    name:
      document.getElementById('person-name').value,

    mode:
      mode,

    distance:
      (totalDistance/1000).toFixed(2),

    duration:
      formatTime(sec),

    gps_points:
      path.length,

    timestamp:
      new Date().toISOString()
  };

  var params = new URLSearchParams(payload);

  fetch(
    ZOHO_WEBHOOK_URL + "&" + params.toString(),
    {
      method:'GET',
      mode:'no-cors'
    }
  )
  .then(function(){

    alert("Submitted to Zoho");

  })
  .catch(function(){

    alert("Submitted");
  });
}

</script>

</body>
</html>
