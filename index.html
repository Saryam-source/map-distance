<!DOCTYPE html>
<html>
<head>
    <title>Map Distance Calculator</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; position: relative; }

        .search-card {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 320px;
        }

        .input-group { margin-bottom: 12px; position: relative; }
        .input-group label { display: block; font-size: 10px; font-weight: bold; color: #1a73e8; margin-bottom: 4px; text-transform: uppercase; }
        
        .search-box {
            width: 100%; padding: 10px; box-sizing: border-box;
            border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none;
        }

        /* Suggestions Dropdown Style */
        .suggestions {
            position: absolute; width: 100%; background: white;
            border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px;
            max-height: 150px; overflow-y: auto; z-index: 2000; display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggestions div { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #eee; }
        .suggestions div:hover { background: #f1f3f4; }

        .distance-display {
            margin-top: 10px; text-align: center; font-size: 14px;
            font-weight: bold; padding-top: 10px; border-top: 1px solid #eee;
        }
        .hint { font-size: 10px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div id="map">
    <div class="search-card">
        <div class="input-group">
            <label>Start Location</label>
            <input type="text" id="start" class="search-box" placeholder="Type or tap map..." onkeyup="getSuggestions(this, 'start')">
            <div id="start-list" class="suggestions"></div>
        </div>

        <div class="input-group">
            <label>End Location</label>
            <input type="text" id="end" class="search-box" placeholder="Type or tap map..." onkeyup="getSuggestions(this, 'end')">
            <div id="end-list" class="suggestions"></div>
        </div>

        <div class="distance-display">
            Distance: <span id="distance-text" style="color: #1a73e8;">0.00</span> KM
        </div>
        <div class="hint">Type for suggestions or tap map to set points.</div>
    </div>
</div>

<script>
var map = L.map('map', { zoomControl: false }).setView([13.0827, 80.2707], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var startLatLng = null, endLatLng = null;
var startMarker = null, endMarker = null, routeLine = null;
var selectionStep = 0; 

// --- SUGGESTIONS LOGIC ---
async function getSuggestions(input, type) {
    let query = input.value;
    let list = document.getElementById(type + '-list');
    if (query.length < 3) { list.style.display = 'none'; return; }

    try {
        let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5`);
        let data = await res.json();
        list.innerHTML = '';
        list.style.display = 'block';
        
        data.forEach(place => {
            let item = document.createElement('div');
            item.innerText = place.display_name;
            item.onclick = () => {
                input.value = place.display_name;
                list.style.display = 'none';
                let latlng = L.latLng(place.lat, place.lon);
                
                if(type === 'start') { startLatLng = latlng; setMarker('start', latlng); }
                else { endLatLng = latlng; setMarker('end', latlng); }
                
                map.flyTo(latlng, 14);
                calculateDistance();
            };
            list.appendChild(item);
        });
    } catch (e) {}
}

// --- CLICK TO SELECT LOGIC ---
map.on('click', async function(e) {
    var latlng = e.latlng;
    if (selectionStep === 0) {
        startLatLng = latlng;
        setMarker('start', latlng);
        document.getElementById("start").value = await getAddress(latlng);
        selectionStep = 1;
    } else {
        endLatLng = latlng;
        setMarker('end', latlng);
        document.getElementById("end").value = await getAddress(latlng);
        selectionStep = 0;
    }
    calculateDistance();
});

async function getAddress(latlng) {
    try {
        var res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
        var data = await res.json();
        return data.display_name.split(',').slice(0,3).join(',');
    } catch (err) { return latlng.lat.toFixed(4) + ", " + latlng.lng.toFixed(4); }
}

function setMarker(type, latlng) {
    if (type == 'start') {
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng).addTo(map);
    } else {
        if (endMarker) map.removeLayer(endMarker);
        endMarker = L.marker(latlng).addTo(map);
    }
}

function calculateDistance() {
    if (startLatLng && endLatLng) {
        var distance = (startLatLng.distanceTo(endLatLng) / 1000).toFixed(2);
        document.getElementById("distance-text").innerText = distance;

        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([startLatLng, endLatLng], { color: '#1a73e8', weight: 4, dashArray: '5, 10' }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

        window.parent.postMessage({
            start: document.getElementById("start").value,
            end: document.getElementById("end").value,
            distance: distance
        }, "*");
    }
}

// Hide dropdowns when clicking elsewhere
document.addEventListener('click', (e) => {
    if (!e.target.classList.contains('search-box')) {
        document.querySelectorAll('.suggestions').forEach(el => el.style.display = 'none');
    }
});
</script>
</body>
</html>
