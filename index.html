<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <!-- LEAFLET -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        .search-box{
            width:400px;
            padding:12px;
            font-size:16px;
        }

        .dropdown{
            width:425px;
            max-height:200px;
            overflow-y:auto;
            border:1px solid #ccc;
            background:white;
            position:relative;
            z-index:9999;
        }

        .dropdown div{
            padding:10px;
            cursor:pointer;
            border-bottom:1px solid #eee;
        }

        .dropdown div:hover{
            background:#f2f2f2;
        }

        button{
            padding:12px 25px;
            font-size:16px;
            cursor:pointer;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>

    <input
        type="text"
        id="start"
        class="search-box"
        placeholder="Search Start Location"
        onkeyup="searchSuggestions('start')">

    <div id="startSuggestions" class="dropdown"></div>

    <br><br>

    <h3>End Location</h3>

    <input
        type="text"
        id="end"
        class="search-box"
        placeholder="Search End Location"
        onkeyup="searchSuggestions('end')">

    <div id="endSuggestions" class="dropdown"></div>

    <br><br>

    <button onclick="calculateDistance()">
        Calculate Distance
    </button>

    <br><br>

    <h3>Distance (KM)</h3>

    <input
        type="text"
        id="distance"
        class="search-box"
        readonly>

</div>

<script>

// ----------------------
// MAP
// ----------------------

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

// ----------------------
// VARIABLES
// ----------------------

var startLatLng = null;
var endLatLng = null;

var startMarker = null;
var endMarker = null;
var routeLine = null;

// ----------------------
// SEARCH SUGGESTIONS
// ----------------------

async function searchSuggestions(type){

    var input =
    document.getElementById(type).value;

    if(input.length < 3){
        return;
    }

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q="
    + encodeURIComponent(input + ", Chennai, Tamil Nadu, India");

    var response = await fetch(url);

    var data = await response.json();

    var suggestionBox =
    document.getElementById(type + "Suggestions");

    suggestionBox.innerHTML = "";

    data.forEach(function(place){

        var div =
        document.createElement("div");

        div.innerHTML =
        place.display_name;

        div.onclick = function(){

            document.getElementById(type).value =
            place.display_name;

            suggestionBox.innerHTML = "";

            var latlng =
            L.latLng(place.lat, place.lon);

            if(type == "start"){

                startLatLng = latlng;

                if(startMarker){
                    map.removeLayer(startMarker);
                }

                startMarker =
                L.marker(latlng)
                .addTo(map)
                .bindPopup("Start Location")
                .openPopup();
            }
            else{

                endLatLng = latlng;

                if(endMarker){
                    map.removeLayer(endMarker);
                }

                endMarker =
                L.marker(latlng)
                .addTo(map)
                .bindPopup("End Location")
                .openPopup();
            }

            map.setView(latlng, 15);
        };

        suggestionBox.appendChild(div);

    });

}

// ----------------------
// MAP CLICK
// ----------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    var url =
    "https://nominatim.openstreetmap.org/reverse?format=json&lat="
    + lat +
    "&lon=" +
    lon;

    var response = await fetch(url);

    var data = await response.json();

    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        data.display_name;
    }

    else if(!endLatLng){

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location")
        .openPopup();

        document.getElementById("end").value =
        data.display_name;

        calculateDistance();
    }

});

// ----------------------
// DISTANCE
// ----------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:4
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
    else{
        alert("Select both Start and End locations");
    }
}

</script>

</body>

</html>
