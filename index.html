<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0e1117;
  --surface:#161b25;
  --surface2:#1e2535;
  --border:#2a3347;
  --text:#e8edf5;
  --muted:#7a8499;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --green:#22c55e;
  --red:#ef4444;
  --radius:10px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  display:flex;
}

.sidebar{
  width:380px;
  min-width:380px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.brand{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
}

.brand-title{
  font-size:15px;
  font-weight:600;
}

.brand-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

.pane{
  padding:14px 16px;
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.field-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.6px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:5px;
}

.form-input{
  width:100%;
  padding:11px 14px;
  font-size:13px;
  font-family:inherit;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  outline:none;
}

.form-input:focus{
  border-color:var(--accent);
}

.vehicle-selector{
  display:flex;
  gap:8px;
}

.vehicle-btn{
  flex:1;
  padding:11px 8px;
  font-size:12px;
  font-weight:600;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface2);
  color:var(--muted);
  cursor:pointer;
}

.vehicle-btn.active{
  border-color:var(--accent);
  background:var(--accent);
  color:white;
}

.btn-calc,
.btn-submit{
  width:100%;
  padding:13px;
  font-size:14px;
  font-weight:700;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  color:white;
}

.btn-calc{
  background:var(--green);
}

.btn-submit{
  background:var(--accent);
}

.result-card{
  background:var(--bg);
  border:1.5px solid var(--accent);
  border-radius:12px;
  padding:14px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.result-card.show{
  display:flex;
}

.rc-row{
  font-size:13px;
  color:var(--muted);
}

.rc-cost{
  font-size:16px;
  font-weight:700;
  color:var(--green);
}

#map{
  flex:1;
  height:100vh;
}

</style>
</head>

<body>

<aside class="sidebar">

  <div class="brand">
    <div class="brand-title">Employee Travel Tracker</div>
    <div class="brand-sub">Route · Distance · Zoho sync</div>
  </div>

  <div class="pane">

    <!-- EMPLOYEE -->
    <div>
      <div class="field-label">Employee Name</div>

      <select id="person-name" class="form-input">
        <option value="">-- Select Employee --</option>
        <option value="Madhumita">Madhumita</option>
        <option value="Muni">Muni</option>
        <option value="Sarath">Sarath</option>
        <option value="Yamuna">Yamuna</option>
        <option value="Antony">Antony</option>
      </select>
    </div>

    <!-- DATE -->
    <div>
      <div class="field-label">Date</div>

      <input
        type="date"
        id="travel-date"
        class="form-input"
        readonly
      />
    </div>

    <!-- FROM -->
    <div>
      <div class="field-label">From</div>

      <input
        type="text"
        id="from-loc"
        class="form-input"
        placeholder="Enter starting location"
      />
    </div>

    <!-- TO -->
    <div>
      <div class="field-label">To</div>

      <input
        type="text"
        id="to-loc"
        class="form-input"
        placeholder="Enter destination"
      />
    </div>

    <!-- VEHICLE -->
    <div>
      <div class="field-label">Vehicle Type</div>

      <div class="vehicle-selector">

        <button
          class="vehicle-btn active"
          id="btn-bike"
          onclick="selectVehicle('bike')"
        >
          Bike ₹3.5/km
        </button>

        <button
          class="vehicle-btn"
          id="btn-car"
          onclick="selectVehicle('car')"
        >
          Car ₹20/km
        </button>

      </div>
    </div>

    <!-- BUTTON -->
    <button class="btn-calc" onclick="calculateRoute()">
      Calculate Route
    </button>

    <!-- RESULT -->
    <div class="result-card" id="result-card">

      <div class="rc-row" id="r-date"></div>
      <div class="rc-row" id="r-name"></div>
      <div class="rc-row" id="r-from"></div>
      <div class="rc-row" id="r-to"></div>
      <div class="rc-row" id="r-dist"></div>
      <div class="rc-row" id="r-dur"></div>

      <div class="rc-cost" id="r-cost"></div>

      <button class="btn-submit" onclick="submitToZoho()">
        Save to Zoho Report
      </button>

    </div>

  </div>

</aside>

<div id="map"></div>

<script>

var ZOHO_WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";

var selectedVehicle = 'bike';
var tripData = null;

// AUTO DATE
window.onload = function () {

  var today = new Date().toISOString().split('T')[0];

  document.getElementById('travel-date').value = today;
};

// MAP
var map = L.map('map').setView([13.0827,80.2707],12);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map);

var routeLayer;

// VEHICLE
function selectVehicle(type){

  selectedVehicle = type;

  document.getElementById('btn-bike')
    .classList.toggle('active', type==='bike');

  document.getElementById('btn-car')
    .classList.toggle('active', type==='car');
}

// GEOCODE
async function geocode(address){

  var url =
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address);

  var r = await fetch(url);

  var d = await r.json();

  if(!d.length){
    throw new Error('Location not found');
  }

  return {
    lat:parseFloat(d[0].lat),
    lon:parseFloat(d[0].lon)
  };
}

// ROUTE
async function getRoute(from,to){

  var url =
    'https://router.project-osrm.org/route/v1/driving/'
    + from.lon + ',' + from.lat + ';'
    + to.lon + ',' + to.lat
    + '?overview=full&geometries=geojson';

  var r = await fetch(url);

  var d = await r.json();

  var route = d.routes[0];

  return {
    distKm:(route.distance/1000).toFixed(2),
    durMin:Math.round(route.duration/60),
    coords:route.geometry.coordinates.map(
      c => [c[1],c[0]]
    )
  };
}

// CALCULATE
async function calculateRoute(){

  var name =
    document.getElementById('person-name').value;

  var date =
    document.getElementById('travel-date').value;

  var from =
    document.getElementById('from-loc').value;

  var to =
    document.getElementById('to-loc').value;

  if(!name || !from || !to){
    alert('Fill all fields');
    return;
  }

  try{

    var fromLL = await geocode(from);
    var toLL   = await geocode(to);

    var route = await getRoute(fromLL,toLL);

    if(routeLayer){
      map.removeLayer(routeLayer);
    }

    routeLayer = L.polyline(route.coords,{
      color:'#3b82f6',
      weight:6
    }).addTo(map);

    map.fitBounds(routeLayer.getBounds());

    var rate =
      selectedVehicle === 'car'
      ? 20
      : 3.5;

    var cost =
      (parseFloat(route.distKm) * rate)
      .toFixed(2);

    tripData = {

      date:date,
      name:name,
      start:from,
      end:to,
      distance:route.distKm,
      duration:route.durMin,
      mode:selectedVehicle,
      cost:cost

    };

    document.getElementById('r-date').innerHTML =
      '📅 Date: <strong>' + date + '</strong>';

    document.getElementById('r-name').innerHTML =
      '👤 Employee: <strong>' + name + '</strong>';

    document.getElementById('r-from').innerHTML =
      '🟢 From: <strong>' + from + '</strong>';

    document.getElementById('r-to').innerHTML =
      '🔴 To: <strong>' + to + '</strong>';

    document.getElementById('r-dist').innerHTML =
      '📍 Distance: <strong>' + route.distKm + ' km</strong>';

    document.getElementById('r-dur').innerHTML =
      '⏱ Duration: <strong>' + route.durMin + ' mins</strong>';

    document.getElementById('r-cost').innerHTML =
      '💰 ₹' + cost;

    document.getElementById('result-card')
      .classList.add('show');

  }
  catch(e){

    alert(e.message);
  }
}

// SUBMIT
function submitToZoho(){

  if(!tripData){
    alert('Calculate route first');
    return;
  }

  var params = new URLSearchParams();

  Object.keys(tripData).forEach(function(k){

    params.append(k, tripData[k]);

  });

  fetch(
    ZOHO_WEBHOOK_URL + '&' + params.toString(),
    {
      method:'GET',
      mode:'no-cors'
    }
  );

  alert('Saved to Zoho!');
}

</script>

</body>
</html>
