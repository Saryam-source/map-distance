<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0e1117;
  --surface:#161b25;
  --surface2:#1e2535;
  --border:#2a3347;
  --text:#e8edf5;
  --muted:#7a8499;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --green:#22c55e;
  --red:#ef4444;
  --radius:10px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  display:flex;
}

.sidebar{
  width:390px;
  min-width:390px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  z-index:100;
}

.brand{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-icon{
  width:32px;
  height:32px;
  background:var(--accent);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand-icon svg{
  width:17px;
  height:17px;
  fill:#fff;
}

.brand-title{
  font-size:15px;
  font-weight:600;
}

.brand-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:1px;
}

.pane{
  padding:14px 16px;
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.field-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.6px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:5px;
}

.form-input{
  width:100%;
  padding:11px 14px;
  font-size:13px;
  font-family:inherit;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  outline:none;
  transition:.2s;
}

.form-input::placeholder{
  color:var(--muted);
}

.form-input:focus{
  border-color:var(--accent);
  background:var(--surface2);
}

.ac-wrap{
  position:relative;
}

.ac-list{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:var(--surface);
  border:1.5px solid var(--accent);
  border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  z-index:9999;
  max-height:240px;
  overflow-y:auto;
  display:none;
}

.ac-list.show{
  display:block;
}

.ac-item{
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
}

.ac-item:hover{
  background:var(--surface2);
}

.ac-main{
  font-weight:600;
  color:var(--text);
}

.ac-sub{
  color:var(--muted);
  font-size:11px;
  margin-top:2px;
}

.vehicle-selector{
  display:flex;
  gap:8px;
}

.vehicle-btn{
  flex:1;
  padding:11px 8px;
  font-size:12px;
  font-weight:600;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface2);
  color:var(--muted);
  cursor:pointer;
  transition:.2s;
}

.vehicle-btn.active{
  border-color:var(--accent);
  background:var(--accent);
  color:#fff;
}

.btn-calc,.btn-submit{
  width:100%;
  padding:13px;
  font-size:14px;
  font-weight:700;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  transition:.2s;
  color:#fff;
}

.btn-calc{
  background:var(--green);
}

.btn-submit{
  background:var(--accent);
}

.result-card{
  background:var(--bg);
  border:1.5px solid var(--accent);
  border-radius:12px;
  padding:14px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.result-card.show{
  display:flex;
}

.rc-top{
  display:flex;
  gap:8px;
}

.rc-metric{
  flex:1;
  background:var(--surface2);
  border-radius:8px;
  padding:10px;
  text-align:center;
}

.rc-value{
  font-size:22px;
  font-weight:700;
  color:var(--accent2);
  font-family:'DM Mono',monospace;
}

#map{
  flex:1;
  height:100vh;
}

@media(max-width:768px){
  body{
    flex-direction:column;
    height:auto;
  }

  .sidebar{
    width:100%;
    min-width:100%;
  }

  #map{
    height:55vh;
  }
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="brand">
  <div class="brand-icon">
    <svg viewBox="0 0 24 24">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
    </svg>
  </div>

  <div>
    <div class="brand-title">Employee Travel Tracker</div>
    <div class="brand-sub">Distance · Route · Zoho Sync</div>
  </div>
</div>

<div class="pane">

  <div>
    <div class="field-label">Employee Name</div>

    <select id="person-name" class="form-input">
      <option value="">-- Select Employee --</option>
      <option value="Madhumita">Madhumita</option>
      <option value="Muni">Muni</option>
      <option value="Sarath">Sarath</option>
      <option value="Yamuna">Yamuna</option>
      <option value="Antony">Antony</option>
    </select>
  </div>

  <div>
    <div class="field-label">Travel Date</div>
    <input type="date" id="travel-date" class="form-input"/>
  </div>

  <div>
    <div class="field-label">From</div>

    <div class="ac-wrap">
      <input
        type="text"
        id="from-loc"
        class="form-input"
        placeholder="Enter starting location..."
        autocomplete="off"
        oninput="acSearch(this,'from-list')"
      />

      <div class="ac-list" id="from-list"></div>
    </div>
  </div>

  <div>
    <div class="field-label">To</div>

    <div class="ac-wrap">
      <input
        type="text"
        id="to-loc"
        class="form-input"
        placeholder="Enter destination..."
        autocomplete="off"
        oninput="acSearch(this,'to-list')"
      />

      <div class="ac-list" id="to-list"></div>
    </div>
  </div>

  <div>
    <div class="field-label">Vehicle Type</div>

    <div class="vehicle-selector">
      <button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">
        Bike Rs.3.5/km
      </button>

      <button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">
        Car Rs.20/km
      </button>
    </div>
  </div>

  <button class="btn-calc" onclick="calculateRoute()">
    Calculate Route
  </button>

  <div class="result-card" id="result-card">

    <div class="rc-top">

      <div class="rc-metric">
        <div>Distance</div>
        <div class="rc-value" id="r-dist">-</div>
      </div>

      <div class="rc-metric">
        <div>Duration</div>
        <div class="rc-value" id="r-dur">-</div>
      </div>

    </div>

    <div id="r-name"></div>
    <div id="r-date"></div>
    <div id="r-from"></div>
    <div id="r-to"></div>
    <div id="r-cost"></div>

    <button class="btn-submit" onclick="submitToZoho()">
      Save to Zoho Report
    </button>

  </div>

</div>
</aside>

<div id="map"></div>

<script>

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=YOUR_WEBHOOK";

document.getElementById('travel-date').value =
new Date().toISOString().split('T')[0];

var map = L.map('map').setView([13.0827, 80.2707],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
  maxZoom:19,
  attribution:'© OpenStreetMap'
}
).addTo(map);

var selectedVehicle = 'bike';

var routeLayer = null;
var fromMarker = null;
var toMarker = null;

var tripData = null;

var greenIcon = new L.Icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
  shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41],
  popupAnchor:[1,-34],
  shadowSize:[41,41]
});

var redIcon = new L.Icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41],
  popupAnchor:[1,-34],
  shadowSize:[41,41]
});

function selectVehicle(type){

  selectedVehicle = type;

  document.getElementById('btn-bike')
  .classList.toggle('active',type==='bike');

  document.getElementById('btn-car')
  .classList.toggle('active',type==='car');
}

async function acSearch(input,listId){

  var query = input.value.trim();

  var list = document.getElementById(listId);

  if(query.length < 3){
    list.innerHTML = '';
    list.classList.remove('show');
    return;
  }

  try{

    var url =
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(query)
    + '&countrycodes=in&limit=10';

    var r = await fetch(url);

    var d = await r.json();

    list.innerHTML = d.map(function(item){

      var safe = item.display_name
      .replace(/\\/g,'\\\\')
      .replace(/'/g,"\\'");

      return `
      <div class="ac-item"
      onmousedown="acSelect('${listId}','${safe}')">

      <div class="ac-main">
      ${item.display_name.split(',')[0]}
      </div>

      <div class="ac-sub">
      ${item.display_name}
      </div>

      </div>
      `;

    }).join('');

    list.classList.add('show');

  }catch(e){
    console.error(e);
  }
}

async function geocode(address){

  var r = await fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address)
    + '&countrycodes=in&limit=1'
  );

  var d = await r.json();

  if(!d.length){
    throw new Error('Location not found');
  }

  return {
    lat:parseFloat(d[0].lat),
    lon:parseFloat(d[0].lon)
  };
}

async function autoPinLocation(type,address){

  try{

    var loc = await geocode(address);

    if(type === 'from'){

      if(fromMarker){
        map.removeLayer(fromMarker);
      }

      fromMarker = L.marker(
        [loc.lat,loc.lon],
        {icon:greenIcon}
      )
      .addTo(map)
      .bindPopup('FROM: '+address);

    }else{

      if(toMarker){
        map.removeLayer(toMarker);
      }

      toMarker = L.marker(
        [loc.lat,loc.lon],
        {icon:redIcon}
      )
      .addTo(map)
      .bindPopup('TO: '+address);
    }

    var bounds = [];

    if(fromMarker){
      bounds.push(fromMarker.getLatLng());
    }

    if(toMarker){
      bounds.push(toMarker.getLatLng());
    }

    if(bounds.length > 0){
      map.fitBounds(bounds,{padding:[50,50]});
    }

  }catch(e){
    console.error(e);
  }
}

function acSelect(listId,value){

  var isFrom = listId === 'from-list';

  var inputId = isFrom ? 'from-loc' : 'to-loc';

  document.getElementById(inputId).value = value;

  document.getElementById(listId)
  .classList.remove('show');

  autoPinLocation(
    isFrom ? 'from' : 'to',
    value
  );
}

async function getRoute(from,to){

  var url =
  'https://router.project-osrm.org/route/v1/driving/'
  + from.lon + ',' + from.lat + ';'
  + to.lon + ',' + to.lat
  + '?overview=full&geometries=geojson';

  var r = await fetch(url);

  var d = await r.json();

  var route = d.routes[0];

  return {
    distKm:(route.distance/1000).toFixed(2),
    durMin:Math.round(route.duration/60),
    coords:route.geometry.coordinates.map(
      c => [c[1],c[0]]
    )
  };
}

async function calculateRoute(){

  var name =
  document.getElementById('person-name').value;

  var date =
  document.getElementById('travel-date').value;

  var from =
  document.getElementById('from-loc').value;

  var to =
  document.getElementById('to-loc').value;

  if(!name || !from || !to){
    alert('Please fill all fields');
    return;
  }

  try{

    var fromLL = await geocode(from);

    var toLL = await geocode(to);

    var route = await getRoute(fromLL,toLL);

    if(routeLayer){
      map.removeLayer(routeLayer);
    }

    routeLayer = L.polyline(
      route.coords,
      {
        color:'#3b82f6',
        weight:6
      }
    ).addTo(map);

    map.fitBounds(routeLayer.getBounds(),{
      padding:[40,40]
    });

    var rate =
    selectedVehicle === 'car' ? 20 : 3.5;

    var cost =
    (parseFloat(route.distKm) * rate)
    .toFixed(2);

    tripData = {
      name:name,
      date:date,
      start:from,
      end:to,
      distance:route.distKm,
      duration:route.durMin,
      mode:selectedVehicle,
      cost:cost
    };

    document.getElementById('r-dist')
    .textContent = route.distKm + ' km';

    document.getElementById('r-dur')
    .textContent = route.durMin + ' min';

    document.getElementById('r-name')
    .innerHTML = '<b>'+name+'</b>';

    document.getElementById('r-date')
    .innerHTML = 'Date: <b>'+date+'</b>';

    document.getElementById('r-from')
    .innerHTML = 'From: <b>'+from+'</b>';

    document.getElementById('r-to')
    .innerHTML = 'To: <b>'+to+'</b>';

    document.getElementById('r-cost')
    .innerHTML = '<b>Estimated Cost: Rs.'
    + cost + '</b>';

    document.getElementById('result-card')
    .classList.add('show');

  }catch(e){

    console.error(e);

    alert(e.message);
  }
}

function submitToZoho(){

  if(!tripData){
    alert('Calculate route first');
    return;
  }

  var params = new URLSearchParams();

  Object.keys(tripData).forEach(function(k){
    params.append(k,tripData[k]);
  });

  fetch(
    ZOHO_WEBHOOK_URL + '&' + params.toString(),
    {
      method:'GET',
      mode:'no-cors'
    }
  );

  alert('Saved to Zoho!');
}

</script>
</body>
</html>
