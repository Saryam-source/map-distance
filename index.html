<!DOCTYPE html>
<html>
<head>

<title>Google Distance Calculator</title>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

#map{
height:500px;
width:100%;
}

.container{
padding:20px;
background:white;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4285f4;
color:white;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#2f6fe4;
}

#distance{
background:#eee;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="container">

<h2>Map Distance Calculator</h2>

<input
type="text"
id="start"
placeholder="Enter Start Address">

<input
type="text"
id="end"
placeholder="Enter End Address">

<input
type="text"
id="distance"
readonly
placeholder="Distance appears here">

<button onclick="calculateDistance()">
Calculate Distance
</button>

<button onclick="resetMap()">
Reset
</button>

</div>

<script>

let map;
let geocoder;
let startMarker=null;
let endMarker=null;
let line=null;

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
zoom:11,
center:{lat:13.0827,lng:80.2707}
});

geocoder=new google.maps.Geocoder();

map.addListener("click",function(e){

placeMarker(e.latLng);

});

}

function placeMarker(location){

if(!startMarker){

startMarker=new google.maps.Marker({
position:location,
map:map
});

document.getElementById("start").value=
location.lat()+","+location.lng();

}

else if(!endMarker){

endMarker=new google.maps.Marker({
position:location,
map:map
});

document.getElementById("end").value=
location.lat()+","+location.lng();

calculateDistance();

}

else{

resetMap();

startMarker=new google.maps.Marker({
position:location,
map:map
});

document.getElementById("start").value=
location.lat()+","+location.lng();

}

}

function geocodeAddress(address){

return new Promise((resolve,reject)=>{

geocoder.geocode(
{address:address},
function(results,status){

if(status==="OK"){

resolve(results[0].geometry.location);

}else{

reject("Location not found");

}

});

});

}

async function calculateDistance(){

try{

let startInput=
document.getElementById("start").value;

let endInput=
document.getElementById("end").value;

let start=
await geocodeAddress(startInput);

let end=
await geocodeAddress(endInput);

if(startMarker)startMarker.setMap(null);
if(endMarker)endMarker.setMap(null);
if(line)line.setMap(null);

startMarker=new google.maps.Marker({
position:start,
map:map
});

endMarker=new google.maps.Marker({
position:end,
map:map
});

line=new google.maps.Polyline({
path:[start,end],
map:map,
strokeColor:"#4285f4",
strokeWeight:5
});

let distance=
google.maps.geometry.spherical
.computeDistanceBetween(start,end)/1000;

document.getElementById("distance").value=
distance.toFixed(2)+" KM";

let bounds=new google.maps.LatLngBounds();
bounds.extend(start);
bounds.extend(end);
map.fitBounds(bounds);

window.parent.postMessage({

start:startInput,
end:endInput,
distance:distance.toFixed(2)

},"*");

}catch(err){

alert(err);

}

}

function resetMap(){

if(startMarker)startMarker.setMap(null);
if(endMarker)endMarker.setMap(null);
if(line)line.setMap(null);

startMarker=null;
endMarker=null;
line=null;

document.getElementById("start").value="";
document.getElementById("end").value="";
document.getElementById("distance").value="";

map.setCenter({lat:13.0827,lng:80.2707});
map.setZoom(11);

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_API_KEY&libraries=geometry&callback=initMap">
</script>

</body>
</html>
