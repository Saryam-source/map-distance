<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:350px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            margin-left:10px;
            margin-bottom:15px;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>

    <input
        type="text"
        id="start"
        placeholder="Type start location">

    <button onclick="setStartLocation()">
        Submit Start
    </button>

    <br><br>

    <h3>End Location</h3>

    <input
        type="text"
        id="end"
        placeholder="Type end location">

    <button onclick="setEndLocation()">
        Submit End
    </button>

    <br><br>

    <h3>Distance (KM)</h3>

    <input
        type="text"
        id="distance"
        readonly>

</div>

<script>

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ----------------------
// SEARCH START
// ----------------------

async function setStartLocation(){

    var location =
    document.getElementById("start").value;

    if(location == ""){
        alert("Enter Start Location");
        return;
    }

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&q="
    + encodeURIComponent(location + ", Chennai, Tamil Nadu, India");

    var response = await fetch(url);

    var data = await response.json();

    if(data.length == 0){
        alert("Location not found");
        return;
    }

    var lat = parseFloat(data[0].lat);
    var lon = parseFloat(data[0].lon);

    startLatLng = L.latLng(lat, lon);

    if(startMarker){
        map.removeLayer(startMarker);
    }

    startMarker =
    L.marker(startLatLng)
    .addTo(map)
    .bindPopup(data[0].display_name)
    .openPopup();

    document.getElementById("start").value =
    data[0].display_name;

    map.setView(startLatLng, 15);

    calculateDistance();
}

// ----------------------
// SEARCH END
// ----------------------

async function setEndLocation(){

    var location =
    document.getElementById("end").value;

    if(location == ""){
        alert("Enter End Location");
        return;
    }

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&q="
    + encodeURIComponent(location + ", Chennai, Tamil Nadu, India");

    var response = await fetch(url);

    var data = await response.json();

    if(data.length == 0){
        alert("Location not found");
        return;
    }

    var lat = parseFloat(data[0].lat);
    var lon = parseFloat(data[0].lon);

    endLatLng = L.latLng(lat, lon);

    if(endMarker){
        map.removeLayer(endMarker);
    }

    endMarker =
    L.marker(endLatLng)
    .addTo(map)
    .bindPopup(data[0].display_name)
    .openPopup();

    document.getElementById("end").value =
    data[0].display_name;

    map.setView(endLatLng, 15);

    calculateDistance();
}

// ----------------------
// MAP CLICK
// ----------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    var url =
    "https://nominatim.openstreetmap.org/reverse?format=json&lat="
    + lat +
    "&lon=" +
    lon;

    var response = await fetch(url);

    var data = await response.json();

    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        // AUTO FILL START LOCATION

        document.getElementById("start").value =
        data.display_name;
    }
    else if(!endLatLng){

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location")
        .openPopup();

        // AUTO FILL END LOCATION

        document.getElementById("end").value =
        data.display_name;

        calculateDistance();
    }
    else{

        // RESET EVERYTHING

        if(startMarker){
            map.removeLayer(startMarker);
        }

        if(endMarker){
            map.removeLayer(endMarker);
        }

        if(routeLine){
            map.removeLayer(routeLine);
        }

        startLatLng = e.latlng;
        endLatLng = null;

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        data.display_name;

        document.getElementById("end").value = "";

        document.getElementById("distance").value = "";
    }

});

// ----------------------
// DISTANCE
// ----------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue'
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

</script>

</body>
</html>
