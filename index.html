<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1117;--surface:#161b25;--surface2:#1e2535;--border:#2a3347;
  --text:#e8edf5;--muted:#7a8499;--accent:#3b82f6;--accent2:#60a5fa;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

.sidebar{width:400px;min-width:400px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden}
.brand{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:17px;height:17px;fill:#fff}
.brand-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}

.pane{padding:14px 16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.pane::-webkit-scrollbar{width:4px}
.pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.field-label{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.name-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s}
.name-input::placeholder{color:var(--muted)}
.name-input:focus{border-color:var(--accent);background:var(--surface2)}

.tracker-panel{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:11px}

.status-bar{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:8px;background:var(--surface2)}
.s-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.s-dot.idle{background:var(--muted)}
.s-dot.tracking{background:var(--green);animation:blink 1.1s infinite}
.s-dot.done{background:var(--accent2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.s-body{flex:1}
.s-text{font-size:13px;font-weight:500}
.s-coords{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

.live-metrics{display:flex;gap:7px}
.lm{flex:1;background:var(--surface2);border-radius:8px;padding:9px 8px;text-align:center}
.lm-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.lm-val{font-size:19px;font-weight:700;color:var(--accent2);font-family:'DM Mono',monospace;line-height:1}
.lm-unit{font-size:9px;color:var(--muted);margin-top:2px;font-weight:500}

.track-actions{display:flex;gap:7px}
.btn-start{flex:1;padding:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;transition:.2s;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-start:hover:not(:disabled){background:#16a34a;box-shadow:0 0 16px rgba(34,197,94,.35)}
.btn-start:disabled{background:#1a3a22;color:#3a6a42;cursor:not-allowed}
.btn-stop{flex:1;padding:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;transition:.2s;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-stop:hover:not(:disabled){background:#b91c1c}
.btn-stop:disabled{background:#3a1a1a;color:#7a3a3a;cursor:not-allowed}
.btn-reset{padding:13px 12px;font-size:12px;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.btn-reset:hover{color:var(--text);border-color:#3a4560}
.btn-reset svg{width:16px;height:16px;fill:currentColor}

.path-hint{display:none;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.path-hint.show{display:flex}
.ph-bar{width:24px;height:4px;border-radius:2px;background:var(--green)}

.from-to-inputs{display:flex;flex-direction:column;gap:8px}
.ft-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s}
.ft-input::placeholder{color:var(--muted)}
.ft-input:focus{border-color:var(--accent);background:var(--surface2)}
.autocomplete-wrapper{position:relative;width:100%}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:9999;max-height:200px;overflow-y:auto;display:none;}
.autocomplete-list.show{display:block}
.autocomplete-item{padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);line-height:1.4}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:var(--border);color:#fff}
.autocomplete-item .main{font-weight:500;font-size:13px}
.autocomplete-item .sub{color:var(--muted);font-size:11px;margin-top:2px}
.vehicle-selector{display:flex;gap:8px}
.vehicle-btn{flex:1;padding:10px 8px;font-size:12px;font-weight:600;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.vehicle-btn:hover{border-color:var(--accent);color:var(--text)}
.vehicle-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.vehicle-btn svg{width:16px;height:16px;fill:currentColor}

.result-card{background:var(--bg);border:1.5px solid var(--accent);border-radius:12px;padding:14px;display:none;flex-direction:column;gap:10px}
.result-card.show{display:flex}
.section-hdr{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.rc-top{display:flex;gap:8px}
.rc-metric{flex:1;background:var(--surface2);border-radius:8px;padding:10px}
.rc-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;font-weight:600}
.rc-value{font-size:21px;font-weight:700;color:var(--accent2);font-family:'DM Mono',monospace;line-height:1}
.rc-unit{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.rc-details{display:flex;flex-direction:column;gap:5px}
.rc-row{font-size:12px;color:var(--muted);line-height:1.5}
.rc-row strong{color:var(--text)}

.btn-submit{width:100%;padding:12px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;background:var(--accent);color:#fff;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-submit:hover:not(:disabled){background:#2563eb}
.btn-submit:disabled{background:#1a2d4a;color:#3a5a8a;cursor:not-allowed}

/* Status message box */
.status-msg{border-radius:8px;padding:10px 12px;font-size:12px;display:none;align-items:flex-start;gap:8px;line-height:1.5}
.status-msg.show{display:flex}
.status-msg svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;margin-top:1px}
.status-msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.status-msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.status-msg.loading{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent2)}

#map{flex:1;height:100vh;z-index:1;position:relative}
.live-banner{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;color:var(--text);z-index:500;display:none;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(0,0,0,.4);white-space:nowrap}
.live-banner.show{display:flex}
.lb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.1s infinite;flex-shrink:0}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.mkr{width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid rgba(255,255,255,.85);box-shadow:0 3px 12px rgba(0,0,0,.5);position:relative}
.mkr::after{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:#fff;border-radius:50%;transform:translate(-50%,-50%) rotate(45deg)}
.mkr.s{background:var(--green)}
.mkr.e{background:var(--red)}
.live-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid #fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,130,246,.6)}70%{box-shadow:0 0 0 12px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}

@media(max-width:768px){
  body{flex-direction:column;overflow:auto;height:auto}
  .sidebar{width:100%;min-width:unset;height:auto}
  #map{height:50vh;min-height:320px}
}

.btn-route{width:100%;padding:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:var(--radius);cursor:pointer;background:var(--accent);color:#fff;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-route:hover:not(:disabled){background:#2563eb;box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-route:disabled{background:#1a2d4a;color:#3a5a8a;cursor:not-allowed}
.ft-input{width:100%;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:.2s}
.ft-input::placeholder{color:var(--muted)}
.ft-input:focus{border-color:var(--accent);background:var(--surface2)}
.autocomplete-wrapper{position:relative;width:100%}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:9999;max-height:200px;overflow-y:auto;display:none;}
.autocomplete-list.show{display:block}
.autocomplete-item{padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);line-height:1.4}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:var(--border);color:#fff}
.autocomplete-item .main{font-weight:500;font-size:13px}
.autocomplete-item .sub{color:var(--muted);font-size:11px;margin-top:2px}
.route-summary{background:var(--bg);border:1.5px solid var(--accent);border-radius:12px;padding:14px;display:none;flex-direction:column;gap:10px}
.route-summary.show{display:flex}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    <div>
      <div class="brand-title">Employee Travel Tracker</div>
      <div class="brand-sub">Route · Distance · Zoho sync</div>
    </div>
  </div>

  <div class="pane">

    <!-- EMPLOYEE NAME -->
    <div>
      <div class="field-label">Employee Name</div>
      <select id="person-name" class="name-input" style="cursor:pointer;">
        <option value="">-- Select Employee --</option>
        <option value="Madhumita">Madhumita</option>
        <option value="Muni">Muni</option>
        <option value="Sarath">Sarath</option>
        <option value="Yamuna">Yamuna</option>
        <option value="Antony">Antony</option>
      </select>
    </div>

    <!-- FROM -->
    <div>
      <div class="field-label">From</div>
      <div class="autocomplete-wrapper">
        <input type="text" id="from-location" class="ft-input" placeholder="Enter starting location..." autocomplete="off" oninput="acSearch(this,'from-list')" onblur="acHide('from-list')"/>
        <div class="autocomplete-list" id="from-list"></div>
      </div>
    </div>

    <!-- TO -->
    <div>
      <div class="field-label">To</div>
      <div class="autocomplete-wrapper">
        <input type="text" id="to-location" class="ft-input" placeholder="Enter destination..." autocomplete="off" oninput="acSearch(this,'to-list')" onblur="acHide('to-list')"/>
        <div class="autocomplete-list" id="to-list"></div>
      </div>
    </div>

    <!-- VEHICLE TYPE -->
    <div>
      <div class="field-label">Vehicle Type</div>
      <div class="vehicle-selector">
        <button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">
          🏍️ Bike — ₹3.5/km
        </button>
        <button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">
          🚗 Car — ₹20/km
        </button>
      </div>
    </div>

    <!-- CALCULATE ROUTE BUTTON -->
    <button class="btn-route" id="btn-route" onclick="calculateRoute()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21.71 11.29l-9-9a1 1 0 0 0-1.42 0l-9 9a1 1 0 0 0 0 1.42l9 9a1 1 0 0 0 1.42 0l9-9a1 1 0 0 0 0-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
      Calculate Route &amp; Submit
    </button>

    <!-- ROUTE SUMMARY -->
    <div class="route-summary" id="route-summary">
      <div class="section-hdr">Route Summary</div>
      <div class="rc-top">
        <div class="rc-metric">
          <div class="rc-label">Distance</div>
          <div class="rc-value" id="r-dist">—</div>
          <div class="rc-unit">kilometres</div>
        </div>
        <div class="rc-metric">
          <div class="rc-label">Duration</div>
          <div class="rc-value" id="r-dur">—</div>
          <div class="rc-unit">mins</div>
        </div>
      </div>
      <div class="rc-details">
        <div class="rc-row" id="r-name"></div>
        <div class="rc-row" id="r-from"></div>
        <div class="rc-row" id="r-to"></div>
        <div class="rc-row" id="r-cost" style="font-size:13px;font-weight:700;color:var(--green);margin-top:2px"></div>
      </div>
    </div>

    <!-- STATUS MESSAGES -->
    <div class="status-msg loading" id="msg-loading">
      <span class="spin" style="border-top-color:var(--accent2)"></span>
      <span id="msg-loading-text">Calculating route...</span>
    </div>
    <div class="status-msg ok" id="msg-ok">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="flex-shrink:0;margin-top:1px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span id="msg-ok-text">Saved to Zoho!</span>
    </div>
    <div class="status-msg err" id="msg-err">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="flex-shrink:0;margin-top:1px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="msg-err-text">Error. Please try again.</span>
    </div>

  </div>
</aside>

<div id="map" style="position:relative;flex:1;height:100vh;">
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
var ZOHO_WEBHOOK_URL = "https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";
var ORS_API_KEY = "5b3ce3597851110001cf6248a355e0e2bc874b03bc3a06c223bfd7c0"; // free ORS key

// ═══════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════
var map = L.map('map', {zoomControl:false}).setView([13.0827, 80.2707], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

var routeLayer = null;
var startMarker = null;
var endMarker = null;
var selectedVehicle = 'bike';
var currentGPS = null;

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, dur||2500);
}

function showMsg(type, txt) {
  ['loading','ok','err'].forEach(function(t){
    document.getElementById('msg-'+t).classList.remove('show');
  });
  if(type) {
    document.getElementById('msg-'+type).classList.add('show');
    if(txt) {
      var el = document.getElementById('msg-'+type+'-text');
      if(el) el.textContent = txt;
    }
  }
}

function selectVehicle(type) {
  selectedVehicle = type;
  document.getElementById('btn-bike').classList.toggle('active', type==='bike');
  document.getElementById('btn-car').classList.toggle('active', type==='car');
}

function makeMarker(ll, color) {
  return L.circleMarker(ll, {
    radius:10, fillColor:color, color:'#fff',
    weight:3, opacity:1, fillOpacity:1
  });
}

// ═══════════════════════════════════════════
// GEOCODE (address → lat/lng)
// ═══════════════════════════════════════════
async function geocode(address) {
  var url = 'https://api.openrouteservice.org/geocode/search?api_key=' + ORS_API_KEY +
            '&text=' + encodeURIComponent(address) + '&size=1';
  var r = await fetch(url);
  var d = await r.json();
  if(!d.features || !d.features.length) throw new Error('Location not found: ' + address);
  var coords = d.features[0].geometry.coordinates;
  return [coords[1], coords[0]]; // [lat, lng]
}

// ═══════════════════════════════════════════
// GET ROUTE (ORS Directions)
// ═══════════════════════════════════════════
async function getRoute(fromLL, toLL) {
  var url = 'https://api.openrouteservice.org/v2/directions/driving-car/geojson';
  var r = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':ORS_API_KEY},
    body: JSON.stringify({
      coordinates: [[fromLL[1],fromLL[0]], [toLL[1],toLL[0]]]
    })
  });
  var d = await r.json();
  if(!d.features || !d.features.length) throw new Error('Route not found');
  var seg = d.features[0].properties.segments[0];
  var distKm = (seg.distance / 1000).toFixed(2);
  var durMin = Math.round(seg.duration / 60);
  var coords = d.features[0].geometry.coordinates.map(function(c){ return [c[1],c[0]]; });
  return { distKm:distKm, durMin:durMin, coords:coords };
}

// ═══════════════════════════════════════════
// AUTOCOMPLETE
// ═══════════════════════════════════════════
var acTimers = {};

function acSearch(input, listId) {
  var query = input.value.trim();
  var list = document.getElementById(listId);
  clearTimeout(acTimers[listId]);

  if(query.length < 3) {
    list.classList.remove('show');
    list.innerHTML = '';
    return;
  }

  acTimers[listId] = setTimeout(async function() {
    try {
      var url = 'https://api.openrouteservice.org/geocode/autocomplete?api_key=' + ORS_API_KEY +
                '&text=' + encodeURIComponent(query) +
                '&boundary.country=IN&size=20';
      var r = await fetch(url);
      var d = await r.json();

      if(!d.features || !d.features.length) {
        list.classList.remove('show');
        return;
      }

      list.innerHTML = d.features.map(function(f) {
        var label = f.properties.label || '';
        var name  = f.properties.name  || label;
        var region = [f.properties.locality, f.properties.region, f.properties.country]
                      .filter(Boolean).join(', ');
        return '<div class="autocomplete-item" onmousedown="acSelect('' + listId + '','' +
               label.replace(/'/g,"\'") + '')">' +
               '<div class="main">' + name + '</div>' +
               '<div class="sub">' + region + '</div></div>';
      }).join('');

      list.classList.add('show');
    } catch(e) {
      list.classList.remove('show');
    }
  }, 350);
}

function acSelect(listId, value) {
  var inputId = listId === 'from-list' ? 'from-location' : 'to-location';
  document.getElementById(inputId).value = value;
  document.getElementById(listId).classList.remove('show');
  document.getElementById(listId).innerHTML = '';
}

function acHide(listId) {
  setTimeout(function() {
    document.getElementById(listId).classList.remove('show');
  }, 200);
}

// ═══════════════════════════════════════════
// MAIN: CALCULATE ROUTE & SUBMIT
// ═══════════════════════════════════════════
async function calculateRoute() {
  var name = document.getElementById('person-name').value.trim();
  var from = document.getElementById('from-location').value.trim();
  var to   = document.getElementById('to-location').value.trim();

  if(!name) { alert('Please select employee name'); return; }
  if(!from) { alert('Please enter From location');  return; }
  if(!to)   { alert('Please enter To location');    return; }

  var btn = document.getElementById('btn-route');
  btn.disabled = true;
  document.getElementById('route-summary').classList.remove('show');
  showMsg('loading', 'Getting your GPS location...');

  try {
    // STEP 1: Get current GPS silently
    var gpsPos = await new Promise(function(resolve, reject) {
      navigator.geolocation.getCurrentPosition(resolve, function() {
        resolve(null); // GPS failed — continue anyway
      }, {timeout:8000, enableHighAccuracy:true});
    });
    if(gpsPos) {
      currentGPS = {lat: gpsPos.coords.latitude, lng: gpsPos.coords.longitude};
    }

    // STEP 2: Geocode From and To
    showMsg('loading', 'Finding locations...');
    var fromLL = await geocode(from);
    var toLL   = await geocode(to);

    // STEP 3: Get route
    showMsg('loading', 'Calculating route...');
    var route = await getRoute(fromLL, toLL);

    // STEP 4: Draw route on map
    if(routeLayer) map.removeLayer(routeLayer);
    if(startMarker) map.removeLayer(startMarker);
    if(endMarker) map.removeLayer(endMarker);

    routeLayer = L.polyline(route.coords, {color:'#3b82f6', weight:5, opacity:.9}).addTo(map);
    startMarker = makeMarker(fromLL, '#22c55e').addTo(map).bindPopup('<b>From:</b> '+from);
    endMarker   = makeMarker(toLL,   '#ef4444').addTo(map).bindPopup('<b>To:</b> '+to);
    map.fitBounds(routeLayer.getBounds(), {padding:[40,40]});

    // STEP 5: Calculate cost
    var rate = selectedVehicle === 'car' ? 20 : 3.5;
    var cost = (parseFloat(route.distKm) * rate).toFixed(2);

    // Show summary
    document.getElementById('r-dist').textContent = route.distKm;
    document.getElementById('r-dur').textContent  = route.durMin;
    document.getElementById('r-name').innerHTML   = '👤 <strong>' + name + '</strong>';
    document.getElementById('r-from').innerHTML   = '🟢 <strong>From:</strong> ' + from;
    document.getElementById('r-to').innerHTML     = '🔴 <strong>To:</strong> ' + to;
    document.getElementById('r-cost').innerHTML   = '💰 Cost: <strong>₹' + cost + '</strong> (' + selectedVehicle + ' @ ₹' + rate + '/km)';
    document.getElementById('route-summary').classList.add('show');

    // STEP 6: Send to Zoho Flow automatically
    showMsg('loading', 'Saving to Zoho...');
    var payload = {
      name:         name,
      start:        from,
      end:          to,
      distance:     route.distKm,
      duration:     String(route.durMin),
      mode:         selectedVehicle,
      cost:         cost,
      gps_lat:      currentGPS ? String(currentGPS.lat) : '',
      gps_lng:      currentGPS ? String(currentGPS.lng) : '',
      timestamp:    new Date().toISOString()
    };

    var params = new URLSearchParams();
    Object.keys(payload).forEach(function(k){ params.append(k, payload[k]); });
    await fetch(ZOHO_WEBHOOK_URL + '&' + params.toString(), {method:'GET', mode:'no-cors'});

    // STEP 7: Show success
    showMsg('ok', '✅ Route calculated & saved to Zoho!');
    toast('Saved to Zoho Report!', 3000);

  } catch(e) {
    showMsg('err', '❌ ' + (e.message || 'Something went wrong'));
    console.error(e);
  }

  btn.disabled = false;
}
</script>
