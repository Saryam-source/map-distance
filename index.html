<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee Travel Distance Automation</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
overflow:hidden;
background:#0f172a;
color:white;
}

.sidebar{
width:400px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid #374151;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
color:#9ca3af;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group select,
.input-group input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
font-size:15px;
}

.vehicle-container{
display:flex;
gap:10px;
margin-bottom:20px;
}

.vehicle-btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.vehicle-btn.active{
background:#2563eb;
}

.calc-btn{
width:100%;
padding:15px;
background:#10b981;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.calc-btn:hover{
background:#059669;
}

.result-box{
margin-top:25px;
background:#1f2937;
padding:20px;
border-radius:15px;
}

.result-item{
margin-bottom:15px;
font-size:18px;
}

.result-label{
font-weight:bold;
}

.result-value{
color:#60a5fa;
font-weight:bold;
}

.status{
margin-top:20px;
padding:14px;
border-radius:10px;
background:#064e3b;
color:#d1fae5;
font-weight:bold;
}

#map{
flex:1;
height:100vh;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="title">
Travel Distance System
</div>

<div class="subtitle">
GPS • Route • Zoho Automation
</div>

<div class="input-group">
<label>Employee Name</label>

<select id="employee-name">

<option value="">Select Employee</option>

<option>Madhumita</option>
<option>Muni</option>
<option>Antony</option>
<option>Yamuna</option>
<option>Sarath</option>

</select>
</div>

<div class="input-group">
<label>From Location</label>

<input
type="text"
id="from-location"
placeholder="Enter From Location">
</div>

<div class="input-group">
<label>To Location</label>

<input
type="text"
id="to-location"
placeholder="Enter To Location">
</div>

<div class="vehicle-container">

<button
class="vehicle-btn active"
id="carBtn"
onclick="selectVehicle('driving-car')">

🚗 Car

</button>

<button
class="vehicle-btn"
id="bikeBtn"
onclick="selectVehicle('cycling-regular')">

🏍 Bike

</button>

<button
class="vehicle-btn"
id="walkBtn"
onclick="selectVehicle('foot-walking')">

🚶 Walk

</button>

</div>

<button
class="calc-btn"
onclick="calculateAndSaveTrip()">

Calculate & Save Trip

</button>

<div class="result-box">

<div class="result-item">
<span class="result-label">Distance:</span>
<span class="result-value" id="distance">
0 km
</span>
</div>

<div class="result-item">
<span class="result-label">Duration:</span>
<span class="result-value" id="duration">
0 min
</span>
</div>

<div class="result-item">
<span class="result-label">Cost:</span>
<span class="result-value" id="cost">
₹0
</span>
</div>

<div class="result-item">
<span class="result-label">Vehicle:</span>
<span class="result-value" id="vehicle-name">
Car
</span>
</div>

</div>

<div class="status" id="statusBox">

Ready to calculate trip.

</div>

</div>

<div id="map"></div>

<script>

// ================================
// OPENROUTESERVICE API KEY
// ================================

const API_KEY =
"PASTE_YOUR_OPENROUTESERVICE_API_KEY";

// ================================
// ZOHO FLOW WEBHOOK
// ================================

const WEBHOOK_URL =
"PASTE_YOUR_ZOHO_FLOW_WEBHOOK_URL";

// ================================
// MAP
// ================================

var map =
L.map('map').setView([13.0827,80.2707],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

var selectedVehicle = "driving-car";

var routeLayer = null;
var startMarker = null;
var endMarker = null;
var gpsMarker = null;

// ================================
// VEHICLE SELECTOR
// ================================

function selectVehicle(type){

selectedVehicle = type;

document
.getElementById('carBtn')
.classList.remove('active');

document
.getElementById('bikeBtn')
.classList.remove('active');

document
.getElementById('walkBtn')
.classList.remove('active');

if(type === 'driving-car'){

document
.getElementById('carBtn')
.classList.add('active');

document
.getElementById('vehicle-name')
.innerText = "Car";

}

if(type === 'cycling-regular'){

document
.getElementById('bikeBtn')
.classList.add('active');

document
.getElementById('vehicle-name')
.innerText = "Bike";

}

if(type === 'foot-walking'){

document
.getElementById('walkBtn')
.classList.add('active');

document
.getElementById('vehicle-name')
.innerText = "Walking";

}

}

// ================================
// GEOCODING
// ================================

async function geocode(place){

const url =
`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(place)}`;

const response = await fetch(url);

const data = await response.json();

if(data.features.length === 0){

throw new Error("Location not found");

}

const coords =
data.features[0].geometry.coordinates;

return {
lng: coords[0],
lat: coords[1]
};

}

// ================================
// MAIN FUNCTION
// ================================

async function calculateAndSaveTrip(){

const employee =
document.getElementById('employee-name').value;

const from =
document.getElementById('from-location').value;

const to =
document.getElementById('to-location').value;

if(!employee || !from || !to){

alert("Please fill all fields");

return;

}

document.getElementById('statusBox')
.innerText = "Fetching GPS location...";

navigator.geolocation.getCurrentPosition(

async function(position){

try{

const gpsLat =
position.coords.latitude;

const gpsLng =
position.coords.longitude;

// ================================
// GET COORDINATES
// ================================

document.getElementById('statusBox')
.innerText = "Converting locations...";

const start =
await geocode(from);

const end =
await geocode(to);

// ================================
// REMOVE OLD ROUTE
// ================================

if(routeLayer){

map.removeLayer(routeLayer);

}

if(startMarker){

map.removeLayer(startMarker);

}

if(endMarker){

map.removeLayer(endMarker);

}

if(gpsMarker){

map.removeLayer(gpsMarker);

}

// ================================
// ADD MARKERS
// ================================

startMarker =
L.marker([start.lat,start.lng])
.addTo(map)
.bindPopup("From")
.openPopup();

endMarker =
L.marker([end.lat,end.lng])
.addTo(map)
.bindPopup("To");

gpsMarker =
L.circleMarker([gpsLat,gpsLng],{
radius:8,
color:'green'
})
.addTo(map)
.bindPopup("Current GPS");

// ================================
// CALCULATE ROUTE
// ================================

document.getElementById('statusBox')
.innerText = "Calculating route...";

const body = {

coordinates:[
[start.lng,start.lat],
[end.lng,end.lat]
]

};

const response = await fetch(

`https://api.openrouteservice.org/v2/directions/${selectedVehicle}/geojson`,

{
method:'POST',

headers:{
'Authorization':API_KEY,
'Content-Type':'application/json'
},

body:JSON.stringify(body)

}

);

const data = await response.json();

// ================================
// DRAW ROUTE
// ================================

routeLayer =
L.geoJSON(data,{
style:{
color:'#2563eb',
weight:6
}
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

// ================================
// DISTANCE + DURATION
// ================================

const summary =
data.features[0].properties.summary;

const distanceKm =
(summary.distance / 1000).toFixed(2);

const durationMin =
Math.round(summary.duration / 60);

// ================================
// COST
// ================================

let rate = 20;

if(selectedVehicle === 'cycling-regular'){

rate = 3.5;

}

if(selectedVehicle === 'foot-walking'){

rate = 0;

}

const totalCost =
(distanceKm * rate).toFixed(2);

// ================================
// UPDATE UI
// ================================

document.getElementById('distance')
.innerText = distanceKm + " km";

document.getElementById('duration')
.innerText = durationMin + " min";

document.getElementById('cost')
.innerText = "₹" + totalCost;

// ================================
// SEND TO ZOHO FLOW
// ================================

document.getElementById('statusBox')
.innerText = "Saving to Zoho...";

const payload = {

employee_name: employee,

from_location: from,

to_location: to,

vehicle: selectedVehicle,

distance: distanceKm,

duration: durationMin,

cost: totalCost,

gps_latitude: gpsLat,

gps_longitude: gpsLng

};

await fetch(WEBHOOK_URL,{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(payload)

});

// ================================
// SUCCESS
// ================================

document.getElementById('statusBox')
.innerText =
"Trip calculated and saved successfully.";

}
catch(error){

console.error(error);

alert("Error calculating route");

document.getElementById('statusBox')
.innerText =
"Error occurred.";

}

},

function(error){

alert("GPS permission denied");

console.error(error);

}

);

}

</script>

</body>

</html>
