<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Selector</title>

    <meta charset="utf-8" />

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:350px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        .label{
            font-size:18px;
            margin-bottom:5px;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <div class="label">Start Location</div>
    <input type="text"
           id="start"
           placeholder="Search start location">

    <br>

    <div class="label">End Location</div>
    <input type="text"
           id="end"
           placeholder="Search end location">

    <br>

    <div class="label">Distance (KM)</div>
    <input type="text"
           id="distance"
           readonly>

</div>

<script>

    // -------------------------
    // CREATE MAP
    // -------------------------

    var map = L.map('map').setView([13.0827, 80.2707], 10);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19
        }
    ).addTo(map);

    // -------------------------
    // VARIABLES
    // -------------------------

    var startMarker = null;
    var endMarker = null;
    var line = null;

    var startLatLng = null;
    var endLatLng = null;

    // -------------------------
    // GEOCODER
    // -------------------------

    var geocoder = L.Control.Geocoder.nominatim();

    // -------------------------
    // SEARCH START LOCATION
    // -------------------------

    document
        .getElementById("start")
        .addEventListener("change", function(){

        var location = this.value;

        geocoder.geocode(location, function(results){

            if(results.length > 0){

                var result = results[0];

                startLatLng = result.center;

                if(startMarker){
                    map.removeLayer(startMarker);
                }

                startMarker = L.marker(startLatLng)
                    .addTo(map)
                    .bindPopup("Start Location")
                    .openPopup();

                map.setView(startLatLng, 13);

                calculateDistance();
            }

        });

    });

    // -------------------------
    // SEARCH END LOCATION
    // -------------------------

    document
        .getElementById("end")
        .addEventListener("change", function(){

        var location = this.value;

        geocoder.geocode(location, function(results){

            if(results.length > 0){

                var result = results[0];

                endLatLng = result.center;

                if(endMarker){
                    map.removeLayer(endMarker);
                }

                endMarker = L.marker(endLatLng)
                    .addTo(map)
                    .bindPopup("End Location")
                    .openPopup();

                map.setView(endLatLng, 13);

                calculateDistance();
            }

        });

    });

    // -------------------------
    // CLICK MAP TO SELECT
    // -------------------------

    map.on("click", function(e){

        if(!startLatLng){

            startLatLng = e.latlng;

            if(startMarker){
                map.removeLayer(startMarker);
            }

            startMarker = L.marker(startLatLng)
                .addTo(map)
                .bindPopup("Start Location")
                .openPopup();

            reverseGeocode(startLatLng, "start");
        }

        else if(!endLatLng){

            endLatLng = e.latlng;

            if(endMarker){
                map.removeLayer(endMarker);
            }

            endMarker = L.marker(endLatLng)
                .addTo(map)
                .bindPopup("End Location")
                .openPopup();

            reverseGeocode(endLatLng, "end");

            calculateDistance();
        }

        else{

            // RESET

            if(startMarker){
                map.removeLayer(startMarker);
            }

            if(endMarker){
                map.removeLayer(endMarker);
            }

            if(line){
                map.removeLayer(line);
            }

            startLatLng = e.latlng;
            endLatLng = null;

            startMarker = L.marker(startLatLng)
                .addTo(map)
                .bindPopup("Start Location")
                .openPopup();

            document.getElementById("end").value = "";
            document.getElementById("distance").value = "";

            reverseGeocode(startLatLng, "start");
        }

    });

    // -------------------------
    // REVERSE GEOCODING
    // -------------------------

    async function reverseGeocode(latlng, type){

        var url =
            "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="
            + latlng.lat
            + "&lon="
            + latlng.lng;

        var response = await fetch(url);

        var data = await response.json();

        if(type == "start"){

            document.getElementById("start").value =
                data.display_name;

        }
        else{

            document.getElementById("end").value =
                data.display_name;

        }

    }

    // -------------------------
    // CALCULATE DISTANCE
    // -------------------------

    function calculateDistance(){

        if(startLatLng && endLatLng){

            var distance =
                startLatLng.distanceTo(endLatLng) / 1000;

            document.getElementById("distance").value =
                distance.toFixed(2);

            // DRAW LINE

            if(line){
                map.removeLayer(line);
            }

            line = L.polyline(
                [startLatLng, endLatLng],
                {
                    color: 'blue'
                }
            ).addTo(map);

            map.fitBounds(line.getBounds());

            // SEND TO ZOHO

            window.parent.postMessage({

                start:
                    document.getElementById("start").value,

                end:
                    document.getElementById("end").value,

                distance:
                    distance.toFixed(2)

            }, "*");
        }

    }

</script>

</body>
</html>
