<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:400px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            padding:12px 25px;
            font-size:16px;
            cursor:pointer;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>

    <input
        type="text"
        id="start"
        placeholder="Enter start location / street / house name">

    <br><br>

    <h3>End Location</h3>

    <input
        type="text"
        id="end"
        placeholder="Enter end location / street / house name">

    <br><br>

    <button onclick="searchLocations()">
        Search & Calculate Distance
    </button>

    <br><br>

    <h3>Distance (KM)</h3>

    <input
        type="text"
        id="distance"
        readonly>

</div>

<script>

// ----------------------
// CREATE MAP
// ----------------------

var map = L.map('map').setView([13.0827, 80.2707], 10);

// ----------------------
// MAP LAYER
// ----------------------

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

// ----------------------
// VARIABLES
// ----------------------

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ----------------------
// SEARCH BOTH LOCATIONS
// ----------------------

async function searchLocations(){

    var startLocation =
    document.getElementById("start").value;

    var endLocation =
    document.getElementById("end").value;

    if(startLocation == "" || endLocation == ""){

        alert("Enter both Start and End locations");
        return;
    }

    // BETTER SEARCH QUERY

    var startUrl =
    "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
    + encodeURIComponent(startLocation + ", Chennai, Tamil Nadu, India");

    var endUrl =
    "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
    + encodeURIComponent(endLocation + ", Chennai, Tamil Nadu, India");

    var startResponse = await fetch(startUrl);
    var endResponse = await fetch(endUrl);

    var startData = await startResponse.json();
    var endData = await endResponse.json();

    if(startData.length == 0){

        alert("Start Location not found");
        return;
    }

    if(endData.length == 0){

        alert("End Location not found");
        return;
    }

    // STORE LAT LNG

    startLatLng =
    L.latLng(startData[0].lat, startData[0].lon);

    endLatLng =
    L.latLng(endData[0].lat, endData[0].lon);

    // REMOVE OLD ITEMS

    if(startMarker){
        map.removeLayer(startMarker);
    }

    if(endMarker){
        map.removeLayer(endMarker);
    }

    if(routeLine){
        map.removeLayer(routeLine);
    }

    // ADD START MARKER

    startMarker =
    L.marker(startLatLng)
    .addTo(map)
    .bindPopup(startData[0].display_name)
    .openPopup();

    // ADD END MARKER

    endMarker =
    L.marker(endLatLng)
    .addTo(map)
    .bindPopup(endData[0].display_name)
    .openPopup();

    // AUTO FILL FULL ADDRESS

    document.getElementById("start").value =
    startData[0].display_name;

    document.getElementById("end").value =
    endData[0].display_name;

    // CALCULATE DISTANCE

    calculateDistance();
}

// ----------------------
// MAP CLICK
// ----------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    var url =
    "https://nominatim.openstreetmap.org/reverse?format=json&lat="
    + lat +
    "&lon=" +
    lon;

    var response = await fetch(url);

    var data = await response.json();

    // START LOCATION

    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        data.display_name;
    }

    // END LOCATION

    else if(!endLatLng){

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location")
        .openPopup();

        document.getElementById("end").value =
        data.display_name;

        calculateDistance();
    }

    // RESET

    else{

        if(startMarker){
            map.removeLayer(startMarker);
        }

        if(endMarker){
            map.removeLayer(endMarker);
        }

        if(routeLine){
            map.removeLayer(routeLine);
        }

        startLatLng = e.latlng;
        endLatLng = null;

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        data.display_name;

        document.getElementById("end").value = "";

        document.getElementById("distance").value = "";
    }

});

// ----------------------
// CALCULATE DISTANCE
// ----------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2);

        // REMOVE OLD ROUTE

        if(routeLine){
            map.removeLayer(routeLine);
        }

        // DRAW ROUTE LINE

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:4
            }
        ).addTo(map);

        // FIT MAP

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO CREATOR

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

</script>

</body>
</html>
