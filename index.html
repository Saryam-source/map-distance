<!DOCTYPE html>
<html>
<head>
    <title>Map Distance Calculator</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; position: relative; }

        .search-card {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 320px;
        }

        .input-group { margin-bottom: 12px; position: relative; }
        .input-group label { display: block; font-size: 10px; font-weight: bold; color: #1a73e8; margin-bottom: 4px; text-transform: uppercase; }
        
        .search-box {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .distance-display {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .hint { font-size: 10px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div id="map">
    <div class="search-card">
        <div class="input-group">
            <label>Start Location</label>
            <input type="text" id="start" class="search-box" placeholder="Tap map to set start...">
        </div>

        <div class="input-group">
            <label>End Location</label>
            <input type="text" id="end" class="search-box" placeholder="Tap map to set end...">
        </div>

        <div class="distance-display">
            Distance: <span id="distance-text" style="color: #1a73e8;">0.00</span> KM
        </div>
        <div class="hint">Tap map once for Start, again for End.</div>
    </div>
</div>

<script>
var map = L.map('map', { zoomControl: false }).setView([13.0827, 80.2707], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var startLatLng = null, endLatLng = null;
var startMarker = null, endMarker = null, routeLine = null;
var selectionStep = 0; // 0 = start, 1 = end

// --- CLICK/TOUCH TO SELECT LOGIC ---
map.on('click', async function(e) {
    var latlng = e.latlng;
    
    if (selectionStep === 0) {
        // Reset if starting over
        if(routeLine) map.removeLayer(routeLine);
        if(endMarker) map.removeLayer(endMarker);
        document.getElementById("end").value = "";
        
        startLatLng = latlng;
        setMarker('start', latlng);
        var address = await getAddress(latlng);
        document.getElementById("start").value = address;
        selectionStep = 1;
    } else {
        endLatLng = latlng;
        setMarker('end', latlng);
        var address = await getAddress(latlng);
        document.getElementById("end").value = address;
        
        calculateDistance();
        selectionStep = 0; // Reset for next time
    }
});

async function getAddress(latlng) {
    try {
        var res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
        var data = await res.json();
        // Return a shorter version of the address
        return data.display_name.split(',').slice(0,3).join(',') || "Selected Location";
    } catch (err) {
        return latlng.lat.toFixed(4) + ", " + latlng.lng.toFixed(4);
    }
}

function setMarker(type, latlng) {
    if (type == 'start') {
        if (startMarker) map.removeLayer(startMarker);
        startMarker = L.marker(latlng).addTo(map);
    } else {
        if (endMarker) map.removeLayer(endMarker);
        endMarker = L.marker(latlng).addTo(map);
    }
}

function calculateDistance() {
    if (startLatLng && endLatLng) {
        var distance = (startLatLng.distanceTo(endLatLng) / 1000).toFixed(2);
        document.getElementById("distance-text").innerText = distance;

        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([startLatLng, endLatLng], { color: '#1a73e8', weight: 4, dashArray: '5, 10' }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

        // AUTOMATICALLY SEND TO ZOHO CREATOR
        window.parent.postMessage({
            start: document.getElementById("start").value,
            end: document.getElementById("end").value,
            distance: distance
        }, "*");
    }
}
</script>

</body>
</html>
