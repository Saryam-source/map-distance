<!DOCTYPE html>
<html>

<head>

    <title>Map Distance Calculator</title>

    <meta charset="utf-8"/>

    <!-- LEAFLET CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- GEOSEARCH CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet-geosearch/dist/geosearch.css"/>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- GEOSEARCH JS -->
    <script src="https://unpkg.com/leaflet-geosearch/dist/bundle.min.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        input{
            width:350px;
            padding:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            margin-left:10px;
            margin-bottom:15px;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h3>Start Location</h3>

    <input
        type="text"
        id="start"
        placeholder="Type start location">

    <button onclick="setStartLocation()">
        Submit Start
    </button>

    <br><br>

    <h3>End Location</h3>

    <input
        type="text"
        id="end"
        placeholder="Type end location">

    <button onclick="setEndLocation()">
        Submit End
    </button>

    <br><br>

    <h3>Distance (KM)</h3>

    <input
        type="text"
        id="distance"
        readonly>

</div>

<script>

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

var provider =
new window.GeoSearch.OpenStreetMapProvider();

var startMarker = null;
var endMarker = null;
var routeLine = null;

var startLatLng = null;
var endLatLng = null;

// ---------------------
// SUBMIT START
// ---------------------

async function setStartLocation(){

    var query =
    document.getElementById("start").value;

    if(query == ""){
        alert("Enter Start Location");
        return;
    }

    const results =
    await provider.search({
        query: query + ", Chennai, Tamil Nadu, India"
    });

    if(results.length > 0){

        var result = results[0];

        startLatLng =
        L.latLng(result.y, result.x);

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup(result.label)
        .openPopup();

        map.setView(startLatLng, 15);

        document.getElementById("start").value =
        result.label;
    }
    else{
        alert("Location not found");
    }
}

// ---------------------
// SUBMIT END
// ---------------------

async function setEndLocation(){

    var query =
    document.getElementById("end").value;

    if(query == ""){
        alert("Enter End Location");
        return;
    }

    const results =
    await provider.search({
        query: query + ", Chennai, Tamil Nadu, India"
    });

    if(results.length > 0){

        var result = results[0];

        endLatLng =
        L.latLng(result.y, result.x);

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup(result.label)
        .openPopup();

        map.setView(endLatLng, 15);

        document.getElementById("end").value =
        result.label;

        calculateDistance();
    }
    else{
        alert("Location not found");
    }
}

// ---------------------
// MAP CLICK
// ---------------------

map.on('click', async function(e){

    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        startLatLng.lat.toFixed(5)
        + ", " +
        startLatLng.lng.toFixed(5);

    }
    else if(!endLatLng){

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location")
        .openPopup();

        document.getElementById("end").value =
        endLatLng.lat.toFixed(5)
        + ", " +
        endLatLng.lng.toFixed(5);

        calculateDistance();
    }
    else{

        // RESET

        if(startMarker){
            map.removeLayer(startMarker);
        }

        if(endMarker){
            map.removeLayer(endMarker);
        }

        if(routeLine){
            map.removeLayer(routeLine);
        }

        startLatLng = e.latlng;
        endLatLng = null;

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location")
        .openPopup();

        document.getElementById("start").value =
        startLatLng.lat.toFixed(5)
        + ", " +
        startLatLng.lng.toFixed(5);

        document.getElementById("end").value = "";

        document.getElementById("distance").value = "";
    }

});

// ---------------------
// DISTANCE
// ---------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            { color:'blue' }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO

        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");
    }
}

</script>

</body>
</html>
