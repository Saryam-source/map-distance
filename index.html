<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
rel="stylesheet">

<style>

:root{
--bg:#0e1117;
--surface:#161b25;
--surface2:#1e2535;
--border:#2a3347;
--text:#e8edf5;
--muted:#7a8499;
--accent:#3b82f6;
--accent2:#60a5fa;
--green:#22c55e;
--red:#ef4444;
--radius:10px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
display:flex;
}

.sidebar{
width:390px;
min-width:390px;
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow:hidden;
z-index:100;
}

.brand{
padding:16px 20px 12px;
border-bottom:1px solid var(--border);
}

.brand-title{
font-size:15px;
font-weight:600;
}

.brand-sub{
font-size:11px;
color:var(--muted);
margin-top:1px;
}

.pane{
padding:14px 16px;
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.field-label{
font-size:10px;
font-weight:700;
letter-spacing:.6px;
color:var(--muted);
text-transform:uppercase;
margin-bottom:5px;
}

.form-input{
width:100%;
padding:11px 14px;
font-size:13px;
font-family:inherit;
background:var(--bg);
border:1.5px solid var(--border);
border-radius:var(--radius);
color:var(--text);
outline:none;
}

.form-input:focus{
border-color:var(--accent);
background:var(--surface2);
}

.ac-wrap{
position:relative;
}

.ac-list{
position:absolute;
top:100%;
left:0;
right:0;
background:var(--surface);
border:1.5px solid var(--accent);
border-top:none;
border-radius:0 0 var(--radius) var(--radius);
z-index:9999;
max-height:240px;
overflow-y:auto;
display:none;
}

.ac-item{
padding:9px 14px;
font-size:12px;
cursor:pointer;
border-bottom:1px solid var(--border);
}

.ac-item:hover{
background:var(--surface2);
}

.ac-main{
font-weight:600;
}

.ac-sub{
color:var(--muted);
font-size:11px;
margin-top:2px;
}

.pin-row{
display:flex;
gap:6px;
}

.btn-pin{
flex:1;
padding:10px;
font-size:12px;
font-weight:600;
border:1.5px solid var(--border);
border-radius:var(--radius);
background:var(--surface2);
color:var(--text);
cursor:pointer;
}

.btn-pin.active{
background:var(--green);
border-color:var(--green);
}

.vehicle-selector{
display:flex;
gap:8px;
}

.vehicle-btn{
flex:1;
padding:11px;
font-size:12px;
font-weight:600;
border:1.5px solid var(--border);
border-radius:var(--radius);
background:var(--surface2);
color:var(--text);
cursor:pointer;
}

.vehicle-btn.active{
background:var(--accent);
border-color:var(--accent);
}

.btn-calc,
.btn-submit{
width:100%;
padding:13px;
font-size:14px;
font-weight:700;
border:none;
border-radius:var(--radius);
cursor:pointer;
color:#fff;
}

.btn-calc{
background:var(--green);
}

.btn-submit{
background:var(--accent);
}

.result-card{
background:var(--bg);
border:1.5px solid var(--accent);
border-radius:12px;
padding:14px;
display:none;
flex-direction:column;
gap:10px;
}

.result-card.show{
display:flex;
}

.rc-top{
display:flex;
gap:8px;
}

.rc-metric{
flex:1;
background:var(--surface2);
border-radius:8px;
padding:10px;
text-align:center;
}

.rc-label{
font-size:9px;
color:var(--muted);
text-transform:uppercase;
}

.rc-value{
font-size:22px;
font-weight:700;
color:var(--accent2);
font-family:'DM Mono',monospace;
}

.rc-row{
font-size:12px;
line-height:1.5;
color:var(--muted);
}

.rc-row strong{
color:var(--text);
}

.rc-cost{
font-size:16px;
font-weight:700;
color:var(--green);
padding:8px 12px;
background:rgba(34,197,94,.08);
border-radius:8px;
text-align:center;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--surface2);
padding:10px 20px;
border-radius:20px;
opacity:0;
transition:.3s;
z-index:9999;
}

.toast.show{
opacity:1;
}

#map{
flex:1;
height:100vh;
}

@media(max-width:768px){

body{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
min-width:100%;
}

#map{
height:55vh;
}

}

</style>

</head>

<body>

<aside class="sidebar">

<div class="brand">
<div class="brand-title">Employee Travel Tracker</div>
<div class="brand-sub">Distance · Route · Zoho Sync</div>
</div>

<div class="pane">

<div>
<div class="field-label">Travel Date</div>

<input
type="date"
id="travel-date"
class="form-input"/>
</div>

<div>

<div class="field-label">Employee Name</div>

<select
id="person-name"
class="form-input">

<option value="">-- Select Employee --</option>

<option value="Madhumita">Madhumita</option>
<option value="Muni">Muni</option>
<option value="Sarath">Sarath</option>
<option value="Yamuna">Yamuna</option>
<option value="Antony">Antony</option>

</select>

</div>

<div>

<div class="field-label">From Location</div>

<div class="ac-wrap">

<input
type="text"
id="from-loc"
class="form-input"
placeholder="Enter starting location..."
autocomplete="off"
oninput="acSearch(this,'from-list')"
/>

<div class="ac-list" id="from-list"></div>

</div>

</div>

<div>

<div class="field-label">To Location</div>

<div class="ac-wrap">

<input
type="text"
id="to-loc"
class="form-input"
placeholder="Enter destination..."
autocomplete="off"
oninput="acSearch(this,'to-list')"
/>

<div class="ac-list" id="to-list"></div>

</div>

</div>

<div>

<div class="field-label">Pin Exact GPS Location</div>

<div class="pin-row">

<button
type="button"
class="btn-pin"
id="btn-pin-from"
onclick="startPin('from')">

📍 Pin From

</button>

<button
type="button"
class="btn-pin"
id="btn-pin-to"
onclick="startPin('to')">

📍 Pin To

</button>

</div>

</div>

<div>

<div class="field-label">Vehicle Type</div>

<div class="vehicle-selector">

<button
type="button"
class="vehicle-btn active"
id="btn-bike"
onclick="selectVehicle('bike')">

Bike Rs.3.5/km

</button>

<button
type="button"
class="vehicle-btn"
id="btn-car"
onclick="selectVehicle('car')">

Car Rs.20/km

</button>

</div>

</div>

<button
class="btn-calc"
onclick="calculateRoute()">

Calculate Route

</button>

<div class="result-card" id="result-card">

<div class="rc-top">

<div class="rc-metric">
<div class="rc-label">Distance</div>
<div class="rc-value" id="r-dist">-</div>
</div>

<div class="rc-metric">
<div class="rc-label">Duration</div>
<div class="rc-value" id="r-dur">-</div>
</div>

</div>

<div class="rc-row" id="r-date"></div>
<div class="rc-row" id="r-name"></div>
<div class="rc-row" id="r-from"></div>
<div class="rc-row" id="r-to"></div>

<div class="rc-cost" id="r-cost"></div>

<button
class="btn-submit"
onclick="submitToZoho()">

Save to Zoho Report

</button>

</div>

</div>

</aside>

<div id="map"></div>

<div class="toast" id="toast"></div>

<script>

/* =========================
   ZOHO WEBHOOK
========================= */

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.63d9bd1983046a4b5fabc6be0a6d1ecc.f7ae778f73ba509f9213c5ac7eaf49e4";

/* =========================
   DEFAULT DATE
========================= */

document.getElementById("travel-date").value =
new Date().toISOString().split("T")[0];

/* =========================
   MAP
========================= */

var map =
L.map("map").setView([13.0827,80.2707],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:22,
attribution:"© OpenStreetMap"
}
).addTo(map);

/* =========================
   CUSTOM MARKERS
========================= */

var greenIcon = new L.Icon({

iconUrl:
"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",

shadowUrl:
"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",

iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]

});

var redIcon = new L.Icon({

iconUrl:
"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",

shadowUrl:
"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",

iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]

});

var selectedVehicle = "bike";
var routeLayer = null;
var fromMarker = null;
var toMarker = null;
var tripData = null;
var pinMode = null;

/* =========================
   TOAST
========================= */

function toast(msg){

var t = document.getElementById("toast");

t.innerHTML = msg;

t.classList.add("show");

setTimeout(function(){
t.classList.remove("show");
},2500);

}

/* =========================
   VEHICLE SELECT
========================= */

function selectVehicle(type){

selectedVehicle = type;

document.getElementById("btn-bike")
.classList.remove("active");

document.getElementById("btn-car")
.classList.remove("active");

document.getElementById(
type === "bike"
? "btn-bike"
: "btn-car"
).classList.add("active");

}

/* =========================
   PIN MODE
========================= */

function startPin(type){

pinMode = type;

toast("Click on map to pin location");

}

/* =========================
   MAP CLICK
========================= */

map.on("click", async function(e){

if(!pinMode) return;

var lat = e.latlng.lat;
var lon = e.latlng.lng;

try{

var response = await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
);

var data = await response.json();

var address = data.display_name;

if(pinMode === "from"){

document.getElementById("from-loc").value = address;

if(fromMarker){
map.removeLayer(fromMarker);
}

fromMarker = L.marker([lat,lon],{
icon:greenIcon
}).addTo(map);

}else{

document.getElementById("to-loc").value = address;

if(toMarker){
map.removeLayer(toMarker);
}

toMarker = L.marker([lat,lon],{
icon:redIcon
}).addTo(map);

}

pinMode = null;

toast("GPS location pinned");

}catch(err){

toast("Unable to pin location");

}

});

/* =========================
   AUTOCOMPLETE SEARCH
========================= */

async function acSearch(input,listId){

var query = input.value.trim();

var list = document.getElementById(listId);

if(query.length < 3){

list.style.display = "none";
return;

}

try{

var response = await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(query)
+ "&limit=10"
);

var data = await response.json();

list.innerHTML = "";

data.forEach(function(item){

var div = document.createElement("div");

div.className = "ac-item";

div.innerHTML =
'<div class="ac-main">'
+ item.display_name.split(",")[0]
+ '</div>'
+ '<div class="ac-sub">'
+ item.display_name
+ '</div>';

div.onclick = function(){

input.value = item.display_name;

list.style.display = "none";

};

list.appendChild(div);

});

list.style.display = "block";

}catch(err){

console.log(err);

}

}

/* =========================
   GEOCODE
========================= */

async function geocode(address){

var response = await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(address)
+ "&limit=1"
);

var data = await response.json();

return{

lat:parseFloat(data[0].lat),
lon:parseFloat(data[0].lon)

};

}

/* =========================
   ROUTE
========================= */

async function getRoute(from,to){

var response = await fetch(
"https://router.project-osrm.org/route/v1/driving/"
+ from.lon + "," + from.lat + ";"
+ to.lon + "," + to.lat
+ "?overview=full&geometries=geojson"
);

var data = await response.json();

var route = data.routes[0];

return{

distance:(route.distance/1000).toFixed(2),

duration:Math.round(route.duration/60),

coords:route.geometry.coordinates.map(function(c){

return[c[1],c[0]];

})

};

}

/* =========================
   CALCULATE ROUTE
========================= */

async function calculateRoute(){

try{

var name =
document.getElementById("person-name").value;

var date =
document.getElementById("travel-date").value;

var from =
document.getElementById("from-loc").value;

var to =
document.getElementById("to-loc").value;

if(!name || !date || !from || !to){

alert("Please fill all fields");
return;

}

var fromLL = await geocode(from);
var toLL = await geocode(to);

var route =
await getRoute(fromLL,toLL);

if(routeLayer){

map.removeLayer(routeLayer);

}

routeLayer = L.polyline(
route.coords,
{
color:"#3b82f6",
weight:6
}
).addTo(map);

map.fitBounds(routeLayer.getBounds());

var rate =
selectedVehicle === "car"
? 20
: 3.5;

var cost =
(parseFloat(route.distance) * rate)
.toFixed(2);

var formattedDate =
new Date(date)
.toLocaleDateString(
'en-GB',
{
day:'2-digit',
month:'short',
year:'numeric'
}
)
.replace(/ /g,'-');

tripData = {

date:formattedDate,
name:name,
start:from,
end:to,
distance:route.distance,
duration:route.duration,
mode:selectedVehicle,
cost:cost,
timestamp:new Date().toISOString()

};

document.getElementById("r-dist")
.innerHTML = route.distance + " km";

document.getElementById("r-dur")
.innerHTML = route.duration + " min";

document.getElementById("r-date")
.innerHTML =
"Date : <strong>"+formattedDate+"</strong>";

document.getElementById("r-name")
.innerHTML =
"Employee : <strong>"+name+"</strong>";

document.getElementById("r-from")
.innerHTML =
"From : <strong>"+from+"</strong>";

document.getElementById("r-to")
.innerHTML =
"To : <strong>"+to+"</strong>";

document.getElementById("r-cost")
.innerHTML =
"Estimated Cost : Rs."+cost;

document.getElementById("result-card")
.classList.add("show");

toast("Route calculated successfully");

}catch(err){

toast(err.message);

}

}

/* =========================
   SAVE TO ZOHO
========================= */

async function submitToZoho(){

if(!tripData){

toast("Calculate route first");
return;

}

try{

toast("Saving to Zoho...");

await fetch(
ZOHO_WEBHOOK_URL,
{
method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(tripData)

}
);

console.log("Trip Data Sent:",tripData);

toast("Saved to Zoho Successfully");

}catch(err){

console.log("ERROR:",err);

toast("Connection Error");

}

}

</script>

</body>
</html>
