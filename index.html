<script>

// ----------------------
// MAP
// ----------------------

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

// ----------------------
// VARIABLES
// ----------------------

var startLatLng = null;
var endLatLng = null;

var startMarker = null;
var endMarker = null;
var routeLine = null;

// ----------------------
// SEARCH SUGGESTIONS
// ----------------------

async function searchSuggestions(type){

    var input =
    document.getElementById(type).value;

    var suggestionBox =
    document.getElementById(type + "Suggestions");

    if(input.length < 3){
        suggestionBox.innerHTML = "";
        return;
    }

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
    + encodeURIComponent(input);

    var response = await fetch(url);

    var data = await response.json();

    suggestionBox.innerHTML = "";

    data.forEach(function(place){

        var div =
        document.createElement("div");

        div.innerHTML =
        place.display_name;

        div.onclick = function(){

            document.getElementById(type).value =
            place.display_name;

            suggestionBox.innerHTML = "";

            setLocation(type, place.lat, place.lon);

        };

        suggestionBox.appendChild(div);

    });

}

// ----------------------
// SET LOCATION
// ----------------------

function setLocation(type, lat, lon){

    var latlng = L.latLng(lat, lon);

    if(type == "start"){

        startLatLng = latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(latlng)
        .addTo(map)
        .bindPopup("Start Location");

    }
    else{

        endLatLng = latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(latlng)
        .addTo(map)
        .bindPopup("End Location");
    }

    map.setView(latlng, 13);

    calculateDistance();
}

// ----------------------
// MANUAL ADDRESS SEARCH
// ----------------------

async function getCoordinates(address){

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&limit=1&q="
    + encodeURIComponent(address);

    var response = await fetch(url);

    var data = await response.json();

    if(data.length > 0){

        return {
            lat: data[0].lat,
            lon: data[0].lon
        };
    }

    return null;
}

// ----------------------
// AUTO CALCULATE
// ----------------------

async function calculateDistance(){

    var startInput =
    document.getElementById("start").value;

    var endInput =
    document.getElementById("end").value;

    // GET START COORDINATES
    if(startInput && !startLatLng){

        var startCoords =
        await getCoordinates(startInput);

        if(startCoords){

            setLocation(
                "start",
                startCoords.lat,
                startCoords.lon
            );
        }
    }

    // GET END COORDINATES
    if(endInput && !endLatLng){

        var endCoords =
        await getCoordinates(endInput);

        if(endCoords){

            setLocation(
                "end",
                endCoords.lat,
                endCoords.lon
            );
        }
    }

    // CALCULATE DISTANCE
    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2) + " KM";

        // REMOVE OLD LINE
        if(routeLine){
            map.removeLayer(routeLine);
        }

        // DRAW LINE
        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:5
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        // SEND TO ZOHO
        window.parent.postMessage({

            start: startInput,
            end: endInput,
            distance: distance.toFixed(2)

        }, "*");

    }

}

// ----------------------
// AUTO WHEN USER TYPES
// ----------------------

document
.getElementById("start")
.addEventListener("change", function(){

    startLatLng = null;

    calculateDistance();

});

document
.getElementById("end")
.addEventListener("change", function(){

    endLatLng = null;

    calculateDistance();

});

// ----------------------
// MAP CLICK
// ----------------------

map.on('click', async function(e){

    var latlng = e.latlng;

    if(!startLatLng){

        setLocation(
            "start",
            latlng.lat,
            latlng.lng
        );

    }
    else{

        setLocation(
            "end",
            latlng.lat,
            latlng.lng
        );

    }

});

</script>
