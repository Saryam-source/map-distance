<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0e1117;
  --surface:#161b25;
  --surface2:#1e2535;
  --border:#2a3347;
  --text:#e8edf5;
  --muted:#7a8499;
  --accent:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
  --radius:10px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  overflow:hidden;
}

.sidebar{
  width:380px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:20px;
  overflow-y:auto;
}

.brand{
  margin-bottom:20px;
}

.brand h2{
  font-size:22px;
}

.brand p{
  color:var(--muted);
  font-size:13px;
}

.field{
  margin-bottom:16px;
}

.label{
  font-size:12px;
  margin-bottom:6px;
  color:var(--muted);
}

.form-input{
  width:100%;
  padding:12px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
}

.vehicle-selector{
  display:flex;
  gap:10px;
}

.vehicle-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:var(--radius);
  background:var(--surface2);
  color:var(--text);
  cursor:pointer;
  font-weight:600;
}

.vehicle-btn.active{
  background:var(--accent);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  margin-top:10px;
}

.btn-calc{
  background:var(--green);
  color:#fff;
}

.btn-submit{
  background:var(--accent);
  color:#fff;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:var(--radius);
  border:1px solid var(--accent);
  display:none;
}

.result p{
  margin-bottom:10px;
  font-size:14px;
}

.success{
  margin-top:12px;
  color:var(--green);
  display:none;
}

.error{
  margin-top:12px;
  color:var(--red);
  display:none;
}

#map{
  flex:1;
}

</style>
</head>

<body>

<div class="sidebar">

  <div class="brand">
    <h2>Employee Travel Tracker</h2>
    <p>Distance + Zoho Creator Integration</p>
  </div>

  <!-- Employee -->
  <div class="field">
    <div class="label">Employee Name</div>

    <!-- CHANGE EMPLOYEE NAMES ONLY HERE -->
    <select id="person-name" class="form-input">
      <option value="">Select Employee</option>

      <option value="Madhumita">Madhumita</option>
      <option value="Muni">Muni</option>
      <option value="Sarath">Sarath</option>
      <option value="Yamuna">Yamuna</option>
      <option value="Antony">Antony</option>

    </select>
  </div>

  <!-- From -->
  <div class="field">
    <div class="label">From Location</div>
    <input type="text" id="from-loc" class="form-input" placeholder="Enter starting location">
  </div>

  <!-- To -->
  <div class="field">
    <div class="label">To Location</div>
    <input type="text" id="to-loc" class="form-input" placeholder="Enter destination">
  </div>

  <!-- Vehicle -->
  <div class="field">
    <div class="label">Vehicle Type</div>

    <div class="vehicle-selector">
      <button class="vehicle-btn active" id="bike-btn" onclick="selectVehicle('bike')">
        Bike ₹3.5/km
      </button>

      <button class="vehicle-btn" id="car-btn" onclick="selectVehicle('car')">
        Car ₹20/km
      </button>
    </div>
  </div>

  <!-- Calculate -->
  <button class="btn btn-calc" onclick="calculateRoute()">
    Calculate Route
  </button>

  <!-- Result -->
  <div class="result" id="result-box">

    <p><strong>Employee:</strong> <span id="r-name"></span></p>

    <p><strong>Distance:</strong> <span id="r-distance"></span> km</p>

    <p><strong>Duration:</strong> <span id="r-duration"></span> mins</p>

    <p><strong>Cost:</strong> ₹<span id="r-cost"></span></p>

    <button class="btn btn-submit" onclick="submitToZoho()">
      Save to Zoho Report
    </button>

    <div class="success" id="success-msg">
      Saved to Zoho Creator successfully
    </div>

    <div class="error" id="error-msg">
      Failed to save
    </div>

  </div>

</div>

<div id="map"></div>

<script>

var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=YOUR_REAL_ZAPI_KEY";

var selectedVehicle = "bike";
var tripData = null;

function selectVehicle(type){

  selectedVehicle = type;

  document.getElementById("bike-btn").classList.remove("active");
  document.getElementById("car-btn").classList.remove("active");

  if(type === "bike"){
    document.getElementById("bike-btn").classList.add("active");
  }else{
    document.getElementById("car-btn").classList.add("active");
  }
}

var map = L.map('map').setView([13.0827,80.2707],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

var routeLayer;

async function geocode(place){

  var url =
  "https://nominatim.openstreetmap.org/search?format=json&q=" +
  encodeURIComponent(place);

  var response = await fetch(url);

  var data = await response.json();

  if(!data.length){
    throw new Error("Location not found");
  }

  return {
    lat:parseFloat(data[0].lat),
    lon:parseFloat(data[0].lon)
  };
}

async function getRoute(from,to){

  var url =
  "https://router.project-osrm.org/route/v1/driving/" +
  from.lon + "," + from.lat + ";" +
  to.lon + "," + to.lat +
  "?overview=full&geometries=geojson";

  var response = await fetch(url);

  var data = await response.json();

  if(!data.routes.length){
    throw new Error("No route found");
  }

  return data.routes[0];
}

async function calculateRoute(){

  document.getElementById("success-msg").style.display = "none";
  document.getElementById("error-msg").style.display = "none";

  var name = document.getElementById("person-name").value;
  var from = document.getElementById("from-loc").value;
  var to = document.getElementById("to-loc").value;

  if(!name){
    alert("Select employee");
    return;
  }

  if(!from){
    alert("Enter from location");
    return;
  }

  if(!to){
    alert("Enter to location");
    return;
  }

  try{

    var fromLoc = await geocode(from);
    var toLoc = await geocode(to);

    var route = await getRoute(fromLoc,toLoc);

    var distance =
    (route.distance / 1000).toFixed(2);

    var duration =
    Math.round(route.duration / 60);

    var rate =
    selectedVehicle === "car" ? 20 : 3.5;

    var cost =
    (distance * rate).toFixed(2);

    tripData = {

      name:name,
      start:from,
      end:to,
      distance:distance,
      duration:duration,
      mode:selectedVehicle,
      cost:cost

    };

    document.getElementById("r-name").innerText = name;
    document.getElementById("r-distance").innerText = distance;
    document.getElementById("r-duration").innerText = duration;
    document.getElementById("r-cost").innerText = cost;

    document.getElementById("result-box").style.display = "block";

    var coords =
    route.geometry.coordinates.map(function(c){
      return [c[1],c[0]];
    });

    if(routeLayer){
      map.removeLayer(routeLayer);
    }

    routeLayer = L.polyline(coords,{
      color:"#3b82f6",
      weight:5
    }).addTo(map);

    map.fitBounds(routeLayer.getBounds());

  }
  catch(err){

    alert(err.message);
    console.log(err);

  }
}

async function submitToZoho(){

  if(!tripData){
    alert("Calculate route first");
    return;
  }

  try{

    var params = new URLSearchParams();

    params.append("name",tripData.name);
    params.append("start",tripData.start);
    params.append("end",tripData.end);
    params.append("distance",tripData.distance);
    params.append("duration",tripData.duration);
    params.append("mode",tripData.mode);
    params.append("cost",tripData.cost);

    var response = await fetch(

      ZOHO_WEBHOOK_URL + "&" + params.toString(),

      {
        method:"GET"
      }

    );

    document.getElementById("success-msg").style.display = "block";

  }
  catch(err){

    document.getElementById("error-msg").style.display = "block";

    console.log(err);

  }
}

</script>

</body>
</html>
