<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Route Planner</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
overflow:hidden;
background:#f5f7fb;
}

.sidebar{
width:400px;
background:white;
padding:20px;
overflow-y:auto;
border-right:1px solid #ddd;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
color:#111827;
}

.subtitle{
font-size:14px;
color:#6b7280;
margin-bottom:25px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#374151;
}

.input-group input,
.input-group select{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
}

.vehicle-container{
display:flex;
gap:10px;
margin-bottom:20px;
}

.vehicle-btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#e5e7eb;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.vehicle-btn.active{
background:#2563eb;
color:white;
}

.calc-btn{
width:100%;
padding:15px;
background:#0f766e;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.calc-btn:hover{
background:#115e59;
}

.result-box{
margin-top:25px;
background:#f9fafb;
padding:20px;
border-radius:15px;
border:1px solid #e5e7eb;
}

.result-item{
margin-bottom:15px;
font-size:18px;
}

.result-label{
font-weight:bold;
color:#111827;
}

.result-value{
color:#2563eb;
font-weight:bold;
}

#map{
flex:1;
height:100vh;
}

.status{
margin-top:20px;
padding:15px;
background:#dcfce7;
border-radius:12px;
font-weight:bold;
color:#166534;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="title">Smart Route Planner</div>
<div class="subtitle">GPS • Distance • Zoho Flow</div>

<div class="input-group">
<label>Employee Name</label>
<select id="employee">
<option value="">Select Employee</option>
<option>Madhumita</option>
<option>Muni</option>
<option>Antony</option>
<option>Sarath</option>
</select>
</div>

<div class="input-group">
<label>From Location</label>
<input type="text" id="from-location"
placeholder="Enter starting location">
</div>

<div class="input-group">
<label>To Location</label>
<input type="text" id="to-location"
placeholder="Enter destination">
</div>

<div class="vehicle-container">

<button class="vehicle-btn active"
id="carBtn"
onclick="selectVehicle('driving-car')">
🚗 Car
</button>

<button class="vehicle-btn"
id="bikeBtn"
onclick="selectVehicle('cycling-regular')">
🏍 Bike
</button>

<button class="vehicle-btn"
id="walkBtn"
onclick="selectVehicle('foot-walking')">
🚶 Walk
</button>

</div>

<button class="calc-btn"
onclick="calculateAndSaveTrip()">

Calculate & Save Trip

</button>

<div class="result-box">

<div class="result-item">
<span class="result-label">Distance:</span>
<span class="result-value" id="distance">0 km</span>
</div>

<div class="result-item">
<span class="result-label">Duration:</span>
<span class="result-value" id="duration">0 min</span>
</div>

<div class="result-item">
<span class="result-label">Estimated Cost:</span>
<span class="result-value" id="cost">₹0</span>
</div>

<div class="result-item">
<span class="result-label">Vehicle:</span>
<span class="result-value" id="vehicle-name">Car</span>
</div>

</div>

<div class="status" id="status">
Ready
</div>

</div>

<div id="map"></div>

<script>

const API_KEY = "PASTE_OPENROUTESERVICE_API_KEY";

const WEBHOOK_URL = "PASTE_ZOHO_FLOW_WEBHOOK_URL";

var selectedVehicle = "driving-car";

var map = L.map('map').setView([13.0827,80.2707],10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

var routeLayer = null;
var startMarker = null;
var endMarker = null;

function selectVehicle(type){

selectedVehicle = type;

document.getElementById('carBtn').classList.remove('active');
document.getElementById('bikeBtn').classList.remove('active');
document.getElementById('walkBtn').classList.remove('active');

if(type === 'driving-car'){
document.getElementById('carBtn').classList.add('active');
document.getElementById('vehicle-name').innerText = "Car";
}

if(type === 'cycling-regular'){
document.getElementById('bikeBtn').classList.add('active');
document.getElementById('vehicle-name').innerText = "Bike";
}

if(type === 'foot-walking'){
document.getElementById('walkBtn').classList.add('active');
document.getElementById('vehicle-name').innerText = "Walking";
}

}

async function geocode(place){

const url =
`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(place)}`;

const response = await fetch(url);

const data = await response.json();

if(data.features.length === 0){
throw new Error("Location not found");
}

const coords = data.features[0].geometry.coordinates;

return {
lng: coords[0],
lat: coords[1]
};

}

async function calculateAndSaveTrip(){

try{

document.getElementById('status').innerText =
"Calculating route...";

const employee =
document.getElementById('employee').value;

const from =
document.getElementById('from-location').value;

const to =
document.getElementById('to-location').value;

if(!employee || !from || !to){

alert("Please fill all fields");

return;
}

const start = await geocode(from);

const end = await geocode(to);

if(routeLayer){
map.removeLayer(routeLayer);
}

if(startMarker){
map.removeLayer(startMarker);
}

if(endMarker){
map.removeLayer(endMarker);
}

startMarker = L.marker([start.lat,start.lng])
.addTo(map)
.bindPopup("Start");

endMarker = L.marker([end.lat,end.lng])
.addTo(map)
.bindPopup("Destination");

const body = {
coordinates:[
[start.lng,start.lat],
[end.lng,end.lat]
]
};

const response = await fetch(
`https://api.openrouteservice.org/v2/directions/${selectedVehicle}/geojson`,
{
method:'POST',
headers:{
'Authorization':API_KEY,
'Content-Type':'application/json'
},
body:JSON.stringify(body)
}
);

const data = await response.json();

routeLayer = L.geoJSON(data,{
style:{
color:'#2563eb',
weight:7
}
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

const summary =
data.features[0].properties.summary;

const distanceKm =
(summary.distance / 1000).toFixed(2);

const durationMin =
Math.round(summary.duration / 60);

document.getElementById('distance').innerText =
distanceKm + " km";

document.getElementById('duration').innerText =
durationMin + " min";

let rate = 20;

if(selectedVehicle === 'cycling-regular'){
rate = 3.5;
}

if(selectedVehicle === 'foot-walking'){
rate = 0;
}

const estimatedCost =
(distanceKm * rate).toFixed(2);

document.getElementById('cost').innerText =
"₹" + estimatedCost;

navigator.geolocation.getCurrentPosition(

async function(pos){

const latitude = pos.coords.latitude;
const longitude = pos.coords.longitude;

L.circleMarker([latitude,longitude],{
radius:8,
color:'green'
}).addTo(map)
.bindPopup("Current GPS Location");

await fetch(WEBHOOK_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

name: employee,
from: from,
to: to,
vehicle: selectedVehicle,
distance: distanceKm,
duration: durationMin,
cost: estimatedCost,
latitude: latitude,
longitude: longitude

})
});

document.getElementById('status').innerText =
"Trip saved successfully to Zoho";

},

function(error){

console.log(error);

document.getElementById('status').innerText =
"GPS permission denied";

}

);

}
catch(err){

console.log(err);

document.getElementById('status').innerText =
"Error calculating route";

alert("Error calculating route");

}

}

</script>

</body>
</html>
