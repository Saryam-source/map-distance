<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Smart Distance Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#111827;
--border:#1f2937;
--text:#f8fafc;
--muted:#94a3b8;
--accent:#2563eb;
--green:#22c55e;
--red:#ef4444;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:390px;
background:var(--card);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
z-index:1000;
}

.header{
padding:20px;
border-bottom:1px solid var(--border);
}

.header h2{
font-size:20px;
margin-bottom:4px;
}

.header p{
font-size:12px;
color:var(--muted);
}

.content{
padding:18px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.label{
font-size:11px;
text-transform:uppercase;
font-weight:700;
letter-spacing:.7px;
margin-bottom:6px;
color:var(--muted);
}

.input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid var(--border);
background:#0b1220;
color:white;
font-size:14px;
outline:none;
}

.input:focus{
border-color:var(--accent);
}

.vehicle-row{
display:flex;
gap:10px;
}

.vehicle-btn{
flex:1;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:#0b1220;
color:white;
cursor:pointer;
font-weight:600;
}

.vehicle-btn.active{
background:var(--accent);
border-color:var(--accent);
}

.status-card{
background:#0b1220;
border:1px solid var(--border);
padding:16px;
border-radius:16px;
}

.status-title{
font-size:15px;
font-weight:700;
margin-bottom:6px;
}

.status-sub{
font-size:12px;
color:var(--muted);
}

.metrics{
display:flex;
gap:10px;
margin-top:14px;
}

.metric{
flex:1;
background:#111827;
padding:12px;
border-radius:12px;
text-align:center;
}

.metric-value{
font-size:20px;
font-weight:700;
}

.metric-label{
font-size:11px;
color:var(--muted);
margin-top:4px;
}

.btn-submit{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:var(--green);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.btn-submit:hover{
opacity:.9;
}

.result{
display:none;
background:#0b1220;
border:1px solid var(--green);
padding:16px;
border-radius:16px;
line-height:1.8;
font-size:14px;
}

#map{
flex:1;
height:100%;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
padding:12px 18px;
border-radius:30px;
font-size:13px;
opacity:0;
transition:.3s;
z-index:99999;
}

.toast.show{
opacity:1;
}

@media(max-width:768px){

body{
flex-direction:column;
height:auto;
overflow:auto;
}

.sidebar{
width:100%;
}

#map{
height:55vh;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="header">
<h2>Smart Distance Tracker</h2>
<p>Live GPS · Auto Distance · Zoho Creator</p>
</div>

<div class="content">

<div>
<div class="label">Employee Name</div>

<select id="person-name" class="input">
<option value="">Select Name</option>
<option>Madhumita</option>
<option>Muni</option>
<option>Antony</option>
<option>Sarath</option>
<option>Yamuna</option>
</select>
</div>

<div>
<div class="label">From Location</div>

<input list="locations"
id="from-location"
class="input"
placeholder="Enter From Location">

<datalist id="locations">
<option value="Chennai Central">
<option value="Tambaram">
<option value="Guindy">
<option value="Velachery">
<option value="T Nagar">
<option value="OMR">
<option value="Perungudi">
<option value="Sholinganallur">
<option value="Chennai Airport">
</datalist>

</div>

<div>
<div class="label">To Location</div>

<input list="locations"
id="to-location"
class="input"
placeholder="Enter To Location">
</div>

<div>
<div class="label">Vehicle</div>

<div class="vehicle-row">

<button class="vehicle-btn active"
id="bike-btn"
onclick="selectVehicle('bike')">
Bike ₹3.5/km
</button>

<button class="vehicle-btn"
id="car-btn"
onclick="selectVehicle('car')">
Car ₹20/km
</button>

</div>
</div>

<div class="status-card">

<div class="status-title" id="status-title">
GPS Tracking Active
</div>

<div class="status-sub" id="status-sub">
Waiting for movement...
</div>

<div class="metrics">

<div class="metric">
<div class="metric-value" id="distance">
0.00
</div>
<div class="metric-label">KM</div>
</div>

<div class="metric">
<div class="metric-value" id="duration">
0:00
</div>
<div class="metric-label">Duration</div>
</div>

<div class="metric">
<div class="metric-value" id="points">
0
</div>
<div class="metric-label">GPS</div>
</div>

</div>

<button class="btn-submit" onclick="finishTrip()">
Submit Trip
</button>

</div>

<div class="result" id="result">
</div>

</div>

</div>

<div id="map"></div>

<div class="toast" id="toast"></div>

<script>

// ================================
// ZOHO CONFIG
// ================================

var ZOHO = {

owner:"YOUR_OWNER_NAME",

app:"distance-calculator-app",

form:"Distance_Calculation_Request",

token:"YOUR_ACCESS_TOKEN",

domain:"zoho.in"

};

// ================================
// MAP
// ================================

var map=L.map('map').setView([13.0827,80.2707],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

// ================================
// VARIABLES
// ================================

var selectedVehicle='bike';

var watchId=null;

var pathPoints=[];

var totalDistance=0;

var polyline=null;

var liveMarker=null;

var startMarker=null;

var endMarker=null;

var startLL=null;

var endLL=null;

var startTime=null;

// ================================
// TOAST
// ================================

function toast(msg){

var t=document.getElementById('toast');

t.innerHTML=msg;

t.classList.add('show');

setTimeout(function(){

t.classList.remove('show');

},3000);

}

// ================================
// VEHICLE
// ================================

function selectVehicle(type){

selectedVehicle=type;

document.getElementById('bike-btn')
.classList.remove('active');

document.getElementById('car-btn')
.classList.remove('active');

if(type==='bike'){

document.getElementById('bike-btn')
.classList.add('active');

}else{

document.getElementById('car-btn')
.classList.add('active');

}

}

// ================================
// ICONS
// ================================

function createIcon(color){

return L.divIcon({

html:`
<div style="
width:18px;
height:18px;
border-radius:50%;
background:${color};
border:3px solid white;
"></div>
`,

className:''

});

}

// ================================
// GPS START
// ================================

window.onload=function(){

if(!navigator.geolocation){

toast('GPS not supported');

return;

}

navigator.geolocation.getCurrentPosition(function(pos){

var lat=pos.coords.latitude;

var lng=pos.coords.longitude;

map.setView([lat,lng],16);

});

watchId=navigator.geolocation.watchPosition(

onPosition,

onError,

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

};

// ================================
// GPS POSITION
// ================================

function onPosition(pos){

var lat=pos.coords.latitude;

var lng=pos.coords.longitude;

var ll=L.latLng(lat,lng);

if(pathPoints.length===0){

startLL=ll;

startTime=Date.now();

pathPoints.push(ll);

startMarker=L.marker(ll,{
icon:createIcon('#22c55e')
}).addTo(map);

liveMarker=L.marker(ll,{
icon:createIcon('#2563eb')
}).addTo(map);

map.setView(ll,16);

return;

}

var last=pathPoints[pathPoints.length-1];

var segment=last.distanceTo(ll);

if(segment<5) return;

if(segment>200) return;

totalDistance+=segment;

pathPoints.push(ll);

if(polyline){

map.removeLayer(polyline);

}

polyline=L.polyline(pathPoints,{

color:'#22c55e',

weight:5

}).addTo(map);

liveMarker.setLatLng(ll);

map.panTo(ll);

document.getElementById('distance')
.innerHTML=(totalDistance/1000).toFixed(2);

document.getElementById('points')
.innerHTML=pathPoints.length;

var elapsed=Math.floor(
(Date.now()-startTime)/1000
);

document.getElementById('duration')
.innerHTML=formatTime(elapsed);

document.getElementById('status-sub')
.innerHTML=
lat.toFixed(5)+', '+lng.toFixed(5);

}

// ================================
// GPS ERROR
// ================================

function onError(err){

toast('GPS Error');

}

// ================================
// TIME FORMAT
// ================================

function formatTime(sec){

var m=Math.floor(sec/60);

var s=sec%60;

return m+':'+String(s).padStart(2,'0');

}

// ================================
// FINISH TRIP
// ================================

async function finishTrip(){

var name=document.getElementById('person-name').value;

var from=document.getElementById('from-location').value;

var to=document.getElementById('to-location').value;

if(!name){

toast('Select name');

return;

}

if(!from || !to){

toast('Enter From & To');

return;

}

if(pathPoints.length<2){

toast('No movement detected');

return;

}

navigator.geolocation.clearWatch(watchId);

endLL=pathPoints[pathPoints.length-1];

endMarker=L.marker(endLL,{
icon:createIcon('#ef4444')
}).addTo(map);

var km=(totalDistance/1000);

var duration=Math.floor(
(Date.now()-startTime)/1000
);

var rate=selectedVehicle==='car'
?20
:3.5;

var cost=(km*rate).toFixed(2);

var result=document.getElementById('result');

result.style.display='block';

result.innerHTML=`

<b>👤 Name:</b> ${name}<br>

<b>📍 From:</b> ${from}<br>

<b>📍 To:</b> ${to}<br>

<b>🚗 Vehicle:</b> ${selectedVehicle}<br>

<b>📏 Distance:</b> ${km.toFixed(2)} KM<br>

<b>⏱ Duration:</b> ${formatTime(duration)}<br>

<b>💰 Estimated Cost:</b> ₹${cost}

`;

var tripData={

Name:name,

Start_Location:from,

End_Location:to,

Distance_in_KM:km.toFixed(2),

Duration_in_Min:Math.round(duration/60),

Vehicle:selectedVehicle,

Estimated_Cost:cost,

GPS_Points:pathPoints.length,

Start_Latitude:startLL.lat,

Start_Longitude:startLL.lng,

End_Latitude:endLL.lat,

End_Longitude:endLL.lng

};

// ================================
// ZOHO SUBMIT
// ================================

try{

var response=await fetch(

'https://creator.'+ZOHO.domain+
'/api/v2/'+ZOHO.owner+
'/'+ZOHO.app+
'/form/'+ZOHO.form,

{

method:'POST',

headers:{
'Authorization':
'Zoho-oauthtoken '+ZOHO.token,

'Content-Type':
'application/json'
},

body:JSON.stringify({
data:tripData
})

}

);

var json=await response.json();

console.log(json);

toast('Trip Submitted to Zoho');

}catch(e){

console.log(e);

toast('Zoho Submit Failed');

}

}

</script>

</body>
</html>
