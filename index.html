<!DOCTYPE html>
<html>

<head>

    <title>Auto Distance Calculator</title>

    <meta charset="utf-8"/>

    <!-- LEAFLET -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f5f5f5;
        }

        #map{
            height:500px;
            width:100%;
        }

        .container{
            padding:20px;
        }

        h2{
            margin-bottom:20px;
        }

        .search-box{
            width:400px;
            padding:12px;
            font-size:16px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        .dropdown{
            width:425px;
            max-height:200px;
            overflow-y:auto;
            border:1px solid #ccc;
            background:white;
            position:relative;
            z-index:9999;
            border-radius:5px;
        }

        .dropdown div{
            padding:10px;
            cursor:pointer;
            border-bottom:1px solid #eee;
        }

        .dropdown div:hover{
            background:#f2f2f2;
        }

        .distance-box{
            width:200px;
            padding:12px;
            font-size:20px;
            font-weight:bold;
            color:#007bff;
            border:2px solid #007bff;
            border-radius:5px;
            background:white;
        }

    </style>

</head>

<body>

<div id="map"></div>

<div class="container">

    <h2>Map Distance Calculator</h2>

    <h3>Start Location</h3>

    <input
        type="text"
        id="start"
        class="search-box"
        placeholder="Type Start Location"
        onkeyup="searchSuggestions('start')">

    <div id="startSuggestions" class="dropdown"></div>

    <br><br>

    <h3>End Location</h3>

    <input
        type="text"
        id="end"
        class="search-box"
        placeholder="Type End Location"
        onkeyup="searchSuggestions('end')">

    <div id="endSuggestions" class="dropdown"></div>

    <br><br>

    <h3>Distance</h3>

    <input
        type="text"
        id="distance"
        class="distance-box"
        readonly
        placeholder="0 KM">

</div>

<script>

// ----------------------
// MAP
// ----------------------

var map = L.map('map').setView([13.0827, 80.2707], 10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}).addTo(map);

// ----------------------
// VARIABLES
// ----------------------

var startLatLng = null;
var endLatLng = null;

var startMarker = null;
var endMarker = null;
var routeLine = null;

// ----------------------
// SEARCH SUGGESTIONS
// ----------------------

async function searchSuggestions(type){

    var input =
    document.getElementById(type).value;

    var suggestionBox =
    document.getElementById(type + "Suggestions");

    if(input.length < 3){
        suggestionBox.innerHTML = "";
        return;
    }

    var url =
    "https://nominatim.openstreetmap.org/search?format=json&limit=5&q="
    + encodeURIComponent(input);

    var response = await fetch(url);

    var data = await response.json();

    suggestionBox.innerHTML = "";

    data.forEach(function(place){

        var div =
        document.createElement("div");

        div.innerHTML =
        place.display_name;

        div.onclick = function(){

            document.getElementById(type).value =
            place.display_name;

            suggestionBox.innerHTML = "";

            var latlng =
            L.latLng(place.lat, place.lon);

            if(type == "start"){

                startLatLng = latlng;

                if(startMarker){
                    map.removeLayer(startMarker);
                }

                startMarker =
                L.marker(latlng)
                .addTo(map)
                .bindPopup("Start Location");

            }
            else{

                endLatLng = latlng;

                if(endMarker){
                    map.removeLayer(endMarker);
                }

                endMarker =
                L.marker(latlng)
                .addTo(map)
                .bindPopup("End Location");
            }

            map.setView(latlng, 13);

            // AUTO CALCULATE
            calculateDistance();
        };

        suggestionBox.appendChild(div);

    });

}

// ----------------------
// MAP CLICK
// ----------------------

map.on('click', async function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    var url =
    "https://nominatim.openstreetmap.org/reverse?format=json&lat="
    + lat +
    "&lon=" +
    lon;

    var response = await fetch(url);

    var data = await response.json();

    // FIRST CLICK = START
    if(!startLatLng){

        startLatLng = e.latlng;

        if(startMarker){
            map.removeLayer(startMarker);
        }

        startMarker =
        L.marker(startLatLng)
        .addTo(map)
        .bindPopup("Start Location");

        document.getElementById("start").value =
        data.display_name;
    }

    // SECOND CLICK = END
    else{

        endLatLng = e.latlng;

        if(endMarker){
            map.removeLayer(endMarker);
        }

        endMarker =
        L.marker(endLatLng)
        .addTo(map)
        .bindPopup("End Location");

        document.getElementById("end").value =
        data.display_name;
    }

    // AUTO CALCULATE
    calculateDistance();

});

// ----------------------
// DISTANCE CALCULATION
// ----------------------

function calculateDistance(){

    if(startLatLng && endLatLng){

        var distance =
        startLatLng.distanceTo(endLatLng) / 1000;

        document.getElementById("distance").value =
        distance.toFixed(2) + " KM";

        // REMOVE OLD LINE
        if(routeLine){
            map.removeLayer(routeLine);
        }

        // DRAW ROUTE LINE
        routeLine =
        L.polyline(
            [startLatLng, endLatLng],
            {
                color:'blue',
                weight:5
            }
        ).addTo(map);

        // FIT MAP
        map.fitBounds(routeLine.getBounds());

        // SEND TO PARENT (ZOHO)
        window.parent.postMessage({

            start:
            document.getElementById("start").value,

            end:
            document.getElementById("end").value,

            distance:
            distance.toFixed(2)

        }, "*");

    }

}

</script>

</body>

</html>
