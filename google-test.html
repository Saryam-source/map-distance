<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#f3f8f6;
  --panel:#ffffff;
  --panel-soft:#f8fbfa;
  --green:#065f46;
  --green-dark:#043f30;
  --green-light:#16a34a;
  --green-soft:#ecfdf5;
  --blue:#2563eb;
  --red:#ef4444;
  --text:#17212b;
  --muted:#64748b;
  --border:#dfe8e4;
  --shadow:0 14px 36px rgba(15,23,42,.10);
  --shadow-soft:0 8px 22px rgba(15,23,42,.07);
  --radius:14px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'DM Sans',Arial,sans-serif;
  background:linear-gradient(180deg,#edf7f3 0%,#f8fafc 100%);
  color:var(--text);
  overflow:hidden;
}

.app-shell{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:10px;
}

.app-header{
  min-height:82px;
  background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);
  color:#fff;
  border-radius:16px;
  padding:18px 26px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:var(--shadow);
}

.header-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo-box{
  width:56px;
  height:56px;
  border-radius:14px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 24px rgba(255,255,255,.08);
}

.logo-box svg{width:36px;height:36px;}
.header-title{
  font-size:28px;
  line-height:1;
  font-weight:800;
  letter-spacing:.5px;
}
.header-sub{
  margin-top:8px;
  font-size:15px;
  font-weight:500;
  opacity:.88;
}
.header-date{
  font-size:16px;
  font-weight:700;
  white-space:nowrap;
  letter-spacing:.2px;
}

.main-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:430px 1fr;
  gap:10px;
}

.control-panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-soft);
  overflow-y:auto;
  padding:18px;
}

.control-panel::-webkit-scrollbar{width:7px;}
.control-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}

.form-section{margin-bottom:16px;}
.field-label{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.8px;
  text-transform:uppercase;
  color:var(--green);
  margin-bottom:8px;
}

.input-card,
gmp-place-autocomplete{
  width:100%;
  min-height:52px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  box-shadow:0 5px 16px rgba(15,23,42,.05);
  font-size:14px;
}

.input-card{
  padding:0 14px;
  display:flex;
  align-items:center;
  gap:10px;
}

.form-input{
  width:100%;
  height:52px;
  border:0;
  outline:0;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  color:var(--text);
  background:transparent;
}

.form-input::placeholder{font-weight:500;color:#94a3b8;}

.location-row{
  display:grid;
  grid-template-columns:1fr 94px;
  gap:10px;
  align-items:start;
}

.location-wrap{min-width:0;}
.selected-text{
  margin-top:7px;
  color:var(--muted);
  font-size:12px;
  line-height:1.4;
  min-height:16px;
}

.icon-dot{
  width:24px;
  height:24px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

.btn{
  border:0;
  outline:0;
  font-family:inherit;
  font-weight:800;
  cursor:pointer;
  transition:.22s ease;
  user-select:none;
}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.75;cursor:not-allowed;transform:none;}

.btn-location{
  height:52px;
  border-radius:12px;
  border:1px solid #bde6cc;
  background:#f2fff7;
  color:var(--green);
  font-size:12px;
  box-shadow:0 5px 16px rgba(22,163,74,.08);
}

.pin-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn-pin{
  height:50px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  font-size:15px;
  box-shadow:0 5px 16px rgba(15,23,42,.05);
}
.btn-pin.active{border-color:var(--green-light);background:var(--green-soft);color:var(--green);}
.btn-pin.to.active{border-color:var(--red);background:#fff1f2;color:#b91c1c;}

.vehicle-selector{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.vehicle-card{
  min-height:78px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  box-shadow:0 5px 16px rgba(15,23,42,.05);
}
.vehicle-card.active{
  border-color:var(--green-light);
  background:linear-gradient(135deg,#f0fff6,#ffffff);
  box-shadow:0 10px 24px rgba(22,163,74,.12);
}
.vehicle-info{display:flex;align-items:center;gap:10px;}
.vehicle-icon{
  width:38px;height:38px;border-radius:12px;background:#eef7f2;display:flex;align-items:center;justify-content:center;font-size:20px;
}
.vehicle-name{font-size:15px;font-weight:800;}
.vehicle-rate{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;}
.check-dot{
  width:22px;height:22px;border-radius:50%;border:1px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;background:#fff;
}
.vehicle-card.active .check-dot{background:var(--green-light);border-color:var(--green-light);}

.action-stack{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.btn-track{
  height:54px;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  box-shadow:0 12px 24px rgba(6,95,70,.22);
}
.btn-stop{background:linear-gradient(135deg,#ef4444,#b91c1c)!important;}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-calc{
  height:52px;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 10px 24px rgba(34,197,94,.20);
}
.btn-save{
  height:52px;
  border-radius:12px;
  color:var(--text);
  font-size:15px;
  background:#fff;
  border:1px solid var(--border);
  box-shadow:0 5px 16px rgba(15,23,42,.05);
}

.map-panel{
  min-width:0;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.map-card{
  flex:1;
  min-height:0;
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow-soft);
  position:relative;
}
#map{width:100%;height:100%;min-height:360px;}

.summary-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.summary-card{
  min-height:102px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  box-shadow:var(--shadow-soft);
  padding:18px;
  display:flex;
  align-items:center;
  gap:14px;
}
.summary-icon{
  width:48px;
  height:48px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  color:var(--green-light);
  background:#ecfdf5;
  flex:0 0 auto;
}
.summary-icon.blue{color:var(--blue);background:#eff6ff;}
.summary-label{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.4px;
}
.summary-value{
  margin-top:5px;
  font-size:24px;
  font-weight:900;
  color:var(--green);
  line-height:1;
}
.summary-sub{margin-top:6px;font-size:12px;font-weight:700;color:var(--muted);}

.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  background:#052e22;
  color:#fff;
  padding:13px 18px;
  border-radius:999px;
  box-shadow:0 14px 30px rgba(0,0,0,.2);
  font-size:13px;
  font-weight:700;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:999999;
}
.toast.show{opacity:1;bottom:34px;}

@media(max-width:1100px){
  .main-grid{grid-template-columns:380px 1fr;}
  .summary-row{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:820px){
  body{overflow:auto;}
  .app-shell{height:auto;min-height:100vh;}
  .app-header{align-items:flex-start;gap:12px;flex-direction:column;}
  .header-title{font-size:23px;}
  .main-grid{grid-template-columns:1fr;}
  .control-panel{overflow:visible;}
  .map-card{height:60vh;min-height:420px;}
  .summary-row{grid-template-columns:1fr;}
  .location-row,.action-row,.pin-row,.vehicle-selector{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-left">
      <div class="logo-box" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 10C10.9 10 6 14.9 6 21c0 8.6 11 19 11 19s11-10.4 11-19c0-6.1-4.9-11-11-11Z" fill="#7ee787"/>
          <circle cx="17" cy="21" r="4" fill="#064e3b"/>
          <path d="M47 24c-6.1 0-11 4.9-11 11 0 8.6 11 19 11 19s11-10.4 11-19c0-6.1-4.9-11-11-11Z" fill="#7ee787"/>
          <circle cx="47" cy="35" r="4" fill="#064e3b"/>
          <path d="M20 39c5 6 15 7 22 2" stroke="#7ee787" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 8"/>
        </svg>
      </div>
      <div>
        <div class="header-title">DISTANCE CALCULATOR</div>
        <div class="header-sub">Employee Travel Tracker</div>
      </div>
    </div>
    <div class="header-date" id="currentDateTime">--</div>
  </header>

  <main class="main-grid">
    <aside class="control-panel">
      <div class="form-section">
        <div class="field-label">Employee Name</div>
        <div class="input-card">
          <span class="icon-dot">👤</span>
          <input type="text" id="person-name" class="form-input" placeholder="Select or type employee name" list="employee-list" />
        </div>
        <datalist id="employee-list">
          <option value="Ajay"><option value="Shiny Roja"><option value="Srinidhi"><option value="Yamuna">
          <option value="Puviarasu"><option value="Ajitha"><option value="Aatish"><option value="Selvaganabathy">
          <option value="Muniyandi"><option value="Antony Daniel"><option value="Baraneeswari"><option value="Murugan">
          <option value="Loganathan"><option value="Simson"><option value="Vijay"><option value="Deepan Raj">
          <option value="Arunmani"><option value="Gopalakrishnan"><option value="Aswini"><option value="Manikandan">
          <option value="Subadeesh"><option value="Lakshmi Narayanan"><option value="Meenakshi"><option value="Hemachandiran">
          <option value="Lakshmi"><option value="Manimaran"><option value="Divya"><option value="Renuka">
        </datalist>
      </div>

      <div class="form-section">
        <div class="field-label">Travel Date</div>
        <div class="input-card">
          <span class="icon-dot">📅</span>
          <input type="date" id="travel-date" class="form-input" />
        </div>
      </div>

      <div class="form-section">
        <div class="field-label">From</div>
        <div class="location-row">
          <div class="location-wrap">
            <gmp-place-autocomplete id="from-loc" placeholder="Search starting location"></gmp-place-autocomplete>
            <div class="selected-text" id="from-selected"></div>
          </div>
          <button class="btn btn-location" onclick="useCurrentLocation('from')">⌖ My Location</button>
        </div>
      </div>

      <div class="form-section">
        <div class="field-label">To</div>
        <div class="location-row">
          <div class="location-wrap">
            <gmp-place-autocomplete id="to-loc" placeholder="Search destination"></gmp-place-autocomplete>
            <div class="selected-text" id="to-selected"></div>
          </div>
          <button class="btn btn-location" onclick="useCurrentLocation('to')">⌖ My Location</button>
        </div>
      </div>

      <div class="form-section">
        <div class="field-label">Manual Pin Location</div>
        <div class="pin-row">
          <button class="btn btn-pin" id="btn-pin-from" onclick="startPin('from')">📍 Pin From</button>
          <button class="btn btn-pin to" id="btn-pin-to" onclick="startPin('to')">📍 Pin To</button>
        </div>
      </div>

      <div class="form-section">
        <div class="field-label">Vehicle Type</div>
        <div class="vehicle-selector">
          <button class="btn vehicle-card active" id="btn-bike" onclick="selectVehicle('bike')">
            <span class="vehicle-info"><span class="vehicle-icon">🏍</span><span><span class="vehicle-name">Bike</span><span class="vehicle-rate">₹ 4 / km</span></span></span>
            <span class="check-dot">✓</span>
          </button>
          <button class="btn vehicle-card" id="btn-car" onclick="selectVehicle('car')">
            <span class="vehicle-info"><span class="vehicle-icon">🚗</span><span><span class="vehicle-name">Car</span><span class="vehicle-rate">₹ 8 / km</span></span></span>
            <span class="check-dot">✓</span>
          </button>
        </div>
      </div>

      <div class="action-stack">
        <button class="btn btn-track" id="tracking-btn" onclick="startLiveTracking()">▶ Start Live Tracking</button>
        <div class="action-row">
          <button class="btn btn-calc" id="calc-btn" onclick="calculateRoute()">⌁ Calculate Route</button>
          <button class="btn btn-save" id="save-btn" onclick="submitToZoho(false)">▣ Save to Zoho</button>
        </div>
      </div>
    </aside>

    <section class="map-panel">
      <div class="map-card">
        <div id="map"></div>
      </div>

      <div class="summary-row" id="result-card">
        <div class="summary-card">
          <div class="summary-icon">▰</div>
          <div>
            <div class="summary-label">Distance</div>
            <div class="summary-value" id="r-dist">0 KM</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon blue">◷</div>
          <div>
            <div class="summary-label">Duration</div>
            <div class="summary-value" id="r-dur">0 MIN</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon">₹</div>
          <div>
            <div class="summary-label" id="cost-label">Est. Cost (Bike)</div>
            <div class="summary-value" id="r-cost">₹ 0.00</div>
            <div class="summary-sub" id="rate-label">₹ 4 / km</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon">⌁</div>
          <div>
            <div class="summary-label">Trip Status</div>
            <div class="summary-value" id="trip-status" style="font-size:18px;line-height:1.25;">Not Started</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===================== CONFIG ===================== */
var ZOHO_WEBHOOK_URL = "https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";

/* ===================== STATE ===================== */
document.getElementById("travel-date").value = new Date().toISOString().split("T")[0];

var map, geocoder, infoWindow;
var selectedVehicle = "bike";

var fromMarker = null;
var toMarker = null;
var currentMarker = null;
var routeLine = null;

var fromCoords = null;
var toCoords = null;
var fromAddress = "";
var toAddress = "";

var tripData = null;
var alreadySaved = false;
var tripSaved = false;
var savingNow = false;

var pinMode = null;
var liveTracking = false;
var watchId = null;
var destinationReached = false;
var trackingStartTime = null;
var trackingEndTime = null;
var latestLiveCoords = null;
var autoSaveLock = false;

function updateHeaderTime(){
  var now = new Date();
  var date = now.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  var time = now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  document.getElementById("currentDateTime").innerHTML = date + " | " + time;
}
updateHeaderTime();
setInterval(updateHeaderTime,60000);

/* ===================== INIT MAP ===================== */
function initMap(){
  map = new google.maps.Map(document.getElementById("map"),{
    center:{lat:13.0827,lng:80.2707},
    zoom:12,
    mapTypeControl:false,
    streetViewControl:false,
    fullscreenControl:true
  });

  geocoder = new google.maps.Geocoder();
  infoWindow = new google.maps.InfoWindow();

  setupAutocomplete("from-loc","from");
  setupAutocomplete("to-loc","to");

  map.addListener("click",function(e){
    if(!pinMode){return;}

    var lat = e.latLng.lat();
    var lng = e.latLng.lng();

    reverseGeocode(lat,lng,function(address){
      setLocation(pinMode,address,lat,lng);
      pinMode = null;
      document.getElementById("btn-pin-from").classList.remove("active");
      document.getElementById("btn-pin-to").classList.remove("active");
      map.setOptions({draggableCursor:null});
    });
  });
}

/* ===================== AUTOCOMPLETE ===================== */
function setupAutocomplete(inputId,type){
  var autocomplete = document.getElementById(inputId);

  autocomplete.addEventListener("gmp-select",async function(event){
    var place = event.placePrediction.toPlace();

    await place.fetchFields({
      fields:["displayName","formattedAddress","location"]
    });

    if(!place.location){
      toast("Please select valid location from dropdown");
      return;
    }

    var lat = place.location.lat();
    var lng = place.location.lng();
    var address = place.formattedAddress || place.displayName;

    setLocation(type,address,lat,lng);
  });
}

/* ===================== MARKERS ===================== */
function clearRoute(){
  if(routeLine){
    routeLine.setMap(null);
    routeLine = null;
  }
}

function setInputText(type,address){
  var input = document.getElementById(type === "from" ? "from-loc" : "to-loc");

  try{
    input.value = address;
    input.setAttribute("value",address);
  }catch(e){}

  document.getElementById(type === "from" ? "from-selected" : "to-selected").innerHTML = address;
}

function setLocation(type,address,lat,lng){
  var position = {lat:lat,lng:lng};

  clearRoute();
  tripData = null;
  alreadySaved = false;
  tripSaved = false;
  autoSaveLock = false;
  updateTripStatus("Location Selected");

  if(type === "from"){
    fromCoords = position;
    fromAddress = address;
    setInputText("from",address);

    if(fromMarker){fromMarker.setMap(null);}

    fromMarker = new google.maps.Marker({
      position:position,
      map:map,
      title:"FROM",
      icon:"https://maps.google.com/mapfiles/ms/icons/green-dot.png"
    });

    fromMarker.addListener("click",function(){
      infoWindow.setContent("<b>FROM</b><br>" + fromAddress);
      infoWindow.open(map,fromMarker);
    });

    toast("FROM selected successfully");
  }else{
    toCoords = position;
    toAddress = address;
    setInputText("to",address);

    if(toMarker){toMarker.setMap(null);}

    toMarker = new google.maps.Marker({
      position:position,
      map:map,
      title:"TO",
      icon:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"
    });

    toMarker.addListener("click",function(){
      infoWindow.setContent("<b>TO</b><br>" + toAddress);
      infoWindow.open(map,toMarker);
    });

    toast("TO selected successfully");

    if(liveTracking && fromCoords && toCoords){
      toast("Destination added. Tracking will stop automatically when reached.");
    }
  }

  if(fromCoords && toCoords){
    var bounds = new google.maps.LatLngBounds();
    bounds.extend(fromCoords);
    bounds.extend(toCoords);
    map.fitBounds(bounds);
  }else{
    map.setCenter(position);
    map.setZoom(15);
  }
}

/* ===================== UI HELPERS ===================== */
function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._t);
  t._t = setTimeout(function(){t.classList.remove("show");},2500);
}

function updateTripStatus(text){
  document.getElementById("trip-status").textContent = text;
}

function selectVehicle(type){
  selectedVehicle = type;
  document.getElementById("btn-bike").classList.toggle("active",type === "bike");
  document.getElementById("btn-car").classList.toggle("active",type === "car");
  document.getElementById("cost-label").textContent = type === "car" ? "Est. Cost (Car)" : "Est. Cost (Bike)";
  document.getElementById("rate-label").textContent = type === "car" ? "₹ 8 / km" : "₹ 4 / km";
  alreadySaved = false;
  tripSaved = false;
}

function startPin(type){
  if(!map){toast("Map not loaded yet");return;}
  pinMode = type;
  document.getElementById("btn-pin-from").classList.toggle("active",type === "from");
  document.getElementById("btn-pin-to").classList.toggle("active",type === "to");
  map.setOptions({draggableCursor:"crosshair"});
  toast("Click on map to pin " + type);
}

/* ===================== GEOLOCATION ===================== */
function useCurrentLocation(type){
  if(!navigator.geolocation){toast("Geolocation not supported");return;}

  if(type === "to" && liveTracking && latestLiveCoords){
    reverseGeocodeAndSet(type,latestLiveCoords.lat,latestLiveCoords.lng);
    return;
  }

  toast("Getting your current location...");

  navigator.geolocation.getCurrentPosition(
    function(position){
      reverseGeocodeAndSet(type,position.coords.latitude,position.coords.longitude);
    },
    function(error){
      console.error(error);
      toast("Location permission denied or timeout");
    },
    {enableHighAccuracy:true,maximumAge:10000,timeout:30000}
  );
}

function reverseGeocode(lat,lng,callback){
  geocoder.geocode({location:{lat:lat,lng:lng}},function(results,status){
    var address = lat.toFixed(5) + "," + lng.toFixed(5);
    if(status === "OK" && results[0]){
      address = results[0].formatted_address;
    }
    callback(address);
  });
}

function reverseGeocodeAndSet(type,lat,lng){
  reverseGeocode(lat,lng,function(address){
    setLocation(type,address,lat,lng);
    toast(type === "from" ? "Current location added as FROM" : "Current location added as TO");
  });
}

/* ===================== ROUTE CALCULATION ===================== */
function formatDate(rawDate){
  var parts = rawDate.split("-");
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return parts[2] + "-" + months[parseInt(parts[1]) - 1] + "-" + parts[0];
}

function getOSRMRoute(){
  return new Promise(function(resolve,reject){
    var url =
      "https://router.project-osrm.org/route/v1/driving/" +
      fromCoords.lng + "," + fromCoords.lat + ";" +
      toCoords.lng + "," + toCoords.lat +
      "?overview=full&geometries=geojson";

    fetch(url)
    .then(function(r){
      return r.json();
    })
    .then(function(data){
      if(!data.routes || !data.routes.length){
        reject("Route not found");
        return;
      }

      var route = data.routes[0];

      var path = route.geometry.coordinates.map(function(c){
        return {
          lat:c[1],
          lng:c[0]
        };
      });

      resolve({
        distanceKm:route.distance / 1000,
        durationMin:Math.round(route.duration / 60),
        path:path
      });
    })
    .catch(function(error){
      reject(error);
    });
  });
}

function calculateRoute(){
  return new Promise(function(resolve,reject){
    var name = document.getElementById("person-name").value.trim();
    var rawDate = document.getElementById("travel-date").value;

    if(!rawDate){toast("Please select date");reject();return;}
    if(!name){alert("Please enter employee name");reject();return;}
    if(!fromCoords || !toCoords){toast("Please select valid From and To locations");reject();return;}

    toast("Calculating road route...");
    updateTripStatus("Calculating...");
    document.getElementById("calc-btn").disabled = true;

    clearRoute();

    getOSRMRoute()
    .then(function(route){

      routeLine = new google.maps.Polyline({
        path:route.path,
        map:map,
        strokeColor:"#2563eb",
        strokeWeight:7,
        strokeOpacity:0.9
      });

      var bounds = new google.maps.LatLngBounds();
      route.path.forEach(function(p){
        bounds.extend(p);
      });
      map.fitBounds(bounds);

      var distanceKm = route.distanceKm;
      var durationMin = route.durationMin;
      if(durationMin <= 0){durationMin = 1;}

      var rate = selectedVehicle === "car" ? 8 : 4;
      var cost = (distanceKm * rate).toFixed(2);

      tripData = {
        Name:name,
        Travel_Date:formatDate(rawDate),
        start:fromAddress,
        end:toAddress,
        distance:parseFloat(distanceKm.toFixed(2)),
        duration:String(durationMin),
        mode:selectedVehicle,
        cost:parseFloat(cost),
        travel_time:tripData && tripData.travel_time ? tripData.travel_time : "",
        timestamp:new Date().toISOString()
      };

      alreadySaved = false;
      tripSaved = false;

      document.getElementById("r-dist").textContent = distanceKm.toFixed(2) + " KM";
      document.getElementById("r-dur").textContent = durationMin + " MIN";
      document.getElementById("r-cost").innerHTML = "₹ " + cost;
      updateTripStatus("Route Calculated");

      var btn = document.getElementById("save-btn");
      btn.disabled = false;
      btn.innerHTML = "▣ Save to Zoho";
      btn.style.background = "";
      btn.style.color = "";

      document.getElementById("calc-btn").disabled = false;
      toast("Route calculated");
      resolve();
    })
    .catch(function(error){
      console.error("OSRM route failed:",error);
      document.getElementById("calc-btn").disabled = false;
      updateTripStatus("Route Failed");
      toast("Failed to calculate route");
      reject(error);
    });
  });
}

/* ===================== ZOHO SAVE + DUPLICATE PROTECTION ===================== */
function makeTripKey(){
  if(!tripData){return "";}
  return [
    tripData.Name,
    tripData.Travel_Date,
    tripData.start,
    tripData.end,
    tripData.distance,
    tripData.mode,
    tripData.travel_time
  ].join("|");
}

function submitToZoho(isAutoSave){
  return new Promise(function(resolve,reject){

    if(!tripData){
      toast("Calculate route first");
      reject("No trip data");
      return;
    }

    var key = makeTripKey();

    if(savingNow){
      toast("Saving already in progress");
      reject("Saving already in progress");
      return;
    }

    if(tripSaved || alreadySaved || sessionStorage.getItem("last_saved_trip") === key){
      toast("This trip is already saved");
      resolve("Already saved");
      return;
    }

    savingNow = true;
    updateTripStatus(isAutoSave ? "Auto Saving..." : "Saving...");

    var btn = document.getElementById("save-btn");
    btn.disabled = true;
    btn.innerHTML = isAutoSave ? "Auto saving..." : "Saving...";

    var params = new URLSearchParams();

    Object.keys(tripData).forEach(function(k){
      params.append(k,String(tripData[k]));
    });

    fetch(ZOHO_WEBHOOK_URL + "&" + params.toString(),{
      method:"GET",
      mode:"no-cors"
    })
    .then(function(){
      savingNow = false;
      alreadySaved = true;
      tripSaved = true;

      sessionStorage.setItem("last_saved_trip",key);

      btn.disabled = true;
      btn.innerHTML = isAutoSave ? "Auto Saved ✓" : "Saved ✓";
      btn.style.background = "#22c55e";
      btn.style.color = "#fff";
      updateTripStatus(isAutoSave ? "Auto Saved" : "Saved");

      if(isAutoSave){
        toast("Destination reached. Trip saved.");
      }else{
        toast("Saved to Zoho");
      }

      resolve("Saved");
    })
    .catch(function(error){
      savingNow = false;
      tripSaved = false;

      console.error(error);

      btn.disabled = false;
      btn.innerHTML = "▣ Save to Zoho";
      updateTripStatus("Save Failed");

      toast("Failed to save");
      reject(error);
    });

  });
}

/* ===================== LIVE TRACKING AUTO STOP + AUTO SAVE ===================== */
function startLiveTracking(){
  if(liveTracking){toast("Live tracking already started");return;}
  if(!navigator.geolocation){toast("Geolocation not supported");return;}
  if(!fromCoords){toast("Please select FROM location first");return;}

  liveTracking = true;
  destinationReached = false;
  autoSaveLock = false;
  trackingStartTime = new Date();

  var trackBtn = document.getElementById("tracking-btn");
  trackBtn.innerHTML = "● Tracking Started";
  trackBtn.classList.add("btn-stop");
  updateTripStatus("Tracking Active");

  toast("Live tracking started");

  watchId = navigator.geolocation.watchPosition(
    function(position){
      var lat = position.coords.latitude;
      var lng = position.coords.longitude;

      latestLiveCoords = {lat:lat,lng:lng};
      var currentPosition = {lat:lat,lng:lng};

      if(currentMarker){
        currentMarker.setPosition(currentPosition);
      }else{
        currentMarker = new google.maps.Marker({
          position:currentPosition,
          map:map,
          title:"Live Location",
          label:{text:"L",color:"#ffffff",fontWeight:"bold"},
          icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        });
      }

      map.setCenter(currentPosition);
      map.setZoom(15);

      if(toCoords){
        var remaining = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(lat,lng),
          new google.maps.LatLng(toCoords.lat,toCoords.lng)
        );

        if(remaining <= 100 && !destinationReached && !autoSaveLock){
          destinationReached = true;
          autoSaveLock = true;
          trackingEndTime = new Date();

          toast("Destination reached. Auto saving...");

          navigator.geolocation.clearWatch(watchId);
          liveTracking = false;

          trackBtn.innerHTML = "▶ Start Live Tracking";
          trackBtn.classList.remove("btn-stop");

          var start = trackingStartTime.toLocaleTimeString();
          var end = trackingEndTime.toLocaleTimeString();
          var totalMinutes = Math.round((trackingEndTime - trackingStartTime) / 60000);
          var finalTravelTime = start + " - " + end + " (" + totalMinutes + " mins)";

          calculateRoute().then(function(){
            if(tripData){
              tripData.travel_time = finalTravelTime;
              submitToZoho(true);
            }
          }).catch(function(error){
            console.error(error);
            updateTripStatus("Auto Save Failed");
            toast("Auto save failed because route calculation failed");
          });
        }
      }
    },
    function(error){
      console.error(error);
      toast("Location access denied");
      liveTracking = false;
      document.getElementById("tracking-btn").innerHTML = "▶ Start Live Tracking";
      document.getElementById("tracking-btn").classList.remove("btn-stop");
      updateTripStatus("Tracking Failed");
    },
    {enableHighAccuracy:true,maximumAge:0,timeout:30000}
  );
}
</script>
