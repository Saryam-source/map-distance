<!DOCTYPE html>
<html>
<head>
<title>Google Maps Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

#map {
    height: 100%;
    width: 100%;
}

.box {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: white;
    padding: 15px;
    width: 360px;
    border-radius: 12px;
    box-shadow: 0 4px 25px rgba(0,0,0,0.25);
}

.box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.box button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    <input id="from" type="text" placeholder="From location">
    <input id="to" type="text" placeholder="To location">
    <button onclick="calculateRoute()">Show Route</button>
    <div class="result" id="result">Distance and duration will show here</div>
</div>

<div id="map"></div>

<script>
let map;
let directionsService;
let directionsRenderer;

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 13.0827, lng: 80.2707 },
        zoom: 12
    });

    directionsService = new google.maps.DirectionsService();

    directionsRenderer = new google.maps.DirectionsRenderer({
        map: map
    });

    new google.maps.places.Autocomplete(document.getElementById("from"));
    new google.maps.places.Autocomplete(document.getElementById("to"));
}

function calculateRoute() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!from || !to) {
        alert("Please enter both From and To locations");
        return;
    }

    directionsService.route(
        {
            origin: from,
            destination: to,
            travelMode: google.maps.TravelMode.DRIVING
        },
        function(result, status) {
            if (status === "OK") {
                directionsRenderer.setDirections(result);

                const leg = result.routes[0].legs[0];

                document.getElementById("result").innerHTML =
                    "Distance: " + leg.distance.text +
                    "<br>Duration: " + leg.duration.text;
            } else {
                document.getElementById("result").innerHTML =
                    "Route failed: " + status;
            }
        }
    );
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places&callback=initMap">
</script>

</body>
</html>
