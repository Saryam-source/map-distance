<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Employee Travel Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
--bg:#f5f3ed;
--surface:#f5f3edee;
--border:#e6e0d6;
--text:#3c3a36;
--muted:#7d786f;
--accent:#d8cfb5;
--green:#22c55e;
--radius:18px;
--shadow:0 8px 24px rgba(0,0,0,.05);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
background:#f5f3ed;
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:390px;
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow-y:auto;
box-shadow:var(--shadow);
z-index:999;
}

.brand{
padding:24px;
border-bottom:1px solid var(--border);
background:#f7f5ef;
}

.brand-title{
font-size:24px;
font-weight:700;
}

.brand-sub{
font-size:13px;
margin-top:6px;
color:var(--muted);
}

.pane{
padding:22px;
display:flex;
flex-direction:column;
gap:18px;
}

.field-label{
font-size:11px;
font-weight:700;
letter-spacing:1px;
margin-bottom:8px;
color:var(--muted);
text-transform:uppercase;
}

.form-input,
gmp-place-autocomplete{
width:100%;
border-radius:16px;
font-size:14px;
}

.form-input{
padding:14px 16px;
border:1px solid var(--border);
background:#f7f5ef;
outline:none;
color:var(--text);
}

.search-wrap{
position:relative;
}

.pin-row,
.vehicle-selector{
display:flex;
gap:12px;
}

.btn-pin,
.vehicle-btn,
.btn-calc,
.btn-submit{
padding:14px;
border:none;
border-radius:16px;
font-weight:700;
cursor:pointer;
font-size:14px;
}

.btn-pin,
.vehicle-btn,
.btn-submit{
background:#f7f5ef;
border:1px solid var(--border);
color:var(--text);
}

.vehicle-btn.active,
.btn-pin.active{
background:#d8cfb5;
}

.btn-calc{
background:#22c55e;
color:#fff;
}

.result-card{
display:none;
flex-direction:column;
gap:16px;
padding:20px;
border-radius:20px;
background:#f7f5ef;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

.result-card.show{
display:flex;
}

.metric{
font-size:32px;
font-weight:700;
}

#r-cost{
font-size:15px;
font-weight:600;
color:#8b7d59;
}

#map{
flex:1;
height:100vh;
}

.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background:#3c3a36;
color:#fff;
padding:14px 22px;
border-radius:30px;
font-size:13px;
opacity:0;
transition:.3s;
z-index:999999;
}

.toast.show{
opacity:1;
bottom:34px;
}

@media(max-width:768px){
body{
flex-direction:column;
height:auto;
overflow-y:auto;
}

.sidebar{
width:100%;
}

.pin-row,
.vehicle-selector{
flex-direction:column;
}

#map{
height:65vh;
min-height:450px;
}
}
</style>
</head>

<body>

<aside class="sidebar">
<div class="brand">
<div class="brand-title">Employee Travel Tracker</div>
<div class="brand-sub">Distance · Route · Zoho Sync</div>
</div>

<div class="pane">

<div>
<div class="field-label">Employee Name</div>
<input type="text" id="person-name" class="form-input" placeholder="Select or type employee name" list="employee-list"/>
<datalist id="employee-list">
<option value="Ajay">
<option value="Shiny Roja">
<option value="Srinidhi">
<option value="Yamuna">
<option value="Puviarasu">
<option value="Ajitha">
<option value="Aatish">
<option value="Selvaganabathy">
<option value="Muniyandi">
<option value="Antony Daniel">
<option value="Baraneeswari">
<option value="Murugan">
<option value="Loganathan">
<option value="Simson">
<option value="Vijay">
<option value="Deepan Raj">
<option value="Arunmani">
<option value="Gopalakrishnan">
<option value="Aswini">
<option value="Manikandan">
<option value="Subadeesh">
<option value="Lakshmi Narayanan">
<option value="Meenakshi">
<option value="Hemachandiran">
<option value="Lakshmi">
<option value="Manimaran">
<option value="Divya">
<option value="Renuka">
</datalist>
</div>

<div>
<div class="field-label">Travel Date</div>
<input type="date" id="travel-date" class="form-input"/>
</div>

<div>
<div class="field-label">From</div>
<button class="btn-pin" onclick="useCurrentLocation('from')">📍 Your Location</button>
<gmp-place-autocomplete id="from-loc" placeholder="Search starting location"></gmp-place-autocomplete>
</div>

<div>
<div class="field-label">To</div>
<button class="btn-pin" onclick="useCurrentLocation('to')">📍 Your Location</button>
<gmp-place-autocomplete id="to-loc" placeholder="Search destination"></gmp-place-autocomplete>
</div>

<div>
<div class="field-label">Manual Pin Location</div>
<div class="pin-row">
<button class="btn-pin" id="btn-pin-from" onclick="startPin('from')">🟢 Pin From</button>
<button class="btn-pin" id="btn-pin-to" onclick="startPin('to')">🔴 Pin To</button>
</div>
</div>

<div>
<div class="field-label">Vehicle Type</div>
<div class="vehicle-selector">
<button class="vehicle-btn active" id="btn-bike" onclick="selectVehicle('bike')">🏍 Bike Rs.4/km</button>
<button class="vehicle-btn" id="btn-car" onclick="selectVehicle('car')">🚗 Car Rs.8/km</button>
</div>
</div>

<button class="btn-submit" onclick="startLiveTracking()">🛰 Start Live Tracking</button>
<button type="button" class="btn-calc" onclick="calculateRoute()">🗺 Calculate Route</button>

<div class="result-card" id="result-card">
<div>
Distance
<div class="metric" id="r-dist">0 KM</div>
</div>

<div>
Duration
<div class="metric" id="r-dur">0 MIN</div>
</div>

<div id="r-cost"></div>

<button class="btn-submit" id="save-btn" onclick="submitToZoho()">💾 Save to Zoho</button>
</div>

</div>
</aside>

<div id="map"></div>
<div class="toast" id="toast"></div>

<script>
var ZOHO_WEBHOOK_URL =
"https://flow.zoho.com/896521609/flow/webhook/incoming?zapikey=1001.6973881a93290c5a3fc04fcdcb02f4e7.1513b227e0b8158ac4771f36d96efebf&isdebug=false";

document.getElementById('travel-date').value =
new Date().toISOString().split('T')[0];

var map;
var geocoder;

var selectedVehicle = 'bike';

var fromMarker = null;
var toMarker = null;
var currentMarker = null;

var fromCoords = null;
var toCoords = null;

var fromAddress = "";
var toAddress = "";

var tripData = null;

var pinMode = null;
var liveTracking = false;
var watchId = null;
var destinationReached = false;
var trackingStartTime = null;
var trackingEndTime = null;
var latestLiveCoords = null;

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{
center:{lat:13.0827,lng:80.2707},
zoom:12,
mapTypeControl:false,
streetViewControl:false,
fullscreenControl:true
});

geocoder = new google.maps.Geocoder();

setupNewAutocomplete();

map.addListener("click",function(e){

if(!pinMode){
return;
}

var lat = e.latLng.lat();
var lng = e.latLng.lng();

geocoder.geocode(
{location:{lat:lat,lng:lng}},
function(results,status){

var address = lat.toFixed(5) + "," + lng.toFixed(5);

if(status === "OK" && results[0]){
address = results[0].formatted_address;
}

setLocation(pinMode,address,lat,lng);

pinMode = null;

document.getElementById('btn-pin-from').classList.remove('active');
document.getElementById('btn-pin-to').classList.remove('active');

map.setOptions({draggableCursor:null});

}
);

});

}

function setupNewAutocomplete(){

var fromAuto = document.getElementById("from-loc");
var toAuto = document.getElementById("to-loc");

fromAuto.addEventListener("gmp-select", async function(event){

var place = event.placePrediction.toPlace();

await place.fetchFields({
fields:["displayName","formattedAddress","location"]
});

setLocation(
"from",
place.formattedAddress || place.displayName,
place.location.lat(),
place.location.lng()
);

console.log("FROM selected:", place);

});

toAuto.addEventListener("gmp-select", async function(event){

var place = event.placePrediction.toPlace();

await place.fetchFields({
fields:["displayName","formattedAddress","location"]
});

setLocation(
"to",
place.formattedAddress || place.displayName,
place.location.lat(),
place.location.lng()
);

console.log("TO selected:", place);

});

}

function setLocation(type,address,lat,lng){

var position = {lat:lat,lng:lng};

if(type === "from"){

fromCoords = position;
fromAddress = address;

if(fromMarker){
fromMarker.setMap(null);
}

fromMarker = new google.maps.Marker({
position:position,
map:map,
title:"FROM",
icon:{
url:"https://maps.google.com/mapfiles/ms/icons/green-dot.png"
}
});

var fromInfo = new google.maps.InfoWindow({
content:"<b>FROM</b><br>" + address
});

fromMarker.addListener("click",function(){
fromInfo.open(map,fromMarker);
});

toast("FROM selected successfully");

}else{

toCoords = position;
toAddress = address;

if(toMarker){
toMarker.setMap(null);
}

toMarker = new google.maps.Marker({
position:position,
map:map,
title:"TO",
icon:{
url:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"
}
});

var toInfo = new google.maps.InfoWindow({
content:"<b>TO</b><br>" + address
});

toMarker.addListener("click",function(){
toInfo.open(map,toMarker);
});

toast("TO selected successfully");

if(liveTracking && fromCoords && toCoords){
toast("Destination added. Tracking will stop automatically when reached.");
}

}

if(fromCoords && toCoords){

var bounds = new google.maps.LatLngBounds();
bounds.extend(fromCoords);
bounds.extend(toCoords);
map.fitBounds(bounds);

}else{

map.setCenter(position);
map.setZoom(15);

}

}

function toast(msg){

var t = document.getElementById('toast');

t.textContent = msg;
t.classList.add('show');

clearTimeout(t._t);

t._t = setTimeout(function(){
t.classList.remove('show');
},2500);

}

function selectVehicle(type){

selectedVehicle = type;

document.getElementById('btn-bike').classList.toggle('active',type === 'bike');
document.getElementById('btn-car').classList.toggle('active',type === 'car');

}

function startPin(type){

if(!map){
toast("Map not loaded yet");
return;
}

pinMode = type;

document.getElementById('btn-pin-from').classList.toggle('active',type === 'from');
document.getElementById('btn-pin-to').classList.toggle('active',type === 'to');

map.setOptions({draggableCursor:"crosshair"});

toast("Click on map to pin " + type);

}

function useCurrentLocation(type){

if(!navigator.geolocation){
toast("Geolocation not supported");
return;
}

if(type === "to" && liveTracking && latestLiveCoords){
reverseGeocodeAndSet(type,latestLiveCoords.lat,latestLiveCoords.lng);
return;
}

toast("Getting your current location...");

navigator.geolocation.getCurrentPosition(

function(position){

var lat = position.coords.latitude;
var lng = position.coords.longitude;

reverseGeocodeAndSet(type,lat,lng);

},

function(error){

console.error(error);
toast("Location permission denied or timeout");

},

{
enableHighAccuracy:true,
maximumAge:10000,
timeout:30000
}

);

}

function reverseGeocodeAndSet(type,lat,lng){

if(!geocoder){
toast("Google Geocoder not loaded");
return;
}

geocoder.geocode(
{location:{lat:lat,lng:lng}},
function(results,status){

var address = lat.toFixed(5) + "," + lng.toFixed(5);

if(status === "OK" && results[0]){
address = results[0].formatted_address;
}

setLocation(type,address,lat,lng);

}
);

}

function calculateRoute(){

return new Promise(function(resolve,reject){

try{

var name = document.getElementById('person-name').value;
var rawDate = document.getElementById('travel-date').value;

if(!rawDate){
toast("Please select date");
reject();
return;
}

if(!name){
alert("Please enter employee name");
reject();
return;
}

if(!fromCoords || !toCoords){
toast("Please select valid From and To locations");
reject();
return;
}

var distance =
google.maps.geometry.spherical.computeDistanceBetween(
new google.maps.LatLng(fromCoords.lat,fromCoords.lng),
new google.maps.LatLng(toCoords.lat,toCoords.lng)
);

var distanceKm = distance / 1000;

var durationMin = Math.round((distanceKm / 35) * 60);

if(durationMin <= 0){
durationMin = 1;
}

var rate = selectedVehicle === "car" ? 8 : 4;
var cost = (distanceKm * rate).toFixed(2);

var parts = rawDate.split('-');

var months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

var date =
parts[2] + '-' +
months[parseInt(parts[1]) - 1] + '-' +
parts[0];

tripData = {
Name:name,
Travel_Date:date,
start:fromAddress,
end:toAddress,
distance:parseFloat(distanceKm.toFixed(2)),
duration:String(durationMin),
mode:selectedVehicle,
cost:parseFloat(cost),
travel_time:
tripData && tripData.travel_time
? tripData.travel_time
: '',
timestamp:new Date().toISOString()
};

document.getElementById('r-dist').textContent =
distanceKm.toFixed(2) + " KM";

document.getElementById('r-dur').textContent =
durationMin + " MIN";

document.getElementById('r-cost').innerHTML =
"Estimated Cost: Rs." + cost;

document.getElementById('result-card').classList.add('show');

document.getElementById('save-btn').disabled = false;
document.getElementById('save-btn').innerHTML = "💾 Save to Zoho";
document.getElementById('save-btn').style.background = "";

toast("Distance calculated");

resolve();

}catch(e){

console.error(e);
toast("Failed to calculate distance");
reject();

}

});

}

function submitToZoho(){

if(!tripData){
toast("Calculate route first");
return;
}

var btn = document.getElementById('save-btn');

btn.disabled = true;
btn.innerHTML = "Saving...";

var params = new URLSearchParams();

Object.keys(tripData).forEach(function(k){
params.append(k,String(tripData[k]));
});

console.log(tripData);

fetch(
ZOHO_WEBHOOK_URL + '&' + params.toString(),
{
method:'GET',
mode:'no-cors'
}
)
.then(function(){

btn.innerHTML = "Saved ✓";
btn.style.background = "#22c55e";
toast("Saved to Zoho");

})
.catch(function(error){

console.error(error);
btn.disabled = false;
btn.innerHTML = "💾 Save to Zoho";
toast("Failed to save");

});

}

function startLiveTracking(){

if(liveTracking){
toast("Live tracking already started");
return;
}

if(!navigator.geolocation){
toast("Geolocation not supported");
return;
}

if(!fromCoords){
toast("Please select FROM location first");
return;
}

liveTracking = true;
destinationReached = false;
trackingStartTime = new Date();

toast("Live tracking started");

watchId = navigator.geolocation.watchPosition(

function(position){

var lat = position.coords.latitude;
var lng = position.coords.longitude;

latestLiveCoords = {
lat:lat,
lng:lng
};

var currentPosition = {
lat:lat,
lng:lng
};

if(currentMarker){

currentMarker.setPosition(currentPosition);

}else{

currentMarker = new google.maps.Marker({
position:currentPosition,
map:map,
title:"Live Location",
label:{
text:"L",
color:"#ffffff",
fontWeight:"bold"
},
icon:{
url:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
}
});

}

map.setCenter(currentPosition);
map.setZoom(15);

if(toCoords){

var remaining = google.maps.geometry.spherical.computeDistanceBetween(
new google.maps.LatLng(lat,lng),
new google.maps.LatLng(toCoords.lat,toCoords.lng)
);

if(remaining < 100 && !destinationReached){

destinationReached = true;
trackingEndTime = new Date();

toast("Destination reached");

navigator.geolocation.clearWatch(watchId);
liveTracking = false;

var start = trackingStartTime.toLocaleTimeString();
var end = trackingEndTime.toLocaleTimeString();

var totalMinutes = Math.round(
(trackingEndTime - trackingStartTime) / 60000
);

var finalTravelTime =
start + " - " + end + " (" + totalMinutes + " mins)";

calculateRoute().then(function(){

if(tripData){
tripData.travel_time = finalTravelTime;
submitToZoho();
}

});

}

}

},

function(error){

console.error(error);
toast("Location access denied");

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:30000
}

);

}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCUT-r7jJAO_J84KRlqfuXJCXuEwthTPgo&loading=async&libraries=places,geometry,marker&callback=initMap&v=beta">
</script>

</body>
</html>
