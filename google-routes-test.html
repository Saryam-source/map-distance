<!DOCTYPE html>
<html>
<head>
<title>Google Routes Test</title>

<style>
html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
}

.box{
position:absolute;
top:20px;
left:20px;
z-index:10;
background:white;
padding:15px;
border-radius:10px;
width:330px;
box-shadow:0 4px 20px rgba(0,0,0,.25);
}

gmp-place-autocomplete,
button{
width:100%;
margin:7px 0;
box-sizing:border-box;
}

button{
padding:12px;
background:#22c55e;
color:white;
border:0;
font-weight:bold;
cursor:pointer;
}

#result{
font-size:15px;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<gmp-place-autocomplete id="fromPlace" placeholder="From location"></gmp-place-autocomplete>
<gmp-place-autocomplete id="toPlace" placeholder="To location"></gmp-place-autocomplete>

<button onclick="calculateRoute()">Calculate Route</button>

<div id="result">Result will show here</div>
</div>

<div id="map"></div>

<script>
let map;
let fromPlace = null;
let toPlace = null;
let fromMarker = null;
let toMarker = null;

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{
center:{lat:13.0827,lng:80.2707},
zoom:12
});

const fromAuto = document.getElementById("fromPlace");
const toAuto = document.getElementById("toPlace");

fromAuto.addEventListener("gmp-select", async function(event){
fromPlace = event.placePrediction.toPlace();
await fromPlace.fetchFields({
fields:["displayName","formattedAddress","location"]
});
console.log("FROM selected:", fromPlace);
});

toAuto.addEventListener("gmp-select", async function(event){
toPlace = event.placePrediction.toPlace();
await toPlace.fetchFields({
fields:["displayName","formattedAddress","location"]
});
console.log("TO selected:", toPlace);
});

}

function calculateRoute(){

if(!fromPlace || !toPlace){
document.getElementById("result").innerHTML =
"Please select From and To from dropdown.";
return;
}

const fromLoc = fromPlace.location;
const toLoc = toPlace.location;

if(fromMarker){
fromMarker.setMap(null);
}

if(toMarker){
toMarker.setMap(null);
}

fromMarker = new google.maps.Marker({
position:fromLoc,
map:map,
title:"FROM",
icon:"https://maps.google.com/mapfiles/ms/icons/green-dot.png"
});

toMarker = new google.maps.Marker({
position:toLoc,
map:map,
title:"TO",
icon:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"
});

const bounds = new google.maps.LatLngBounds();
bounds.extend(fromLoc);
bounds.extend(toLoc);
map.fitBounds(bounds);

const distance =
google.maps.geometry.spherical.computeDistanceBetween(fromLoc,toLoc);

const distanceKm = (distance / 1000).toFixed(2);

document.getElementById("result").innerHTML =
"Distance : " + distanceKm + " KM";
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCUT-r7jJAO_J84KRlqfuXJCXuEwthTPgo&loading=async&libraries=places,geometry,marker&callback=initMap&v=beta">
</script>

</body>
</html>
