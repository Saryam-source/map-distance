<!DOCTYPE html>
<html>
<head>
<title>Google Routes Test</title>
<style>
html,body{height:100%;margin:0;font-family:Arial;}
#map{height:100%;}
.box{
position:absolute;top:20px;left:20px;z-index:10;
background:white;padding:15px;border-radius:10px;width:320px;
box-shadow:0 4px 20px rgba(0,0,0,.25);
}
input,button{
width:100%;padding:10px;margin:6px 0;box-sizing:border-box;
}
button{
background:#22c55e;color:white;border:0;font-weight:bold;cursor:pointer;
}
#result{font-size:15px;margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="box">
<input id="from" placeholder="From location">
<input id="to" placeholder="To location">
<button onclick="calculateRoute()">Calculate Route</button>
<div id="result">Result will show here</div>
</div>

<div id="map"></div>

<script>
let map, geocoder;
let routeLine = null;
let fromMarker = null;
let toMarker = null;

function initMap(){
    map = new google.maps.Map(document.getElementById("map"), {
        center:{lat:13.0827,lng:80.2707},
        zoom:12
    });

    geocoder = new google.maps.Geocoder();
}

function geocodeAddress(address){
    return new Promise(function(resolve,reject){
        geocoder.geocode(
            { address: address + ", Tamil Nadu, India" },
            function(results,status){
                if(status === "OK" && results[0]){
                    const loc = results[0].geometry.location;
                    resolve({
                        lat: loc.lat(),
                        lng: loc.lng(),
                        address: results[0].formatted_address
                    });
                }else{
                    reject("Location not found: " + address);
                }
            }
        );
    });
}

async function calculateRoute(){
    const fromText = document.getElementById("from").value.trim();
    const toText = document.getElementById("to").value.trim();
    const resultBox = document.getElementById("result");

    if(!fromText || !toText){
        resultBox.innerHTML = "Please enter From and To location.";
        return;
    }

    resultBox.innerHTML = "Calculating route...";

    try{
        const from = await geocodeAddress(fromText);
        const to = await geocodeAddress(toText);

        if(fromMarker){ fromMarker.setMap(null); }
        if(toMarker){ toMarker.setMap(null); }
        if(routeLine){ routeLine.setMap(null); }

        fromMarker = new google.maps.Marker({
            position:{lat:from.lat,lng:from.lng},
            map:map,
            title:"FROM",
            icon:{url:"https://maps.google.com/mapfiles/ms/icons/green-dot.png"}
        });

        toMarker = new google.maps.Marker({
            position:{lat:to.lat,lng:to.lng},
            map:map,
            title:"TO",
            icon:{url:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"}
        });

        const request = {
            origin:{
                location:{
                    latLng:{
                        latitude: from.lat,
                        longitude: from.lng
                    }
                }
            },
            destination:{
                location:{
                    latLng:{
                        latitude: to.lat,
                        longitude: to.lng
                    }
                }
            },
            travelMode:"DRIVE",
            routingPreference:"TRAFFIC_UNAWARE",
            computeAlternativeRoutes:false,
            fields:["distanceMeters","duration","polyline.encodedPolyline"]
        };

        const response = await google.maps.routes.Route.computeRoutes(request);

        if(!response.routes || response.routes.length === 0){
            resultBox.innerHTML = "No route found.";
            return;
        }

        const route = response.routes[0];

        const path = google.maps.geometry.encoding.decodePath(
            route.polyline.encodedPolyline
        );

        routeLine = new google.maps.Polyline({
            path:path,
            map:map,
            strokeColor:"#2563eb",
            strokeWeight:6,
            strokeOpacity:0.9
        });

        const bounds = new google.maps.LatLngBounds();
        path.forEach(function(p){
            bounds.extend(p);
        });
        map.fitBounds(bounds);

        const distanceKm = (route.distanceMeters / 1000).toFixed(2);
        const durationMin = Math.round(
            parseInt(route.duration.replace("s","")) / 60
        );

        resultBox.innerHTML =
            "Distance: " + distanceKm + " KM<br>" +
            "Duration: " + durationMin + " MIN";

    }catch(error){
        console.error(error);
        resultBox.innerHTML = "Error: " + error;
    }
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCUT-r7jJAO_J84KRlqfuXJCXuEwthTPgo&loading=async&libraries=geometry,routes,marker&callback=initMap&v=beta">
</script>

</body>
</html>
